// ── Block / Report Modal ──────────────────────────────────────────────────────
function BlockReportModal({target,onBlock,onReport,onClose}){
  const [mode,setMode]=useState('menu');          // menu | report | blocked | reported
  const [category,setCategory]=useState('');
  const [desc,setDesc]=useState('');
  const [loading,setLoading]=useState(false);

  const categories=[
    {key:'spam',            label:'Spam or scam',            emoji:'🚫'},
    {key:'harassment',      label:'Harassment or bullying',  emoji:'😠'},
    {key:'fake_profile',    label:'Fake profile',            emoji:'🎭'},
    {key:'inappropriate_content',label:'Inappropriate content',emoji:'⚠️'},
    {key:'underage',        label:'Underage user',           emoji:'🔞'},
    {key:'violence',        label:'Threats or violence',     emoji:'🔴'},
    {key:'other',           label:'Other',                   emoji:'❓'},
  ];

  async function submitReport(){
    if(!category) return;
    setLoading(true);
    await new Promise(r=>setTimeout(r,900));
    setLoading(false);
    setMode('reported');
    onReport(target, category); // auto-blocks in parent handler
  }

  async function submitBlock(){
    setLoading(true);
    await new Promise(r=>setTimeout(r,600));
    setLoading(false);
    setMode('blocked');
    onBlock(target);
  }

  return <div style={{position:'absolute',inset:0,zIndex:300,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)',animation:'fadeIn 0.2s'}}/>
    <div style={{position:'relative',background:C.bg,borderRadius:'26px 26px 0 0',padding:'0 22px 38px',animation:'slideUp 0.3s ease',border:`1px solid ${C.border}`,maxHeight:'88%',display:'flex',flexDirection:'column'}}>
      <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:'12px auto 18px',flexShrink:0}}/>

      {mode==='menu'&&<>
        <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:20}}>
          <Avatar name={target.display_name} color={target.color} size={46}/>
          <div><p style={{color:C.text,fontWeight:700,fontSize:16}}>{target.display_name}</p><p style={{color:C.muted,fontSize:12}}>@{target.username}</p></div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          <button onClick={()=>setMode('report')} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:'15px 18px',cursor:'pointer',textAlign:'left',display:'flex',gap:14,alignItems:'center',fontFamily:'inherit'}}>
            <div style={{width:42,height:42,borderRadius:12,background:'oklch(62% 0.2 15/0.12)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🚨</div>
            <div><p style={{color:C.text,fontWeight:700,fontSize:14}}>Report</p><p style={{color:C.muted,fontSize:12,marginTop:1}}>Something feels wrong or unsafe</p></div>
          </button>
          <button onClick={submitBlock} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:'15px 18px',cursor:'pointer',textAlign:'left',display:'flex',gap:14,alignItems:'center',fontFamily:'inherit'}}>
            <div style={{width:42,height:42,borderRadius:12,background:'oklch(62% 0.18 270/0.12)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🚫</div>
            <div><p style={{color:C.text,fontWeight:700,fontSize:14}}>Block</p><p style={{color:C.muted,fontSize:12,marginTop:1}}>They won't be able to see you or contact you</p></div>
          </button>
          <button onClick={onClose} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:14,padding:'13px',cursor:'pointer',color:C.muted,fontWeight:600,fontSize:14,fontFamily:'inherit'}}>Cancel</button>
        </div>
      </>}

      {mode==='report'&&<div style={{flex:1,overflow:'auto'}}>
        <p style={{color:C.text,fontWeight:800,fontSize:17,marginBottom:6}}>Report {target.display_name}</p>
        <p style={{color:C.muted,fontSize:13,marginBottom:16,lineHeight:1.6}}>Select what's happening. Your report is anonymous.</p>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {categories.map(cat=>(
            <button key={cat.key} onClick={()=>setCategory(cat.key)} style={{background:category===cat.key?C.accentL:C.surface,border:`1.5px solid ${category===cat.key?C.accent:C.border}`,borderRadius:13,padding:'12px 15px',cursor:'pointer',textAlign:'left',display:'flex',gap:10,alignItems:'center',fontFamily:'inherit',transition:'all 0.15s'}}>
              <span style={{fontSize:18}}>{cat.emoji}</span>
              <p style={{color:category===cat.key?C.accent:C.text,fontWeight:category===cat.key?700:500,fontSize:14}}>{cat.label}</p>
              {category===cat.key&&<div style={{marginLeft:'auto',width:18,height:18,borderRadius:'50%',background:C.accent,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="check" size={11} color="#fff"/></div>}
            </button>
          ))}
        </div>
        <div style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:13,padding:'11px 14px',marginBottom:16}}>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Add any details (optional)..." maxLength={500}
            style={{width:'100%',background:'none',border:'none',outline:'none',color:C.text,fontSize:13,fontFamily:'inherit',lineHeight:1.6,height:60}}/>
        </div>
        <div style={{display:'flex',gap:9}}>
          <Btn variant="ghost" full={false} style={{flex:1}} onClick={()=>setMode('menu')}>Back</Btn>
          <Btn full={false} style={{flex:2,background:C.error,boxShadow:'none'}} disabled={!category} loading={loading} onClick={submitReport}>Submit Report</Btn>
        </div>
      </div>}

      {mode==='blocked'&&<div style={{textAlign:'center',padding:'8px 0 10px'}}>
        <div style={{width:60,height:60,borderRadius:'50%',background:'oklch(62% 0.18 270/0.15)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',fontSize:28}}>🚫</div>
        <p style={{color:C.text,fontWeight:800,fontSize:17,marginBottom:6}}>{target.display_name} blocked</p>
        <p style={{color:C.muted,fontSize:13,lineHeight:1.6,marginBottom:20}}>They won't appear on your map or be able to contact you.</p>
        <Btn onClick={onClose}>Done</Btn>
      </div>}

      {mode==='reported'&&<div style={{textAlign:'center',padding:'8px 0 10px'}}>
        <div style={{width:60,height:60,borderRadius:'50%',background:`${C.success}18`,border:`2px solid ${C.success}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}><Icon name="check" size={28} color={C.success}/></div>
        <p style={{color:C.text,fontWeight:800,fontSize:17,marginBottom:6}}>Report submitted</p>
        <p style={{color:C.muted,fontSize:13,lineHeight:1.6,marginBottom:20}}>Thank you. Our team will review this. {target.display_name} has also been blocked for your safety.</p>
        <Btn onClick={onClose}>Done</Btn>
      </div>}
    </div>
  </div>;
}

// ── Meetup Safety Modal ───────────────────────────────────────────────────────
function MeetupSafetyModal({partner,trustedContacts,onStart,onClose}){
  const [step,setStep]=useState('setup');   // setup | active | sos
  const [timer,setTimer]=useState(30);      // minutes
  const [selectedContact,setSelectedContact]=useState(trustedContacts[0]||null);
  const [shareLocation,setShareLocation]=useState(true);
  const [countdown,setCountdown]=useState(0);
  const [sosTriggered,setSosTriggered]=useState(false);

  useEffect(()=>{
    if(step!=='active') return;
    setCountdown(timer*60);
    const t=setInterval(()=>setCountdown(v=>{if(v<=1){clearInterval(t);return 0;}return v-1;}),1000);
    return()=>clearInterval(t);
  },[step]);

  const mm=String(Math.floor(countdown/60)).padStart(2,'0');
  const ss=String(countdown%60).padStart(2,'0');
  const pct=timer>0?(countdown/(timer*60))*100:0;
  const urgency=countdown<120?C.error:countdown<300?'oklch(70% 0.2 55)':C.success;

  return <div style={{position:'absolute',inset:0,zIndex:250,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={step==='setup'?onClose:undefined} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.65)',animation:'fadeIn 0.2s'}}/>
    <div style={{position:'relative',background:C.bg,borderRadius:'26px 26px 0 0',animation:'slideUp 0.3s ease',border:`1px solid ${C.border}`,maxHeight:'90%',display:'flex',flexDirection:'column'}}>
      <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:'12px auto 0',flexShrink:0}}/>

      {step==='setup'&&<div style={{padding:'16px 22px 36px',overflow:'auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
          <div style={{width:40,height:40,borderRadius:12,background:`${C.success}18`,border:`1px solid ${C.success}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🛡️</div>
          <div><p style={{color:C.text,fontWeight:800,fontSize:17}}>Meetup Safety</p><p style={{color:C.muted,fontSize:12}}>Set up safety checks before meeting {partner.display_name}</p></div>
        </div>

        {/* Timer */}
        <div style={{marginBottom:16}}>
          <p style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:10}}>Check-in Timer</p>
          <div style={{display:'flex',gap:8}}>
            {[15,30,60,120].map(m=>(
              <button key={m} onClick={()=>setTimer(m)} style={{flex:1,padding:'10px 4px',borderRadius:12,border:`1.5px solid ${timer===m?C.accent:C.border}`,background:timer===m?C.accentL:'none',color:timer===m?C.accent:C.muted,fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s'}}>
                {m<60?`${m}m`:`${m/60}h`}
              </button>
            ))}
          </div>
          <p style={{color:C.muted,fontSize:11,marginTop:7}}>If you don't check in within {timer<60?`${timer} minutes`:`${timer/60} hour${timer>60?'s':''}`}, your trusted contact will be notified.</p>
        </div>

        {/* Trusted contact */}
        <div style={{marginBottom:16}}>
          <p style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:10}}>Alert Contact</p>
          {trustedContacts.length>0
            ?trustedContacts.map(tc=>(
              <button key={tc.username||tc.name} onClick={()=>setSelectedContact(tc)} style={{width:'100%',background:selectedContact?.username===tc.username?C.accentL:C.surface,border:`1.5px solid ${selectedContact?.username===tc.username?C.accent:C.border}`,borderRadius:13,padding:'11px 14px',cursor:'pointer',textAlign:'left',display:'flex',gap:10,alignItems:'center',fontFamily:'inherit',marginBottom:7,transition:'all 0.15s'}}>
                <Avatar name={tc.display_name||tc.name} color={tc.color||C.muted} size={36}/>
                <div style={{flex:1}}><p style={{color:C.text,fontWeight:600,fontSize:13}}>{tc.display_name||tc.name}</p><p style={{color:C.muted,fontSize:11}}>{tc.username?`@${tc.username}`:tc.phone}</p></div>
                {selectedContact?.username===tc.username&&<Icon name="check" size={16} color={C.accent}/>}
              </button>
            ))
            :<div style={{background:C.surface,borderRadius:13,padding:'14px',border:`1px solid ${C.border}`,textAlign:'center'}}>
              <p style={{color:C.muted,fontSize:13}}>No trusted contacts yet</p>
              <p style={{color:C.muted,fontSize:12,marginTop:3}}>Add them in Profile → Safety</p>
            </div>
          }
        </div>

        {/* Share location */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0',borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,marginBottom:18}}>
          <div><p style={{color:C.text,fontWeight:600,fontSize:14}}>Share live location</p><p style={{color:C.muted,fontSize:12,marginTop:2}}>With your trusted contact during the meetup</p></div>
          <div onClick={()=>setShareLocation(v=>!v)} style={{width:46,height:26,borderRadius:13,background:shareLocation?C.success:C.border,cursor:'pointer',position:'relative',transition:'background 0.2s',flexShrink:0}}>
            <div style={{position:'absolute',top:3,left:shareLocation?22:3,width:20,height:20,borderRadius:'50%',background:'#fff',transition:'left 0.2s',boxShadow:'0 1px 4px rgba(0,0,0,0.3)'}}/>
          </div>
        </div>

        <Btn onClick={()=>{setStep('active');onStart&&onStart({timer,contact:selectedContact,shareLocation});}}>
          🛡️ Start Safety Check-in
        </Btn>
        <button onClick={onClose} style={{width:'100%',marginTop:10,background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:13,fontWeight:600,fontFamily:'inherit',padding:'8px'}}>Skip for now</button>
      </div>}

      {step==='active'&&<div style={{padding:'20px 22px 36px',display:'flex',flexDirection:'column',alignItems:'center'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',marginBottom:20}}>
          <p style={{color:C.text,fontWeight:800,fontSize:17}}>🛡️ Safety Active</p>
          <div style={{background:`${C.success}18`,border:`1px solid ${C.success}44`,borderRadius:20,padding:'4px 10px'}}><span style={{color:C.success,fontSize:11,fontWeight:700}}>LIVE</span></div>
        </div>

        {/* Countdown ring */}
        <div style={{position:'relative',width:140,height:140,marginBottom:18}}>
          <svg style={{position:'absolute',inset:0,transform:'rotate(-90deg)'}} viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="60" fill="none" stroke={C.border} strokeWidth="8"/>
            <circle cx="70" cy="70" r="60" fill="none" stroke={urgency} strokeWidth="8"
              strokeDasharray={`${2*Math.PI*60}`} strokeDashoffset={`${2*Math.PI*60*(1-pct/100)}`}
              style={{transition:'stroke-dashoffset 1s linear,stroke 0.5s'}} strokeLinecap="round"/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <p style={{color:urgency,fontWeight:800,fontSize:28,fontVariantNumeric:'tabular-nums',transition:'color 0.5s'}}>{mm}:{ss}</p>
            <p style={{color:C.muted,fontSize:11}}>remaining</p>
          </div>
        </div>

        {selectedContact&&<div style={{background:C.surface,borderRadius:14,padding:'11px 14px',width:'100%',display:'flex',gap:10,alignItems:'center',marginBottom:14,border:`1px solid ${C.border}`}}>
          <Avatar name={selectedContact.display_name||selectedContact.name} color={selectedContact.color||C.muted} size={36}/>
          <div style={{flex:1}}><p style={{color:C.text,fontWeight:600,fontSize:13}}>Alerting {selectedContact.display_name||selectedContact.name}</p><p style={{color:C.muted,fontSize:11,marginTop:1}}>{shareLocation?'Sharing your live location':'Location sharing off'}</p></div>
          <div style={{width:10,height:10,borderRadius:'50%',background:C.success,flexShrink:0,boxShadow:`0 0 0 3px ${C.success}33`}}/>
        </div>}

        <div style={{display:'flex',gap:9,width:'100%',marginBottom:10}}>
          <Btn variant="success" full={false} style={{flex:2}} onClick={()=>setStep('setup')}>
            <Icon name="check" size={15} color="#fff"/> I'm Safe
          </Btn>
          <Btn variant="danger" full={false} style={{flex:1}} onClick={()=>setSosTriggered(true)}>
            🆘 SOS
          </Btn>
        </div>
        <p style={{color:C.muted,fontSize:11,textAlign:'center'}}>Tap "I'm Safe" to confirm check-in and stop the timer</p>

        {sosTriggered&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.85)',borderRadius:'26px 26px 0 0',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:28,gap:14,animation:'fadeIn 0.2s'}}>
          <div style={{fontSize:52}}>🆘</div>
          <p style={{color:'#fff',fontWeight:800,fontSize:22,textAlign:'center'}}>SOS Activated</p>
          <p style={{color:'rgba(255,255,255,0.7)',fontSize:13,textAlign:'center',lineHeight:1.7}}>{selectedContact?`${selectedContact.display_name||selectedContact.name} has been notified with your location.`:'Emergency services alerted.'} Your location is being shared every 30 seconds.</p>
          <div style={{background:'rgba(255,255,255,0.1)',borderRadius:16,padding:'14px 18px',width:'100%',textAlign:'center',border:'1px solid rgba(255,255,255,0.2)'}}>
            <p style={{color:'rgba(255,255,255,0.6)',fontSize:11,marginBottom:4}}>Emergency number</p>
            <p style={{color:'#fff',fontWeight:800,fontSize:24}}>911</p>
          </div>
          <Btn style={{background:'#fff',color:'#000'}} onClick={()=>{setSosTriggered(false);setStep('setup');onClose();}}>Cancel SOS</Btn>
        </div>}
      </div>}
    </div>
  </div>;
}

// ── Safety Hub Screen ─────────────────────────────────────────────────────────
function SafetyHubScreen({friends,blockedUsers,trustedContacts,locationPrecision,onBack,onSetPrecision,onAddTrusted,onRemoveTrusted,onUnblock}){

// Deterministic hash so every time `sam_r` is queried they get the same 2–3 friends
function hashString(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return Math.abs(h);}
function generateFallbackFriends(username){
  const h=hashString(username);
  const count=2+(h%2); // 2 or 3 friends
  const out=[]; const used=new Set();
  for(let i=0;i<count;i++){
    const idx=(h+i*37+(i*i*11))%SOCIAL_POOL.length;
    if(used.has(idx)) continue;
    used.add(idx);
    const cand=SOCIAL_POOL[idx];
    if(cand.username===username) continue;
    out.push(cand);
  }
  return out;
}
// getSocial: returns friends for any username — explicit first, procedural fallback otherwise
function getSocial(username){
  if(SOCIAL_GRAPH[username]) return SOCIAL_GRAPH[username];
  return generateFallbackFriends(username);
}

// NETWORK GRAPH
// ─────────────────────────────────────────────────────────────────────────────
const MAX_PRIMARY_FRIENDS=8;

function NetworkGraph({user,friends,blockedUsers,onAddFriend,onOpenChat,onViewProfile,onCreateGroup,embedded}){
  const containerRef=useRef(null);

  // transform: {x, y, scale} — the SVG group transform
  const [tf,setTf]=useState({x:195,y:310,scale:1});
  const [selected,setSelected]=useState(null);
  // graphFriends = friends + newly added FOF
  const [graphFriends,setGraphFriends]=useState(friends);
  const [pending,setPending]=useState({}); // username → true when request sent
  // Multi-select state — set of usernames (friends only eligible)
  const [multiMode,setMultiMode]=useState(false);
  const [multiSel,setMultiSel]=useState(new Set());
  // ── Primary friends: which friends show on graph (max 8) ─
  const [primaryFriends,setPrimaryFriends]=useState(()=>{
    // Try to load from localStorage first
    try{
      const saved=JSON.parse(localStorage.getItem('lu5_primaryFriends')||'null');
      if(saved&&Array.isArray(saved)){
        // Filter to only include usernames that are still friends
        const validUsernames=saved.filter(u=>friends.some(f=>f.username===u));
        if(validUsernames.length>0) return new Set(validUsernames);
      }
    }catch{}
    // Default: first 8 friends are primary
    return new Set(friends.slice(0,MAX_PRIMARY_FRIENDS).map(f=>f.username));
  });
  const [showFriendList,setShowFriendList]=useState(false);
  // ── Position cache: username → {x,y}. Once assigned, positions never move. ─
  const posRef=useRef({'__me':{x:0,y:0}});
  // Track which friends were added from the graph (so we know their "home" root)
  // friendParent: friend username → the friend through which they were discovered (for FOF-added friends)
  const friendParentRef=useRef({}); // username → parent friend username

  // Keep graphFriends in sync when parent friends changes
  useEffect(()=>{
    setGraphFriends(prev=>{
      const merged=[...friends];
      prev.forEach(p=>{ if(!merged.find(m=>m.username===p.username)) merged.push(p); });
      return merged;
    });
    // Update primaryFriends when friends list changes
    setPrimaryFriends(prev=>{
      const updated=new Set([...prev].filter(u=>friends.some(f=>f.username===u)));
      // If we have room, add new friends
      friends.forEach(f=>{
        if(updated.size<MAX_PRIMARY_FRIENDS&&!updated.has(f.username)){
          updated.add(f.username);
        }
      });
      return updated;
    });
  },[friends]);

  // Restore posRef and friendParentRef from persisted friend data on mount/update
  useEffect(()=>{
    friends.forEach(f=>{
      // Restore cached position from persisted graphPos
      if(f.graphPos&&!posRef.current[f.username]){
        posRef.current[f.username]={x:f.graphPos.x,y:f.graphPos.y};
      }
      // Restore parent reference from persisted parent
      if(f.parent&&!friendParentRef.current[f.username]){
        friendParentRef.current[f.username]=f.parent;
      }
    });
  },[friends]);

  // Persist primaryFriends to localStorage whenever it changes
  useEffect(()=>{
    localStorage.setItem('lu5_primaryFriends',JSON.stringify([...primaryFriends]));
  },[primaryFriends]);

  // Toggle a friend's primary status
  function togglePrimary(username){
    setPrimaryFriends(prev=>{
      const next=new Set(prev);
      if(next.has(username)){
        next.delete(username);
        // Clear cached position so the spot becomes available
        delete posRef.current[username];
        // Also clear FOF positions for this friend so they don't leave orphaned nodes
        const fofs=getSocial(username)||[];
        fofs.forEach(ff=>{ delete posRef.current[ff.username]; });
      }else if(next.size<MAX_PRIMARY_FRIENDS){
        next.add(username);
        // Position will be assigned fresh in buildGraph
      }
      return next;
    });
  }

  // ── Collision resolution ─────────────────────────────────────────────────────

  // Check if edge passes through a node (with padding for text)
  function edgeHitsNode(x1,y1,x2,y2,cx,cy,r,padding=25){
    const hitR=r+padding; // Account for text label below node
    const dx=x2-x1, dy=y2-y1;
    const fx=x1-cx, fy=y1-cy;
    const a=dx*dx+dy*dy;
    if(a<0.001) return false;
    const b=2*(fx*dx+fy*dy);
    const c=fx*fx+fy*fy-hitR*hitR;
    const disc=b*b-4*a*c;
    if(disc<0) return false;
    const sqrtDisc=Math.sqrt(disc);
    const t1=(-b-sqrtDisc)/(2*a);
    const t2=(-b+sqrtDisc)/(2*a);
    return (t1>0.05&&t1<0.95)||(t2>0.05&&t2<0.95);
  }

  // Push overlapping nodes apart - account for text labels
  function resolveNodeCollisions(nodeList,iterations=15){
    const nodes=[...nodeList];
    const TEXT_HEIGHT=35; // Space for text below node

    for(let iter=0;iter<iterations;iter++){
      let moved=false;
      for(let i=0;i<nodes.length;i++){
        for(let j=i+1;j<nodes.length;j++){
          const n1=nodes[i], n2=nodes[j];
          if(n1.id==='__me'||n2.id==='__me') continue;

          const dx=n2.x-n1.x, dy=n2.y-n1.y;
          const dist=Math.sqrt(dx*dx+dy*dy)||0.1;
          // Minimum distance includes both radii plus text space
          const minDist=n1.r+n2.r+TEXT_HEIGHT+15;

          if(dist<minDist){
            moved=true;
            const overlap=minDist-dist;
            // Push apart along the angle between them
            const angle=Math.atan2(dy,dx);
            const push=overlap/2+2;

            // Move both nodes apart
            n1.x-=Math.cos(angle)*push*0.5;
            n1.y-=Math.sin(angle)*push*0.5;
            n2.x+=Math.cos(angle)*push*0.5;
            n2.y+=Math.sin(angle)*push*0.5;
          }
        }
      }
      if(!moved) break;
    }
    nodes.forEach(n=>{
      if(n.id!=='__me') posRef.current[n.id]={x:n.x,y:n.y};
    });
    return nodes;
  }

  // Build edge paths - curve around nodes if needed
  function computeEdgePaths(edgeList,nodeList){
    return edgeList.map(e=>{
      const f=nodeList.find(n=>n.id===e.from);
      const t=nodeList.find(n=>n.id===e.to);
      if(!f||!t) return null;

      // Check if edge passes through any other node
      let blockers=[];
      for(const n of nodeList){
        if(n.id===e.from||n.id===e.to) continue;
        if(edgeHitsNode(f.x,f.y,t.x,t.y,n.x,n.y,n.r,20)){
          blockers.push(n);
        }
      }

      if(blockers.length===0){
        // Straight line
        return{...e,x1:f.x,y1:f.y,x2:t.x,y2:t.y,path:`M${f.x},${f.y}L${t.x},${t.y}`};
      }

      // Curve around blockers - find the side to curve toward
      const mx=(f.x+t.x)/2, my=(f.y+t.y)/2;
      const edgeAngle=Math.atan2(t.y-f.y,t.x-f.x);
      const perpAngle=edgeAngle+Math.PI/2;

      // Determine which side has fewer blockers
      let leftClear=true, rightClear=true;
      for(const b of blockers){
        const side=(b.x-mx)*Math.cos(perpAngle)+(b.y-my)*Math.sin(perpAngle);
        if(side>0) rightClear=false;
        else leftClear=false;
      }

      const curveDir=leftClear?1:rightClear?-1:(Math.random()>0.5?1:-1);
      const curveDist=30+blockers.length*15;
      const cx=mx+Math.cos(perpAngle)*curveDir*curveDist;
      const cy=my+Math.sin(perpAngle)*curveDir*curveDist;

      return{...e,x1:f.x,y1:f.y,x2:t.x,y2:t.y,curved:true,cx,cy,
        path:`M${f.x},${f.y}Q${cx},${cy} ${t.x},${t.y}`};
    }).filter(Boolean);
  }

  // ── Build nodes & edges ─ deterministic layout with persistent position cache
  const {nodes:rawNodes,edges}=buildGraph();
  // Resolve collisions before rendering
  const nodes=resolveNodeCollisions(rawNodes);
  // Compute all edge paths with collision avoidance
  const edgePaths=computeEdgePaths(edges,nodes);

  function assignPos(username,x,y){
    if(!posRef.current[username]) posRef.current[username]={x,y};
    return posRef.current[username];
  }
  function buildGraph(){
    const ns=[], es=[];
    const allFriends=graphFriends.filter(f=>!blockedUsers.some(b=>b.username===f.username));
    // Split into root friends (no parent) and derived friends (added from graph, have parent)
    const rootFriends=allFriends.filter(f=>primaryFriends.has(f.username)&&!f.parent);
    const derivedFriends=allFriends.filter(f=>f.parent);

    // Only show center "You" node if there are root friends
    if(rootFriends.length>0){
      ns.push({id:'__me',label:user.displayName||'You',color:C.accent,level:levelFromXp(0),r:30,x:0,y:0,kind:'me'});
    }

    // Geometric layout: evenly space ROOT friends in a circle
    const count=rootFriends.length||1;
    const R1=Math.max(100,Math.min(140,80+count*15));

    rootFriends.forEach((f,i)=>{
      const angle=(2*Math.PI*i/count)-(Math.PI/2);
      const x=R1*Math.cos(angle);
      const y=R1*Math.sin(angle);
      posRef.current[f.username]={x,y};
      ns.push({id:f.username,label:f.display_name,color:f.color,level:f.level,r:22,x,y,kind:'friend',data:f,angle});
      es.push({from:'__me',to:f.username,strength:'strong'});
    });

    // Derived friends (former FOFs) — position relative to their parent
    derivedFriends.forEach(f=>{
      const parentNode=ns.find(n=>n.id===f.parent);
      if(!parentNode) return; // Parent not visible, skip
      const baseAngle=Math.atan2(parentNode.y,parentNode.x);
      const R2=Math.hypot(parentNode.x,parentNode.y)+90;
      // Find how many derived friends share this parent to spread them
      const siblings=derivedFriends.filter(df=>df.parent===f.parent);
      const idx=siblings.indexOf(f);
      const spreadAngle=siblings.length===1?0:(idx-(siblings.length-1)/2)*0.4;
      const angle=baseAngle+spreadAngle;
      const x=R2*Math.cos(angle);
      const y=R2*Math.sin(angle);
      posRef.current[f.username]={x,y};
      ns.push({id:f.username,label:f.display_name,color:f.color,level:f.level,r:20,x,y,kind:'friend',data:f,parent:f.parent,angle});
      es.push({from:f.parent,to:f.username,strength:'strong'});
    });

    // FOFs — radiate straight outward from each friend (root or derived)
    ns.filter(n=>n.kind==='friend').forEach(fn=>{
      const f=fn.data;
      const baseAngle=Math.atan2(fn.y,fn.x);
      const fofs=(getSocial(f.username)||[]).filter(ff=>
        !allFriends.some(m=>m.username===ff.username)&&
        !blockedUsers.some(b=>b.username===ff.username)
      ).slice(0,3);

      const R2=Math.hypot(fn.x,fn.y)+90;
      fofs.forEach((ff,j)=>{
        if(ns.find(n=>n.id===ff.username)) return;
        const spreadAngle=fofs.length===1?0:(j-(fofs.length-1)/2)*0.4;
        const fofAngle=baseAngle+spreadAngle;
        const x=R2*Math.cos(fofAngle);
        const y=R2*Math.sin(fofAngle);
        posRef.current[ff.username]={x,y};
        ns.push({id:ff.username,label:ff.display_name,color:ff.color,level:ff.level,r:16,x,y,kind:'fof',data:ff,parent:f.username,angle:fofAngle});
        es.push({from:f.username,to:ff.username,strength:'weak'});

        // Level 3 — pending FOF's friends
        if(pending[ff.username]){
          const fofFofs=(getSocial(ff.username)||[]).filter(fff=>
            !allFriends.some(m=>m.username===fff.username)&&
            !ns.find(n=>n.id===fff.username)
          ).slice(0,2);
          const R3=R2+70;
          fofFofs.forEach((fff,k)=>{
            const a3=fofAngle+(k===0?-0.3:0.3);
            if(!ns.find(n=>n.id===fff.username)){
              const x3=R3*Math.cos(a3);
              const y3=R3*Math.sin(a3);
              posRef.current[fff.username]={x:x3,y:y3};
              ns.push({id:fff.username,label:fff.display_name,color:fff.color,level:fff.level,r:13,x:x3,y:y3,kind:'fof2',data:fff,parent:ff.username});
              es.push({from:ff.username,to:fff.username,strength:'vweak'});
            }
          });
        }
      });
    });
    return{nodes:ns,edges:es};
  }


  // ── Pointer pan/zoom ──────────────────────────────────────────────────────
  const pointerRef=useRef(null);
  const pinchRef=useRef(null);

  function getContainerPoint(e){
    const rect=containerRef.current?.getBoundingClientRect()||{left:0,top:0};
    return{x:e.clientX-rect.left,y:e.clientY-rect.top};
  }

  function onPointerDown(e){
    // Check if the target or any ancestor is a graph node
    let el=e.target;
    while(el&&el!==e.currentTarget){
      if(el.getAttribute&&el.getAttribute('data-node')) return; // node click - don't pan
      el=el.parentNode;
    }
    pointerRef.current={id:e.pointerId,startX:e.clientX,startY:e.clientY,tfX:tf.x,tfY:tf.y,moved:false};
  }
  function onPointerMove(e){
    const ptr=pointerRef.current;
    if(!ptr||ptr.id!==e.pointerId) return;
    const dx=e.clientX-ptr.startX;
    const dy=e.clientY-ptr.startY;
    if(Math.abs(dx)>3||Math.abs(dy)>3) ptr.moved=true;
    // Capture values before setTf to avoid race condition with onPointerUp
    const newX=ptr.tfX+dx;
    const newY=ptr.tfY+dy;
    setTf(t=>({...t,x:newX,y:newY}));
  }
  function onPointerUp(e){
    if(pointerRef.current?.id===e.pointerId) pointerRef.current=null;
  }

  // Pinch-to-zoom
  const touchesRef=useRef({});
  function onTouchStart(e){
    [...e.changedTouches].forEach(t=>{ touchesRef.current[t.identifier]={x:t.clientX,y:t.clientY}; });
    if(Object.keys(touchesRef.current).length===2){
      const pts=Object.values(touchesRef.current);
      pinchRef.current={dist:Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y),scale:tf.scale,tfX:tf.x,tfY:tf.y,
        mx:(pts[0].x+pts[1].x)/2-(containerRef.current?.getBoundingClientRect().left||0),
        my:(pts[0].y+pts[1].y)/2-(containerRef.current?.getBoundingClientRect().top||0)};
    }
  }
  function onTouchMove(e){
    e.preventDefault();
    [...e.changedTouches].forEach(t=>{ touchesRef.current[t.identifier]={x:t.clientX,y:t.clientY}; });
    const pts=Object.values(touchesRef.current);
    const pinch=pinchRef.current;
    if(pts.length===2&&pinch&&pinch.dist>0&&pinch.scale>0){
      const newDist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
      const ratio=newDist/pinch.dist;
      const ns=Math.min(3,Math.max(0.3,pinch.scale*ratio));
      // Capture all values before setTf to avoid race conditions
      const {mx,my,tfX,tfY,scale}=pinch;
      const scaleRatio=ns/scale;
      setTf({
        scale:ns,
        x:mx-(mx-tfX)*scaleRatio,
        y:my-(my-tfY)*scaleRatio,
      });
    }
  }
  function onTouchEnd(e){
    [...e.changedTouches].forEach(t=>{ delete touchesRef.current[t.identifier]; });
    if(Object.keys(touchesRef.current).length<2) pinchRef.current=null;
  }

  // Mouse-wheel zoom — zooms toward cursor position
  function onWheel(e){
    e.preventDefault();
    const rect=containerRef.current?.getBoundingClientRect()||{left:0,top:0};
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const delta=e.deltaY>0?-0.12:0.12;
    setTf(t=>{
      const ns=Math.min(3,Math.max(0.3,t.scale+delta));
      const ratio=ns/t.scale;
      return{scale:ns,x:mx-(mx-t.x)*ratio,y:my-(my-t.y)*ratio};
    });
  }

  // Button zoom — toward/away from current view center
  function zoomBtn(dir){
    const W=containerRef.current?.clientWidth||390;
    const H=containerRef.current?.clientHeight||500;
    const mx=W/2,my=H/2;
    setTf(t=>{
      const ns=Math.min(3,Math.max(0.3,t.scale+dir*0.25));
      const ratio=ns/t.scale;
      return{scale:ns,x:mx-(mx-t.x)*ratio,y:my-(my-t.y)*ratio};
    });
  }

  // Add friend handler — FOF becomes a friend and stays where it was on the graph
  function handleAdd(nodeData){
    setPending(p=>({...p,[nodeData.username]:true}));
    setSelected(null);
    // Find the FOF's parent so the new friend remains rooted in that sub-tree
    const fofNode=nodes.find(n=>n.id===nodeData.username);
    const parentUsername=fofNode?.parent||null;
    const cachedPos=posRef.current[nodeData.username]||null;
    // Store in ref as fallback for current session
    if(parentUsername){
      friendParentRef.current[nodeData.username]=parentUsername;
    }
    // Add to graphFriends after short delay (simulates request accepted)
    // Include parent and graphPos on the object so they persist to localStorage
    setTimeout(()=>{
      const enrichedFriend={
        ...nodeData,
        distance_m:600,
        parent:parentUsername,
        graphPos:cachedPos?{x:cachedPos.x,y:cachedPos.y}:null
      };
      setGraphFriends(prev=>[...prev,enrichedFriend]);
      onAddFriend&&onAddFriend(enrichedFriend);
    },800);
  }

  // ── Multi-select handlers ─────────────────────────────────────────────────
  function toggleMulti(){
    setMultiMode(m=>{ if(m){ setMultiSel(new Set()); } return !m; });
    setSelected(null);
  }
  function toggleNodeSel(username){
    setMultiSel(prev=>{
      const next=new Set(prev);
      if(next.has(username)) next.delete(username); else next.add(username);
      return next;
    });
  }
  function createGroupFromSelection(){
    const picked=[...multiSel].map(u=>graphFriends.find(f=>f.username===u)).filter(Boolean);
    if(picked.length<2){ return; }
    onCreateGroup&&onCreateGroup(picked);
    setMultiMode(false);
    setMultiSel(new Set());
  }

  const selNode=selected?nodes.find(n=>n.id===selected):null;

  return <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
    {!embedded&&<StatusBar/>}
    {!embedded&&<div style={{padding:'10px 18px 5px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
      <div>
        <h2 style={{color:C.text,fontWeight:800,fontSize:18,letterSpacing:'-0.02em'}}>Social Graph</h2>
        <p style={{color:C.muted,fontSize:11,marginTop:1}}>Tap nodes · Pinch/scroll to zoom · Drag to pan</p>
      </div>
      <div style={{display:'flex',gap:5}}>
        <button onClick={()=>zoomBtn(1)} style={{width:32,height:32,borderRadius:9,background:C.surface,border:`1px solid ${C.border}`,cursor:'pointer',color:C.text,fontSize:19,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
        <button onClick={()=>zoomBtn(-1)} style={{width:32,height:32,borderRadius:9,background:C.surface,border:`1px solid ${C.border}`,cursor:'pointer',color:C.text,fontSize:19,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
        <button onClick={()=>setTf({x:195,y:310,scale:1})} style={{width:32,height:32,borderRadius:9,background:C.surface,border:`1px solid ${C.border}`,cursor:'pointer',color:C.muted,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>⌂</button>
      </div>
    </div>}
    {embedded&&<div style={{padding:'6px 18px 4px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,gap:8}}>
      <p style={{color:multiMode?C.accent:C.muted,fontSize:11,fontWeight:multiMode?700:400,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
        {multiMode?`Select friends · ${multiSel.size} picked`:'Tap nodes · Drag to pan · Scroll to zoom'}
      </p>
      <div style={{display:'flex',gap:4}}>
        <button onClick={toggleMulti} style={{height:28,padding:'0 9px',borderRadius:8,background:multiMode?C.accent:C.surface,border:`1px solid ${multiMode?C.accent:C.border}`,cursor:'pointer',color:multiMode?'#fff':C.muted,fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:4,fontFamily:'inherit'}}>
          {multiMode?'✓ Done':<>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><circle cx="9" cy="8" r="3.3"/><circle cx="17" cy="9" r="2.6"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5"/><path d="M14 18c0-2 2-3.5 4.2-3.5s3.8 1.5 3.8 3.5"/></svg>
            Group
          </>}
        </button>
        <button onClick={()=>zoomBtn(1)} style={{width:28,height:28,borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,cursor:'pointer',color:C.text,fontSize:16,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
        <button onClick={()=>zoomBtn(-1)} style={{width:28,height:28,borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,cursor:'pointer',color:C.text,fontSize:16,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
        <button onClick={()=>setTf({x:195,y:310,scale:1})} style={{width:28,height:28,borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,cursor:'pointer',color:C.muted,fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>⌂</button>
      </div>
    </div>}

    {/* Legend + Friends Toggle */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 18px 6px',flexShrink:0}}>
      <div style={{display:'flex',gap:14}}>
        {[{c:C.accent,l:'You'},{c:'oklch(58% 0.16 270)',l:'Friends'},{c:`${C.muted}88`,l:'Connect'}].map((item,i)=>(
          <div key={i} style={{display:'flex',gap:4,alignItems:'center'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:item.c}}/>
            <span style={{color:C.muted,fontSize:10,fontWeight:600}}>{item.l}</span>
          </div>
        ))}
      </div>
      {friends.filter(f=>!f.parent).length>0&&<button onClick={()=>setShowFriendList(!showFriendList)} style={{background:showFriendList?C.accentL:C.surface,border:`1px solid ${showFriendList?C.accent:C.border}`,borderRadius:8,padding:'4px 10px',cursor:'pointer',display:'flex',alignItems:'center',gap:5,fontFamily:'inherit'}}>
        <span style={{fontSize:11,fontWeight:600,color:showFriendList?C.accent:C.muted}}>{[...primaryFriends].filter(u=>friends.some(f=>f.username===u&&!f.parent)).length}/{MAX_PRIMARY_FRIENDS}</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={showFriendList?C.accent:C.muted} strokeWidth="2.5"><path d={showFriendList?"M18 15l-6-6-6 6":"M6 9l6 6 6-6"}/></svg>
      </button>}
    </div>

    {/* Primary Friends List — only root friends (not FOFs) */}
    {showFriendList&&friends.filter(f=>!f.parent).length>0&&<div style={{padding:'0 18px 8px',flexShrink:0}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'8px',maxHeight:160,overflowY:'auto'}}>
        <p style={{color:C.muted,fontSize:10,fontWeight:700,marginBottom:6,padding:'0 4px'}}>SHOW ON GRAPH (max {MAX_PRIMARY_FRIENDS})</p>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          {friends.filter(f=>!f.parent).map(f=>{
            const isOn=primaryFriends.has(f.username);
            const canToggleOn=isOn||primaryFriends.size<MAX_PRIMARY_FRIENDS;
            return <button key={f.username} onClick={()=>canToggleOn&&togglePrimary(f.username)}
              style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',background:isOn?C.accentL:'transparent',border:`1px solid ${isOn?C.accent:'transparent'}`,borderRadius:8,cursor:canToggleOn?'pointer':'not-allowed',opacity:canToggleOn?1:0.5,fontFamily:'inherit',textAlign:'left'}}>
              <div style={{width:24,height:24,borderRadius:'50%',background:f.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff',flexShrink:0}}>
                {f.display_name?.split(' ').map(w=>w[0]).join('').slice(0,2)}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{color:C.text,fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.display_name}</p>
              </div>
              <div style={{width:20,height:20,borderRadius:6,background:isOn?C.accent:C.border,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {isOn&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>}
              </div>
            </button>;
          })}
        </div>
      </div>
    </div>}

    {/* Canvas */}
    <div ref={containerRef} style={{flex:1,overflow:'hidden',position:'relative',cursor:pointerRef.current?'grabbing':'grab',touchAction:'none'}}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}
      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      onWheel={onWheel}>

      <svg width="100%" height="100%" style={{position:'absolute',inset:0,overflow:'visible'}}>
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g transform={`translate(${tf.x},${tf.y}) scale(${tf.scale})`}>
          {/* Edges — straight or curved to avoid overlaps */}
          {edgePaths.map((ep,i)=>{
            const sw=ep.strength==='strong'?2:1;
            const op=ep.strength==='strong'?0.5:ep.strength==='weak'?0.25:0.12;
            const sc=ep.strength==='strong'?C.accent:C.muted;
            const sd=ep.strength==='weak'?'6 4':ep.strength==='vweak'?'3 5':undefined;
            return <path key={i} d={ep.path} stroke={sc} strokeWidth={sw} strokeDasharray={sd} opacity={op} fill="none"/>;
          })}
          {/* Nodes */}
          {nodes.map(n=>{
            const isSel=selected===n.id;
            const isFriendNode=n.kind==='friend';
            const isPend=pending[n.id];
            const isMultiSel=multiSel.has(n.id);
            const multiEligible=isFriendNode; // only friends can be in a group
            const dim=multiMode&&!multiEligible&&n.kind!=='me';
            return <g key={n.id} data-node="1" opacity={dim?0.35:1} onClick={e=>{
              e.stopPropagation();
              if(pointerRef.current?.moved) return;
              if(multiMode){
                if(multiEligible) toggleNodeSel(n.id);
                return;
              }
              setSelected(isSel?null:n.id);
            }} style={{cursor:multiMode&&!multiEligible&&n.kind!=='me'?'not-allowed':'pointer',pointerEvents:'auto',transition:'opacity 0.2s'}}>
              {/* Pulse for FOF */}
              {(n.kind==='fof'||n.kind==='fof2')&&!isPend&&!multiMode&&
                <circle cx={n.x} cy={n.y} r={n.r+8} fill="none" stroke={C.accent} strokeWidth="1" opacity="0.15"
                  style={{animation:`ping 2s ease-in-out infinite`}}/>}
              {/* Selection ring */}
              {isSel&&!multiMode&&<circle cx={n.x} cy={n.y} r={n.r+6} fill="none" stroke={C.accent} strokeWidth="1.5" opacity="0.7"/>}
              {/* Multi-select ring */}
              {isMultiSel&&<>
                <circle cx={n.x} cy={n.y} r={n.r+7} fill="none" stroke={C.accent} strokeWidth="2.5"/>
                <circle cx={n.x} cy={n.y} r={n.r+11} fill="none" stroke={C.accent} strokeWidth="1" opacity="0.35"/>
              </>}
              {/* Circle */}
              <circle cx={n.x} cy={n.y} r={n.r}
                fill={n.kind==='me'?C.accent:isFriendNode?n.color:isPend?`${n.color}cc`:`${n.color}66`}
                stroke={isSel?C.accent:n.kind==='me'?'rgba(255,255,255,0.25)':isFriendNode?n.color:isPend?n.color:C.border}
                strokeWidth={n.kind==='me'?2.5:isFriendNode||isPend?2:1}
                filter={n.kind==='me'?'url(#glow)':undefined}/>
              {/* Multi-select check badge */}
              {isMultiSel&&<>
                <circle cx={n.x-n.r*0.68} cy={n.y-n.r*0.68} r={9} fill={C.accent} stroke={C.bg} strokeWidth="1.5"/>
                <text x={n.x-n.r*0.68} y={n.y-n.r*0.68+4.5} textAnchor="middle" fontSize="11" fontWeight="800" fill="#fff" style={{pointerEvents:'none'}}>✓</text>
              </>}
              {/* Friend check badge */}
              {(isFriendNode||isPend)&&<>
                <circle cx={n.x+n.r*0.68} cy={n.y-n.r*0.68} r={7} fill={C.success} stroke={C.bg} strokeWidth="1.5"/>
                <text x={n.x+n.r*0.68} y={n.y-n.r*0.68+4.5} textAnchor="middle" fontSize="9" fill="#fff" style={{pointerEvents:'none'}}>✓</text>
              </>}
              {/* Pending ring */}
              {isPend&&!isFriendNode&&<circle cx={n.x} cy={n.y} r={n.r+4} fill="none" stroke={C.accent} strokeWidth="1.5" strokeDasharray="4 3" opacity="0.6"/>}
              {/* Initials */}
              <text x={n.x} y={n.y+n.r*0.35} textAnchor="middle"
                fontSize={n.kind==='me'?15:n.r>20?12:n.r>16?10:9}
                fontWeight="800" fill="#fff" style={{pointerEvents:'none',userSelect:'none'}}>
                {n.kind==='me'?(user.displayName?.[0]?.toUpperCase()||'Y'):n.label.split(' ').map(w=>w[0]).join('').slice(0,2)}
              </text>
              {/* Name */}
              <text x={n.x} y={n.y+n.r+14} textAnchor="middle"
                fontSize={n.kind==='me'?12:n.kind==='friend'?11:10}
                fontWeight={n.kind==='me'?'800':'600'}
                fill={n.kind==='me'?C.accent:isFriendNode?C.text:`${C.muted}`}
                style={{pointerEvents:'none',userSelect:'none'}}>
                {n.kind==='me'?'You':n.label.split(' ')[0]}
              </text>
              {/* Level */}
              {(n.kind==='friend'||isPend)&&<>
                <rect x={n.x-15} y={n.y+n.r+17} width={30} height={14} rx={7} fill={C.accentL}/>
                <text x={n.x} y={n.y+n.r+27} textAnchor="middle" fontSize="8" fontWeight="700" fill={C.accent} style={{pointerEvents:'none',userSelect:'none'}}>Lv {n.level}</text>
              </>}
            </g>;
          })}
        </g>
      </svg>

      {/* Tap-away removed — popup has its own close button */}

      {/* Node popup */}
      {selNode&&selNode.kind!=='me'&&(
        <div style={{position:'absolute',bottom:10,left:10,right:10,background:`oklch(16% 0.018 265 / 0.96)`,backdropFilter:'blur(16px)',borderRadius:20,padding:'13px 15px',border:`1px solid ${C.border}`,animation:'fadeUp 0.2s ease',zIndex:10}} onClick={e=>e.stopPropagation()}>
          <div style={{display:'flex',gap:11,alignItems:'center',marginBottom:10}}>
            <div style={{width:42,height:42,borderRadius:'50%',background:selNode.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#fff',flexShrink:0}}>
              {selNode.label.split(' ').map(w=>w[0]).join('').slice(0,2)}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                <p style={{color:C.text,fontWeight:800,fontSize:14}}>{selNode.label}</p>
                <span style={{background:C.accentG,color:C.accent,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 6px'}}>Lv {selNode.level}</span>
                {(selNode.kind==='friend'||pending[selNode.id])&&<span style={{background:'oklch(62% 0.18 145/0.15)',color:C.success,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px'}}>Friend</span>}
              </div>
              <p style={{color:C.muted,fontSize:11,marginTop:1}}>@{selNode.id}</p>
              {selNode.data?.bio&&<p style={{color:C.muted,fontSize:11,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{selNode.data.bio}</p>}
            </div>
            <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',cursor:'pointer',padding:4,flexShrink:0}}><Icon name="x" size={15} color={C.muted}/></button>
          </div>

          {(selNode.kind==='fof'||selNode.kind==='fof2')&&!pending[selNode.id]
            ?<>
              <div style={{display:'flex',gap:8}}>
                <Btn small full={false} style={{flex:2}} onClick={()=>handleAdd(selNode.data)}>
                  <Icon name="userplus" size={13} color="#fff"/> Add Friend
                </Btn>
                <Btn small full={false} variant="ghost" style={{flex:1}} onClick={()=>{setSelected(null);onViewProfile&&onViewProfile(selNode.data);}}>View</Btn>
              </div>
              <p style={{color:C.muted,fontSize:10,textAlign:'center',marginTop:7}}>
                Friend of <strong style={{color:C.text}}>{nodes.find(n=>n.id===selNode.parent)?.label||'a friend'}</strong> · Adding expands their network
              </p>
            </>
            :<div style={{display:'flex',gap:8}}>
              {pending[selNode.id]&&!selNode.kind==='friend'&&<p style={{color:C.success,fontSize:12,textAlign:'center',flex:1}}>✓ Request sent — expanding…</p>}
              {(selNode.kind==='friend')&&<>
                <Btn small full={false} style={{flex:2}} variant="subtle" onClick={()=>{setSelected(null);onOpenChat&&onOpenChat(selNode.data);}}>
                  <Icon name="chat" size={13} color={C.accent}/> Chat
                </Btn>
                <Btn small full={false} variant="ghost" style={{flex:1}} onClick={()=>{setSelected(null);onViewProfile&&onViewProfile(selNode.data);}}>Profile</Btn>
              </>}
            </div>
          }
        </div>
      )}

      {/* Multi-select action bar */}
      {multiMode&&<div style={{position:'absolute',bottom:10,left:10,right:10,background:`oklch(16% 0.018 265 / 0.97)`,backdropFilter:'blur(16px)',borderRadius:18,padding:'11px 13px',border:`1px solid ${C.accent}66`,zIndex:15,animation:'fadeUp 0.22s ease'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:multiSel.size>0?9:0}}>
          <div style={{width:34,height:34,borderRadius:10,background:C.accentL,border:`1px solid ${C.accent}55`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="2.4" strokeLinecap="round"><circle cx="9" cy="8" r="3.3"/><circle cx="17" cy="9" r="2.6"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5"/><path d="M14 18c0-2 2-3.5 4.2-3.5s3.8 1.5 3.8 3.5"/></svg>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{color:C.text,fontWeight:800,fontSize:13}}>New Group Chat</p>
            <p style={{color:C.muted,fontSize:11,marginTop:1}}>{multiSel.size===0?'Tap friend nodes to add them':multiSel.size===1?'1 friend selected · pick at least 2':`${multiSel.size} friends selected`}</p>
          </div>
          <button onClick={toggleMulti} style={{background:'none',border:'none',cursor:'pointer',padding:4,flexShrink:0}}><Icon name="x" size={16} color={C.muted}/></button>
        </div>
        {multiSel.size>0&&<>
          <div style={{display:'flex',gap:-8,marginBottom:9,flexWrap:'wrap'}}>
            {[...multiSel].slice(0,6).map(u=>{
              const f=graphFriends.find(x=>x.username===u);
              if(!f) return null;
              return <div key={u} style={{width:26,height:26,borderRadius:'50%',background:f.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:'#fff',border:`2px solid ${C.bg}`,marginRight:-6}}>{f.display_name[0]}</div>;
            })}
            {multiSel.size>6&&<div style={{width:26,height:26,borderRadius:'50%',background:C.surface,border:`2px solid ${C.bg}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:C.muted,marginRight:-6}}>+{multiSel.size-6}</div>}
          </div>
          <Btn small disabled={multiSel.size<2} onClick={createGroupFromSelection}>
            <Icon name="chat" size={13} color="#fff"/> Create Group Chat{multiSel.size>=2?` (${multiSel.size})`:''}
          </Btn>
        </>}
      </div>}

      {/* Empty state */}
      {nodes.length<=1&&<div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,padding:32,textAlign:'center',pointerEvents:'none'}}>
        <div style={{fontSize:44,opacity:0.25}}>🕸️</div>
        <p style={{color:C.muted,fontSize:14,fontWeight:700}}>Your network is empty</p>
        <p style={{color:C.muted,fontSize:12,lineHeight:1.6}}>Add friends from the map or People tab to see your social graph here</p>
      </div>}
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────────────────────────
function App(){
  // ── Auth state ────────────────────────────────────────────────────────────
  const [authScreen, setAuthScreen] = useState(getToken() ? null : 'splash'); // null = logged in
  const [currentUser, setCurrentUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(!!getToken()); // loading if we need to verify token

  // Check existing token on mount
  useEffect(() => {
    if (getToken()) {
      authAPI.getMe()
        .then(data => {
          if (data.user) {
            setCurrentUser(data.user);
            setAuthScreen(null);
          } else {
            clearTokens();
            setAuthScreen('splash');
          }
        })
        .catch(() => {
          clearTokens();
          setAuthScreen('splash');
        })
        .finally(() => setAuthLoading(false));
    }
  }, []);

  // Load user data from backend
  async function loadBackendData() {
    try {
      // Load friends from backend
      const friendsRes = await dataAPI.getFriends().catch(() => ({ friends: [] }));
      if (friendsRes.friends && friendsRes.friends.length > 0) {
        const backendFriends = friendsRes.friends.map(f => ({
          id: f.friend_id,
          username: f.username,
          display_name: f.display_name,
          level: f.level || 1,
          xp: f.xp || 0,
          avatar_url: f.avatar_url,
          color: `oklch(58% 0.16 ${Math.floor(Math.random() * 360)})`,
          distance_m: Math.floor(Math.random() * 1500) + 100,
        }));
        setFriends(backendFriends);
        persist({ friends: backendFriends });
      }

      // Load shop data (coins, owned items)
      const shopRes = await dataAPI.getShop().catch(() => ({ coins: 20, items: [] }));
      if (shopRes.coins !== undefined) {
        setCoins(shopRes.coins);
        persist({ coins: shopRes.coins });
      }
      if (shopRes.items) {
        const ownedKeys = shopRes.items.filter(i => i.owned).map(i => i.key);
        if (ownedKeys.length > 0) {
          setOwned(ownedKeys);
          persist({ owned: ownedKeys });
          if (ownedKeys.includes('chat_theme')) setGoldTheme(true);
        }
      }

      // Load pending friend requests
      const pendingRes = await dataAPI.getPendingFriends().catch(() => ({ requests: [] }));
      if (pendingRes.requests && pendingRes.requests.length > 0) {
        const pending = pendingRes.requests.map(r => ({
          id: r.id,
          display_name: r.display_name,
          username: r.username,
          level: r.level || 1,
          color: `oklch(58% 0.16 ${Math.floor(Math.random() * 360)})`,
        }));
        setFriendReqs(pending);
      }
    } catch (err) {
      console.error('Failed to load backend data:', err);
    }
  }

  function handleAuthSuccess(user) {
    setCurrentUser(user);
    setAuthScreen(null);
    setAuthLoading(false);
    // Note: useEffect will load backend data when currentUser changes
  }

  function handleSignOut() {
    authAPI.logout().catch(() => {}); // Ignore errors, still clear local state
    clearTokens();
    // Clear local data so next user starts fresh
    localStorage.removeItem('lu5_state');
    setCurrentUser(null);
    setAuthScreen('splash');
  }

  // ── App state ─────────────────────────────────────────────────────────────
  // Load saved state only if it belongs to the current user
  const load=(username)=>{
    try{
      const s=JSON.parse(localStorage.getItem('lu5_state')||'{}');
      if(s._v!=='6.0'){localStorage.removeItem('lu5_state');return null;}
      // Check if saved data belongs to this user
      if(s._user&&s._user!==username){localStorage.removeItem('lu5_state');return null;}
      return s;
    }catch{return null;}
  };

  // Get saved data for current user (or null if different user/no data)
  const saved=currentUser?load(currentUser.username):null;

  const user=currentUser ? {
    displayName: currentUser.display_name || currentUser.username,
    username: currentUser.username,
    bio: currentUser.bio || 'New to LinkUp!',
    interests: ['Coffee meetups', 'Explore the city']
  } : {displayName:'You',username:'you',bio:'New to LinkUp!',interests:['Coffee meetups','Explore the city']};

  // Default values for new accounts (no mock data)
  const [tab,      setTab]      = useState(saved?.tab    ||'map');
  const [xp,       setXp]       = useState(saved?.xp     ||0);
  const [coins,    setCoins]    = useState(saved?.coins  ||0);
  const [quests,   setQuests]   = useState(saved?.quests ||MOCK_QUESTS);
  const [friends,  setFriends]  = useState(saved?.friends||[]);
  const [owned,    setOwned]    = useState(saved?.owned  ||[]);
  const [goldTheme,setGoldTheme]= useState(saved?.goldTheme||false);
  const [notifs,   setNotifs]   = useState(NOTIF_TEMPLATES);
  const [userEvents,setUserEvents]=useState(saved?.userEvents||[]);
  const [rsvped,    setRsvped]   =useState(saved?.rsvped   ||[]);
  const [groups,    setGroups]   =useState(saved?.groups   ||[]);
  const [groupChat, setGroupChat]=useState(null);

  // ── Safety state ───────────────────────────────────────────────────────────
  const [blockedUsers,    setBlockedUsers]    = useState([]);
  const [trustedContacts, setTrustedContacts] = useState([]);
  const [locationPrecision,setLocationPrecision]=useState('approximate');
  const [blockReportTarget,setBlockReportTarget]=useState(null);
  const [safetyHubOpen,   setSafetyHubOpen]   = useState(false);
  const [meetupSafetyFor, setMeetupSafetyFor] = useState(null);

  const [xpToasts,     setXpToasts]     = useState([]);
  const [levelUpModal, setLevelUpModal] = useState(null);
  const [requestModal, setRequestModal] = useState(null);
  const [pinSheet,     setPinSheet]     = useState(null);
  const [chatWith,     setChatWith]     = useState(null);
  const [viewingUser,  setViewingUser]  = useState(null);
  const [notifOpen,    setNotifOpen]    = useState(false);
  const [incomingReqs, setIncomingReqs] = useState([]);
  const [friendReqs,   setFriendReqs]   = useState([]);

  const unreadNotifs=notifs.filter(n=>!n.read).length;
  const inboxCount=incomingReqs.length+friendReqs.length;

  // Load backend data when user logs in or session restores
  useEffect(() => {
    if (currentUser) {
      // Reset to backend values (override any stale local data)
      if (currentUser.xp !== undefined) setXp(currentUser.xp);
      if (currentUser.coins !== undefined) setCoins(currentUser.coins);
      // Clear any leftover data from previous session
      setFriends([]);
      setOwned([]);
      setFriendReqs([]);
      setIncomingReqs([]);
      // Load fresh data from backend
      loadBackendData();
    }
  }, [currentUser]);

  function persist(updates){
    if(!currentUser) return; // Don't persist if not logged in
    localStorage.setItem('lu5_state',JSON.stringify({
      _v:'6.0',
      _user:currentUser.username, // Tie data to this account
      tab,xp,coins,quests,friends,owned,goldTheme,userEvents,rsvped,groups,
      ...updates
    }));
  }

  function awardXP(amount,awardCoins=0){
    const xpAmt=Math.max(0,amount), coinAmt=Math.max(0,awardCoins);
    if(xpAmt===0&&coinAmt===0) return;
    const id=Date.now();
    setXpToasts(t=>[...t,{id,xp:xpAmt,coins:coinAmt}]);
    setTimeout(()=>setXpToasts(t=>t.filter(e=>e.id!==id)),2200);
    setXp(prev=>{
      const n=Math.max(0,prev+xpAmt);
      if(levelFromXp(n)>levelFromXp(prev)) setTimeout(()=>setLevelUpModal(levelFromXp(n)),400);
      persist({xp:n}); return n;
    });
    if(coinAmt>0) setCoins(prev=>{const n=Math.max(0,prev+coinAmt);persist({coins:n});return n;});
  }

  function handleSendRequest(target){setRequestModal(target);}
  function handleRequestSent(){setTimeout(()=>{setRequestModal(null);awardXP(5);setQuests(q=>q.map(qst=>qst.key==='first_linkup'?{...qst,progress:Math.min((qst.progress||0)+1,qst.target),done:(qst.progress||0)+1>=qst.target,claimable:(qst.progress||0)+1>=qst.target&&!qst.done}:qst));},700);}

  function handleAcceptMeetup(id){setIncomingReqs(r=>r.filter(x=>x.id!==id));awardXP(15,2);}
  function handleDeclineMeetup(id){setIncomingReqs(r=>r.filter(x=>x.id!==id));}

  function handleAddFriend(target){
    // Send friend request to backend (optimistic update)
    dataAPI.sendFriendRequest(target.username).catch(err => {
      console.log('Friend request failed (may already exist):', err);
    });
    setTimeout(()=>{
      setFriends(prev=>{
        if(prev.some(f=>f.username===target.username)) return prev;
        // Preserve parent and graphPos for graph-added friends (FOF)
        const newFriend={
          ...target,
          distance_m:target.distance_m||950,
          parent:target.parent||null,
          graphPos:target.graphPos||null
        };
        const u=[...prev,newFriend];
        persist({friends:u});
        return u;
      });
      awardXP(10);
    },700);
  }
  function handleAcceptFriend(id){
    const req=friendReqs.find(r=>r.id===id);
    if(req){
      // Accept on backend
      dataAPI.respondToFriend(id, 'accepted').catch(err => {
        console.log('Accept friend failed:', err);
      });
      setFriends(prev=>{if(prev.some(f=>f.username===req.username))return prev;const u=[...prev,{...req,distance_m:450}];persist({friends:u});return u;});
      awardXP(10);
    }
    setFriendReqs(r=>r.filter(x=>x.id!==id));
  }
  function handleDeclineFriend(id){
    // Block/decline on backend
    dataAPI.respondToFriend(id, 'blocked').catch(err => {
      console.log('Decline friend failed:', err);
    });
    setFriendReqs(r=>r.filter(x=>x.id!==id));
  }

  async function handleBuy(item){
    if(coins<item.cost) return;
    // Try to buy on backend first
    try {
      const result = await dataAPI.buyItem(item.key);
      // Update coins from backend response
      setCoins(result.coins_remaining);
      persist({coins: result.coins_remaining});
      setOwned(prev=>{const u=[...prev,item.key];persist({owned:u});return u;});
      if(item.key==='chat_theme'){setGoldTheme(true);persist({goldTheme:true});}
      setNotifs(n=>[{id:`n-buy-${Date.now()}`,type:'shop',icon:'🛍️',title:`Purchased: ${item.name}`,body:`🪙 −${item.cost} coins`,ts:Date.now(),read:false},...n]);
    } catch (err) {
      // Fallback to local-only if backend fails (e.g., item not in backend DB)
      console.log('Backend buy failed, using local fallback:', err);
      setCoins(prev=>{const n=Math.max(0,prev-item.cost);persist({coins:n});return n;});
      setOwned(prev=>{const u=[...prev,item.key];persist({owned:u});return u;});
      if(item.key==='chat_theme'){setGoldTheme(true);persist({goldTheme:true});}
      setNotifs(n=>[{id:`n-buy-${Date.now()}`,type:'shop',icon:'🛍️',title:`Purchased: ${item.name}`,body:`🪙 −${item.cost} coins`,ts:Date.now(),read:false},...n]);
    }
  }

  function handleClaimQuest(key){const q=quests.find(x=>x.key===key);if(q){awardXP(q.xp,q.coins);setQuests(qs=>qs.map(x=>x.key===key?{...x,claimable:false}:x));}}

  function markAllRead(){setNotifs(n=>n.map(x=>({...x,read:true})));}
  function openChat(person){setPinSheet(null);setViewingUser(null);setChatWith(person);}
  function viewProfile(u){setPinSheet(null);setViewingUser(u);}
  function goTab(t){setTab(t);persist({tab:t});setChatWith(null);setViewingUser(null);setNotifOpen(false);}

  // ── Safety handlers ────────────────────────────────────────────────────────
  function handleBlock(target){
    setBlockedUsers(prev=>[...prev.filter(u=>u.username!==target.username),target]);
    setFriends(prev=>prev.filter(f=>f.username!==target.username));
    setBlockReportTarget(null);
  }
  function handleReport(target,category){
    handleBlock(target); // auto-block on report
  }
  function handleAddTrusted(contact){
    setTrustedContacts(prev=>[...prev.filter(c=>c.username!==contact.username),contact]);
  }
  function handleRemoveTrusted(contact){
    setTrustedContacts(prev=>prev.filter(c=>c.username!==contact.username));
  }
  function handleUnblock(user){
    setBlockedUsers(prev=>prev.filter(u=>u.username!==user.username));
  }

  if(groupChat){
    return <Wrap>
      <GroupChatScreen group={groups.find(g=>g.id===groupChat.id)||groupChat} me={{username:'you',display_name:'You'}} goldTheme={goldTheme}
        onBack={()=>setGroupChat(null)}
        onMeetupVerified={handleGroupMeetupVerified}
        onLeave={handleLeaveGroup}/>
      <XPToast events={xpToasts}/>
      {levelUpModal&&<LevelUpModal level={levelUpModal} onDismiss={()=>setLevelUpModal(null)}/>}
    </Wrap>;
  }

  if(chatWith){
    return <Wrap>
      <ChatScreen partner={chatWith} goldTheme={goldTheme}
        onBack={()=>setChatWith(null)}
        onMeetupVerified={()=>awardXP(50,5)}
        onOpenSafety={()=>setMeetupSafetyFor(chatWith)}/>
      <XPToast events={xpToasts}/>
      {meetupSafetyFor&&<MeetupSafetyModal partner={meetupSafetyFor} trustedContacts={trustedContacts} onStart={()=>{}} onClose={()=>setMeetupSafetyFor(null)}/>}
    </Wrap>;
  }

  function handleCreateEvent(ev){
    setUserEvents(prev=>{const n=[ev,...prev];persist({userEvents:n});return n;});
    awardXP(25,5);
  }
  function handleRSVP(ev){
    setRsvped(prev=>{
      const has=prev.includes(ev.id);
      const n=has?prev.filter(x=>x!==ev.id):[...prev,ev.id];
      persist({rsvped:n});
      return n;
    });
    if(!rsvped.includes(ev.id)) awardXP(5,0);
  }

  // ── Group handlers ─────────────────────────────────────────────────────────
  // Accepts either {name,emoji,memberUsernames:[]} (from modal) or an array of friend objects (from graph multi-select).
  function handleCreateGroup(input){
    const me={username:'you',display_name:'You',color:C.accent};
    let g;
    if(Array.isArray(input)){
      const members=[me,...input.map(f=>({username:f.username,display_name:f.display_name,color:f.color,level:f.level}))];
      const firstNames=input.slice(0,3).map(f=>f.display_name.split(' ')[0]).join(', ');
      g={id:`g-${Date.now()}`,name:firstNames+(input.length>3?` +${input.length-3}`:''),emoji:'👥',members,verified:false,createdAt:Date.now()};
    }else{
      const picked=friends.filter(f=>input.memberUsernames.includes(f.username));
      const members=[me,...picked.map(f=>({username:f.username,display_name:f.display_name,color:f.color,level:f.level}))];
      g={id:`g-${Date.now()}`,name:input.name,emoji:input.emoji||'👥',members,verified:false,createdAt:Date.now()};
    }
    setGroups(prev=>{const n=[g,...prev];persist({groups:n});return n;});
    awardXP(5);
    setNotifs(n=>[{id:`n-g-${Date.now()}`,type:'group',icon:g.emoji,title:`Group created: ${g.name}`,body:`${g.members.length} members`,ts:Date.now(),read:false},...n]);
    setTab('people');persist({tab:'people'});
    setTimeout(()=>setGroupChat(g),250);
  }
  function handleOpenGroup(g){setGroupChat(g);}
  function handleGroupMeetupVerified(g){
    setGroups(prev=>{const n=prev.map(x=>x.id===g.id?{...x,verified:true}:x);persist({groups:n});return n;});
    awardXP(100,15);
  }
  function handleLeaveGroup(g){
    setGroups(prev=>{const n=prev.filter(x=>x.id!==g.id);persist({groups:n});return n;});
    setGroupChat(null);
  }

  const screens={
    map:     <ExploreScreen user={user} xp={xp} friends={friends} blockedUsers={blockedUsers} onPinSelect={p=>{setPinSheet(p);}} incomingRequests={incomingReqs} onAccept={handleAcceptMeetup} onDecline={handleDeclineMeetup} unreadNotifs={unreadNotifs} onOpenNotifs={()=>setNotifOpen(true)} onAddFriend={handleAddFriend} onOpenChat={openChat} onViewProfile={viewProfile} onCreateGroup={handleCreateGroup}/>,
    people:  <PeopleScreen friends={friends} groups={groups} incomingRequests={incomingReqs} friendRequests={friendReqs} onRequestUser={handleSendRequest} onAddFriend={handleAddFriend} onAcceptMeetup={handleAcceptMeetup} onDeclineMeetup={handleDeclineMeetup} onAcceptFriend={handleAcceptFriend} onDeclineFriend={handleDeclineFriend} onOpenChat={openChat} onViewProfile={viewProfile} onOpenGroup={handleOpenGroup} onCreateGroup={handleCreateGroup}/>,
    events:  <EventsScreen events={MOCK_EVENTS} userEvents={userEvents} ownedBoosts={owned} rsvped={rsvped} onCreate={handleCreateEvent} onRSVP={handleRSVP}/>,
    shop:    <ShopScreen coins={coins} owned={owned} onBuy={handleBuy} quests={quests} onClaim={handleClaimQuest}/>,
    profile: <ProfileScreen user={user} xp={xp} coins={coins} quests={quests} friends={friends} onOpenSafety={()=>setSafetyHubOpen(true)} onSignOut={handleSignOut}/>,
  };

  // Show loading while verifying existing token
  if (authLoading) {
    return <Wrap><div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}><Spinner size={32} color={C.accent}/></div></Wrap>;
  }

  // Show auth screens if not logged in
  if (authScreen) {
    const authScreens = {
      splash: <SplashScreen onNavigate={setAuthScreen}/>,
      signup: <SignupScreen onNavigate={setAuthScreen} onSuccess={handleAuthSuccess}/>,
      login: <LoginScreen onNavigate={setAuthScreen} onSuccess={handleAuthSuccess}/>,
    };
    return <Wrap>{authScreens[authScreen] || authScreens.splash}</Wrap>;
  }

  return <Wrap>
    <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {screens[tab]||screens.map}
        <XPToast events={xpToasts}/>
        {levelUpModal&&<LevelUpModal level={levelUpModal} onDismiss={()=>setLevelUpModal(null)}/>}
        {requestModal&&<RequestModal target={requestModal} onSend={handleRequestSent} onClose={()=>setRequestModal(null)}/>}
        {pinSheet&&<PinSheet pin={pinSheet} isFriend={friends.some(f=>f.username===pinSheet.username)} onClose={()=>setPinSheet(null)} onSendRequest={t=>{setPinSheet(null);setRequestModal(t);}} onAddFriend={t=>{setPinSheet(null);handleAddFriend(t);}} onOpenChat={openChat} onViewProfile={viewProfile} onBlockReport={u=>setBlockReportTarget(u)}/>}
        {viewingUser&&<UserProfilePage user={viewingUser} isFriend={friends.some(f=>f.username===viewingUser.username)} isBlocked={blockedUsers.some(b=>b.username===viewingUser.username)} onBack={()=>setViewingUser(null)} onAddFriend={handleAddFriend} onSendRequest={t=>{setViewingUser(null);setRequestModal(t);}} onOpenChat={openChat} onBlockReport={u=>setBlockReportTarget(u)} onUnblock={u=>{handleUnblock(u);setViewingUser(null);}}/>}
        {notifOpen&&<NotifCenter notifs={notifs} onClose={()=>setNotifOpen(false)} onMarkAll={markAllRead}/>}
      </div>
      {safetyHubOpen&&<SafetyHubScreen friends={friends} blockedUsers={blockedUsers} trustedContacts={trustedContacts} locationPrecision={locationPrecision} onBack={()=>setSafetyHubOpen(false)} onSetPrecision={setLocationPrecision} onAddTrusted={handleAddTrusted} onRemoveTrusted={handleRemoveTrusted} onUnblock={handleUnblock}/>}
      {blockReportTarget&&<BlockReportModal target={blockReportTarget} onBlock={handleBlock} onReport={handleReport} onClose={()=>setBlockReportTarget(null)}/>}
      <BottomNav active={tab} onTab={goTab} inboxCount={inboxCount}/>
    </div>
  </Wrap>;
}

function Wrap({children}){return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'oklch(14% 0.02 265)'}}><div className="phone">{children}</div></div>;}

// Patch missing size prop in Avatar inline use
const _OrigAvatar = Avatar;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
