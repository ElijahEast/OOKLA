function xpForLevel(l){return Math.floor(100*Math.pow(l,1.5));}
function levelFromXp(xp){let l=1;while(xpForLevel(l+1)<=xp)l++;return l;}
function levelProgress(xp){
  const l=levelFromXp(xp), cur=l===1?0:xpForLevel(l), next=xpForLevel(l+1);
  return{level:l,pct:Math.round((xp-cur)/(next-cur)*100),into:xp-cur,needed:next-cur};
}
function fmtDist(m){return m<1000?`${m}m`:`${(m/1000).toFixed(1)}km`;}
function timeAgo(ms){
  const s=Math.floor((Date.now()-ms)/1000);
  if(s<60) return 'just now';
  if(s<3600) return `${Math.floor(s/60)}m ago`;
  if(s<86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

// ── API Service ───────────────────────────────────────────────────────────────
const API_URL = 'https://ookla-production.up.railway.app';

function getToken(){ return localStorage.getItem('lu_token'); }
function getRefreshToken(){ return localStorage.getItem('lu_refresh_token'); }
function setTokens(access, refresh){
  localStorage.setItem('lu_token', access);
  if(refresh) localStorage.setItem('lu_refresh_token', refresh);
}
function clearTokens(){
  localStorage.removeItem('lu_token');
  localStorage.removeItem('lu_refresh_token');
}

async function apiCall(endpoint, options = {}){
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if(token) headers['Authorization'] = `Bearer ${token}`;

  const res = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
  const data = await res.json().catch(() => ({}));

  // Handle token expiration
  if(res.status === 401 && data.code === 'TOKEN_EXPIRED'){
    const refreshed = await refreshToken();
    if(refreshed){
      headers['Authorization'] = `Bearer ${getToken()}`;
      const retry = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
      return retry.json().catch(() => ({}));
    }
  }

  if(!res.ok) throw { status: res.status, ...data };
  return data;
}

async function refreshToken(){
  const refresh = getRefreshToken();
  if(!refresh) return false;
  try {
    const res = await fetch(`${API_URL}/api/auth/refresh`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken: refresh })
    });
    if(!res.ok){ clearTokens(); return false; }
    const data = await res.json();
    setTokens(data.accessToken, data.refreshToken);
    return true;
  } catch { clearTokens(); return false; }
}

      body: JSON.stringify({ identifier, password })

  logout: () => apiCall('/api/auth/logout', { method: 'POST' }),

};

  updateProfile: (updates) => apiCall('/api/profiles/me', {

    body: JSON.stringify(updates)
  }),
};

// ── Error Boundary ─────────────────────────────────────────────────────────────
class GraphErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,errorMsg:''};}
  static getDerivedStateFromError(err){return{hasError:true,errorMsg:err?.message||'Unknown error'};}
  componentDidCatch(err,info){console.error('Graph crashed:',err,info);}
  render(){
    if(this.state.hasError){
      return <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,padding:24,background:C.bg}}>
        <div style={{fontSize:40}}>😵</div>
        <p style={{color:C.text,fontWeight:700,fontSize:15}}>Graph crashed</p>
        <p style={{color:C.muted,fontSize:12,textAlign:'center',maxWidth:250}}>{this.state.errorMsg}</p>
        <Btn small onClick={()=>this.setState({hasError:false,errorMsg:''})}>Reload Graph</Btn>
      </div>;
    }
    return this.props.children;
  }
}

function SignupScreen({onNavigate,onSuccess}){
  const[form,setForm]=useState({email:'',username:'',password:''});
  const[showPw,setShowPw]=useState(false);
  const[errors,setErrors]=useState({});
  const[loading,setLoading]=useState(false);
  const[apiError,setApiError]=useState('');
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  function validate(){
    const e={};
    if(!form.email.includes('@'))e.email='Valid email required';
    if(form.username.length<3)e.username='Username must be 3+ characters';
    if(form.password.length<8)e.password='Password must be 8+ characters';
    else if(!/[A-Z]/.test(form.password)||!/[0-9]/.test(form.password))e.password='Must include uppercase & number';
    return e;
  }

  async function handleSubmit(){
    const errs=validate();
    setErrors(errs);
    if(Object.keys(errs).length>0)return;
    setLoading(true);setApiError('');
    try{
      const res=await authAPI.signup(form.email,form.username,form.password);
      if(res.error||res.message){setApiError(res.error||res.message);setLoading(false);return;}
      setTokens(res.accessToken,res.refreshToken);
      onSuccess&&onSuccess(res.user);
    }catch(err){setApiError(err.message||'Signup failed');setLoading(false);}
  }

  return <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
    <StatusBar/>
    <div style={{padding:'20px 28px 0',display:'flex',alignItems:'center',gap:12}}>
      <button onClick={()=>onNavigate('splash')} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><Icon name="back" size={20} color={C.muted}/></button>
      <Wordmark/>
    </div>

      <h1 style={{fontSize:24,fontWeight:800,color:C.text,letterSpacing:'-0.02em',marginBottom:4}}>Create account</h1>
      <p style={{color:C.muted,fontSize:13,marginBottom:24}}>Join LinkUp and start meeting people nearby.</p>

      <AuthField label="Username" icon="user" value={form.username} onChange={set('username')} placeholder="@yourhandle" error={errors.username}/>
      <AuthField label="Password" icon="settings" type={showPw?'text':'password'} value={form.password} onChange={set('password')} placeholder="8+ chars, uppercase & number" error={errors.password} suffix={<button onClick={()=>setShowPw(v=>!v)} style={{background:'none',border:'none',cursor:'pointer',padding:4,display:'flex'}}><Icon name={showPw?'x':'search'} size={18} color={C.muted}/></button>}/>
      {apiError&&<div style={{background:`${C.error}18`,border:`1px solid ${C.error}55`,borderRadius:12,padding:'10px 14px',marginBottom:16}}><p style={{color:C.error,fontSize:13}}>{apiError}</p></div>}
      <p style={{fontSize:11,color:C.muted,textAlign:'center',lineHeight:1.6}}>By continuing you agree to our Terms & Privacy Policy.</p>
    </div>
    <div style={{padding:'16px 28px 40px'}}>
      <Btn onClick={handleSubmit} loading={loading}>Create Account</Btn>
      <p style={{textAlign:'center',color:C.muted,fontSize:13,marginTop:14}}>Already have an account? <span onClick={()=>onNavigate('login')} style={{color:C.accent,fontWeight:600,cursor:'pointer'}}>Sign in</span></p>
    </div>
  </div>;
}

// ── Meetup Verification System ────────────────────────────────────────────────
function QRCode({code}){
  // Deterministic pseudo-QR drawn from the code string
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    const size=160, cell=8, cols=size/cell;
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,size,size);
    // Seed from code chars
    const seed=code.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const rand=(i)=>((seed*i*2654435761)>>>0)%100;
    ctx.fillStyle='#111';
    // Position markers (top-left, top-right, bottom-left)
    [[0,0],[cols-7,0],[0,cols-7]].forEach(([ox,oy])=>{
      ctx.fillRect(ox*cell,oy*cell,7*cell,7*cell);
      ctx.fillStyle='#fff'; ctx.fillRect((ox+1)*cell,(oy+1)*cell,5*cell,5*cell);
      ctx.fillStyle='#111'; ctx.fillRect((ox+2)*cell,(oy+2)*cell,3*cell,3*cell);
      ctx.fillStyle='#111';
    });
    // Data cells
    for(let r=0;r<cols;r++) for(let c=0;c<cols;c++){
      const inMarker=(r<8&&c<8)||(r<8&&c>=cols-8)||(r>=cols-8&&c<8);
      if(!inMarker && rand(r*cols+c+1)>45){
        ctx.fillRect(c*cell,r*cell,cell,cell);
      }
    }
  },[code]);
  return <canvas ref={ref} width={160} height={160} style={{borderRadius:12,display:'block'}}/>;
}

        {/* ── DONE ── */}
        {step==='done'&&<div style={{padding:'30px 24px 40px',display:'flex',flexDirection:'column',alignItems:'center',gap:0,textAlign:'center',animation:'pop 0.4s ease'}}>
          <div style={{fontSize:60,marginBottom:12}}>🎉</div>
          <h3 style={{color:C.text,fontWeight:800,fontSize:22,letterSpacing:'-0.02em',marginBottom:6}}>Meetup Verified!</h3>
          <p style={{color:C.muted,fontSize:13,lineHeight:1.7,marginBottom:20}}>You and {partner.display_name} just made it official. Rewards have been added to both profiles.</p>
          <div style={{display:'flex',gap:12,marginBottom:24}}>
            {[{e:'⚡',v:'+50 XP'},{e:'🪙',v:'+5 coins'},{e:'🤝',v:'Meetup #1'}].map(r=>(
              <div key={r.v} style={{background:C.surface,borderRadius:14,padding:'12px',flex:1,border:`1px solid ${C.border}`,animation:'countUp 0.4s ease both'}}>
                <div style={{fontSize:22,marginBottom:4}}>{r.e}</div>
                <p style={{color:C.accent,fontWeight:800,fontSize:13}}>{r.v}</p>
              </div>
            ))}
          </div>
          <Btn onClick={()=>onComplete()}>Done</Btn>
        </div>}
      </div>
    </div>
  );
}
// ─────────────────────────────────────────────────────────────────────────────
// GROUP MEETUP VERIFY — all members must scan QR / enter code to unlock rewards
// ─────────────────────────────────────────────────────────────────────────────
function GroupMeetupVerifyModal({group,me,onComplete,onClose}){
  // Steps:
  //   role → host-code (host shows QR) | join-enter (others enter code)
  //   → gps → roster (waiting for remaining members) → done
  const members=group.members;                  // [{username,display_name,color,level,distance_m}]
  const [step,setStep]=useState('role');
  const [role,setRole]=useState(null);           // 'host' | 'join'
  const [code]=useState(()=>Math.random().toString(36).slice(2,8).toUpperCase());
  const [entered,setEntered]=useState('');
  const [codeError,setCodeError]=useState('');
  const [gpsProgress,setGpsProgress]=useState(0);
  const [gpsOk,setGpsOk]=useState(false);
  // verified: set of usernames who've completed their scan. Host auto-verifies on role pick;
  // "me" verifies when I finish my path. Others auto-fill over time to simulate a live group.
  const [verified,setVerified]=useState(new Set());
  const myName=me.username;

  // GPS sim
  useEffect(()=>{
    if(step!=='gps') return;
    setGpsProgress(0);
    const t=setInterval(()=>setGpsProgress(p=>{
      const next=p+3;
      if(next>=100){ clearInterval(t); setTimeout(()=>{ setGpsOk(true); setTimeout(()=>{
        // mark me verified + move to roster
        setVerified(prev=>{const n=new Set(prev);n.add(myName);return n;});
        setStep('roster');
      },600); },400); return 100; }
      return next;
    }),35);
    return()=>clearInterval(t);
  },[step]);

  // Simulated other-members verifying live in the roster step
  useEffect(()=>{
    if(step!=='roster') return;
    const others=members.filter(m=>m.username!==myName&&!verified.has(m.username));
    if(others.length===0) return;
    const timers=others.map((m,i)=>setTimeout(()=>{
      setVerified(prev=>{const n=new Set(prev);n.add(m.username);return n;});
    },1400+i*1200+Math.random()*600));
    return()=>timers.forEach(clearTimeout);
  },[step]);

  // When everyone verified, advance to done
  useEffect(()=>{
    if(step!=='roster') return;
    if(members.every(m=>verified.has(m.username))){
      const t=setTimeout(()=>setStep('done'),700);
      return()=>clearTimeout(t);
    }
  },[verified,step]);

  function handleRoleSelect(r){
    setRole(r);
    // host auto-verifies themselves (they generated the code)
    if(r==='host'){ setVerified(prev=>{const n=new Set(prev);n.add(myName);return n;}); }
    setStep(r==='host'?'host-code':'join-enter');
  }
  function handleJoinSubmit(){
    if(entered.trim().toUpperCase()===code){ setStep('gps'); setCodeError(''); }
    else if(entered.trim().length===6){ setCodeError("Code doesn't match. Try again."); }
    else { setCodeError('Enter the full 6-character code.'); }
  }

  const verifiedCount=verified.size;
  const total=members.length;
  const allDone=verifiedCount===total;

  return <div style={{position:'absolute',inset:0,zIndex:200,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.65)',animation:'fadeIn 0.2s'}}/>
    <div style={{position:'relative',background:C.bg,borderRadius:'28px 28px 0 0',animation:'slideUp 0.35s ease',border:`1px solid ${C.border}`,maxHeight:'92%',display:'flex',flexDirection:'column'}}>
      <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:'14px auto 0',flexShrink:0}}/>

      {/* Group summary header (shown on every step except done) */}
      {step!=='done'&&<div style={{padding:'14px 22px 0',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:38,height:38,borderRadius:11,background:`${C.accentL}`,border:`1px solid ${C.accent}55`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18}}>{group.emoji||'👥'}</div>
        <div style={{flex:1,minWidth:0}}>
          <p style={{color:C.text,fontWeight:800,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{group.name}</p>
          <p style={{color:C.muted,fontSize:11,marginTop:1}}>{total} members · all must verify</p>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><Icon name="x" size={16} color={C.muted}/></button>
      </div>}

      {/* ── ROLE ── */}
      {step==='role'&&<div style={{padding:'16px 24px 32px'}}>
        <h3 style={{color:C.text,fontWeight:800,fontSize:20,letterSpacing:'-0.02em',marginTop:12,marginBottom:6}}>Verify Group Meetup</h3>
        <p style={{color:C.muted,fontSize:13,lineHeight:1.6,marginBottom:20}}>
          Everyone in <strong style={{color:C.text}}>{group.name}</strong> must scan the QR or enter the code to earn rewards.
          One person generates the code; the rest scan it.
        </p>

        {/* Rewards preview */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:'11px 14px',marginBottom:18,display:'flex',justifyContent:'space-around'}}>
          {[{e:'⚡',v:'+75 XP'},{e:'🪙',v:'+8 coins'},{e:'🤝',v:`Group of ${total}`}].map(r=>(
            <div key={r.v} style={{textAlign:'center'}}>
              <div style={{fontSize:19}}>{r.e}</div>
              <p style={{color:C.accent,fontWeight:800,fontSize:12,marginTop:2}}>{r.v}</p>
            </div>
          ))}
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <button onClick={()=>handleRoleSelect('host')} style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:18,padding:'16px 18px',cursor:'pointer',textAlign:'left',display:'flex',gap:13,alignItems:'center',fontFamily:'inherit'}}>
            <div style={{width:44,height:44,borderRadius:13,background:C.accentL,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>📲</div>
            <div><p style={{color:C.text,fontWeight:700,fontSize:14}}>I'll generate the code</p><p style={{color:C.muted,fontSize:11,marginTop:2}}>Show QR for everyone else to scan</p></div>
          </button>
          <button onClick={()=>handleRoleSelect('join')} style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:18,padding:'16px 18px',cursor:'pointer',textAlign:'left',display:'flex',gap:13,alignItems:'center',fontFamily:'inherit'}}>
            <div style={{width:44,height:44,borderRadius:13,background:'oklch(62% 0.18 240/0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>🔍</div>
            <div><p style={{color:C.text,fontWeight:700,fontSize:14}}>I'll scan the code</p><p style={{color:C.muted,fontSize:11,marginTop:2}}>Enter the code someone else is showing</p></div>
          </button>
        </div>
      </div>}

      {/* ── HOST SHOWS QR ── */}
      {step==='host-code'&&<div style={{padding:'10px 24px 28px',display:'flex',flexDirection:'column',alignItems:'center'}}>
        <p style={{color:C.text,fontWeight:800,fontSize:17,marginTop:10,marginBottom:4}}>Your Group Code</p>
        <p style={{color:C.muted,fontSize:12,marginBottom:14,textAlign:'center'}}>Each of the other {total-1} members must scan to unlock rewards</p>
        <div style={{background:'#fff',borderRadius:18,padding:12,marginBottom:14,boxShadow:'0 8px 28px rgba(0,0,0,0.3)',position:'relative',overflow:'hidden'}}>
          <QRCode code={code}/>
          <div style={{position:'absolute',left:12,right:12,height:2,background:`linear-gradient(90deg,transparent,${C.accent},transparent)`,animation:'scanline 2s ease-in-out infinite',boxShadow:`0 0 8px ${C.accent}`}}/>
        </div>
        <p style={{color:C.muted,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>Or enter manually</p>
        <div style={{display:'flex',gap:6,marginBottom:16}}>
          {code.split('').map((ch,i)=>(
            <div key={i} style={{width:34,height:42,borderRadius:10,background:C.surface,border:`1.5px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:800,color:C.accent}}>{ch}</div>
          ))}
        </div>
        <Btn onClick={()=>setStep('gps')}>Everyone has it — continue →</Btn>
      </div>}

      {/* ── JOIN ENTER CODE ── */}
      {step==='join-enter'&&<div style={{padding:'14px 24px 30px'}}>
        <p style={{color:C.text,fontWeight:800,fontSize:17,marginTop:8,marginBottom:4}}>Enter Group Code</p>
        <p style={{color:C.muted,fontSize:12,lineHeight:1.55,marginBottom:16}}>Ask whoever is hosting to show their code</p>
        <div style={{display:'flex',gap:6,marginBottom:8,justifyContent:'center'}}>
          {[...Array(6)].map((_,i)=>(
            <div key={i} style={{width:38,height:46,borderRadius:10,background:C.surface,border:`1.5px solid ${entered[i]?C.accent:C.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:800,color:C.accent,transition:'border-color 0.2s'}}>
              {entered[i]||''}
            </div>
          ))}
        </div>
        <input value={entered} onChange={e=>setEntered(e.target.value.toUpperCase().slice(0,6))} placeholder="Type code here" maxLength={6}
          style={{width:'100%',background:C.surface,border:`1.5px solid ${codeError?C.error:C.border}`,borderRadius:13,padding:'11px 16px',color:C.text,fontSize:16,fontFamily:'inherit',fontWeight:700,letterSpacing:'0.15em',textAlign:'center',outline:'none',marginBottom:8}}
          autoFocus/>
        {codeError&&<p style={{color:C.error,fontSize:12,textAlign:'center',marginBottom:8}}>{codeError}</p>}
        <div style={{marginTop:10}}><Btn onClick={handleJoinSubmit} disabled={entered.length!==6}>Verify Code</Btn></div>
      </div>}

      {/* ── GPS ── */}
      {step==='gps'&&<div style={{padding:'10px 24px 30px',display:'flex',flexDirection:'column',alignItems:'center'}}>
        <p style={{color:C.text,fontWeight:800,fontSize:17,marginTop:4,marginBottom:4}}>Verifying Location</p>
        <p style={{color:C.muted,fontSize:12,marginBottom:20,textAlign:'center'}}>Confirming you're all in the same place…</p>
        <div style={{width:110,height:110,position:'relative',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:18}}>
          {[0,1,2].map(i=>(
            <div key={i} style={{position:'absolute',inset:i*-16,borderRadius:'50%',border:`1.5px solid ${C.accent}`,opacity:(1-i*0.28)*0.6,animation:`gpsRing ${1.2+i*0.4}s ease-out ${i*0.3}s infinite`}}/>
          ))}
          <div style={{width:56,height:56,borderRadius:'50%',background:C.accentL,border:`2px solid ${C.accent}`,display:'flex',alignItems:'center',justifyContent:'center',zIndex:1}}>
            <Icon name="location" size={26} color={C.accent}/>
          </div>
        </div>
        <div style={{width:'100%',marginBottom:6}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <span style={{color:C.muted,fontSize:12}}>GPS lock</span>
            <span style={{color:gpsOk?C.success:C.accent,fontSize:12,fontWeight:700}}>{gpsProgress}%</span>
          </div>
          <div style={{height:5,background:C.border,borderRadius:99}}>
            <div style={{height:'100%',width:`${gpsProgress}%`,background:gpsOk?C.success:`linear-gradient(90deg,${C.accent},oklch(62% 0.22 55))`,borderRadius:99,transition:'width 0.1s'}}/>
          </div>
        </div>
      </div>}

      {/* ── ROSTER: waiting for remaining members ── */}
      {step==='roster'&&<div style={{padding:'6px 24px 26px'}}>
        <div style={{textAlign:'center',marginTop:6,marginBottom:14}}>
          <p style={{color:C.text,fontWeight:800,fontSize:18}}>Waiting for the group</p>
          <p style={{color:C.muted,fontSize:12,marginTop:3}}>{verifiedCount} of {total} verified · everyone must scan to earn rewards</p>
        </div>

        {/* progress bar */}
        <div style={{height:5,background:C.border,borderRadius:99,marginBottom:14,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${(verifiedCount/total)*100}%`,background:allDone?C.success:`linear-gradient(90deg,${C.accent},oklch(62% 0.22 55))`,borderRadius:99,transition:'width 0.5s'}}/>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:7,maxHeight:'38vh',overflow:'auto'}}>
          {members.map((m,i)=>{
            const isVer=verified.has(m.username);
            const isMe=m.username===myName;
            return <div key={m.username} style={{display:'flex',gap:11,alignItems:'center',padding:'9px 13px',background:C.surface,borderRadius:13,border:`1px solid ${isVer?'oklch(62% 0.18 145/0.35)':C.border}`,transition:'all 0.4s',animation:`fadeUp 0.3s ease ${i*0.05}s both`}}>
              <div style={{position:'relative'}}>
                <div style={{width:32,height:32,borderRadius:'50%',background:m.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#fff'}}>
                  {m.display_name[0]}
                </div>
                {isVer&&<div style={{position:'absolute',bottom:-2,right:-2,width:14,height:14,borderRadius:'50%',background:C.success,border:`2px solid ${C.bg}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="4" strokeLinecap="round"><path d="M5 13l4 4 10-10"/></svg>
                </div>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{color:C.text,fontWeight:700,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.display_name}{isMe&&<span style={{color:C.muted,fontWeight:500}}> · you</span>}</p>
                <p style={{color:isVer?C.success:C.muted,fontSize:11,marginTop:1,fontWeight:isVer?600:400}}>{isVer?'✓ Verified':'Scanning code…'}</p>
              </div>
              {!isVer&&<Spinner color={C.muted} size={14}/>}
            </div>;
          })}
        </div>
      </div>}

      {/* ── DONE ── */}
      {step==='done'&&<div style={{padding:'26px 24px 38px',display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',animation:'pop 0.4s ease'}}>
        <div style={{fontSize:58,marginBottom:10}}>🎉</div>
        <h3 style={{color:C.text,fontWeight:800,fontSize:22,letterSpacing:'-0.02em',marginBottom:6}}>Group Meetup Verified!</h3>
        <p style={{color:C.muted,fontSize:13,lineHeight:1.65,marginBottom:18}}>All {total} members of <strong style={{color:C.text}}>{group.name}</strong> just made it official. Rewards added to everyone's profile.</p>
        <div style={{display:'flex',gap:10,marginBottom:22}}>
          {[{e:'⚡',v:'+75 XP'},{e:'🪙',v:'+8 coins'},{e:'👥',v:`Group #${1}`}].map(r=>(
            <div key={r.v} style={{background:C.surface,borderRadius:14,padding:'11px 14px',border:`1px solid ${C.border}`,animation:'countUp 0.4s ease both'}}>
              <div style={{fontSize:21,marginBottom:3}}>{r.e}</div>
              <p style={{color:C.accent,fontWeight:800,fontSize:12}}>{r.v}</p>
            </div>
          ))}
        </div>
        <Btn onClick={onComplete}>Done</Btn>
      </div>}
    </div>
  </div>;
}

// GROUP CHAT SCREEN

function GroupChatScreen({group,me,goldTheme,onBack,onMeetupVerified,onLeave}){
  const [msgs,setMsgs]=useState(()=>[
    {id:1,from:'system',body:`🎉 ${group.name} created · ${group.members.length} members`,time:'now'},
    {id:2,from:group.members[0]?.username,body:"Let's pick a spot!",time:'2:40 PM'},
    {id:3,from:group.members[1]?.username,body:"I'm down for coffee ☕",time:'2:41 PM'},
  ].filter(m=>m.body));
  const [input,setInput]=useState('');
  const [showVerify,setShowVerify]=useState(false);
  const [meetupDone,setMeetupDone]=useState(false);
  const [showMembers,setShowMembers]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs]);

  const memberByUser=Object.fromEntries(group.members.map(m=>[m.username,m]));

  function send(){
    if(!input.trim()) return;
    const now=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    setMsgs(m=>[...m,{id:Date.now(),from:'me',body:input.trim(),time:now}]);
    setInput('');
    const others=group.members.filter(m=>m.username!==me.username);
    const replies=['Sounds good!','I\'m in 🙌','Lmk where','See you soon!','On my way 🚶'];
    setTimeout(()=>{
      const r=others[Math.floor(Math.random()*others.length)];
      const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      setMsgs(m=>[...m,{id:Date.now()+1,from:r.username,body:replies[Math.floor(Math.random()*replies.length)],time:t}]);
    },1100+Math.random()*700);
  }

  function handleVerifyComplete(){
    setShowVerify(false);
    setMeetupDone(true);
    const now=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    setMsgs(m=>[...m,{id:Date.now(),from:'system',body:`✅ Group meetup verified! +75 XP to all ${group.members.length} members.`,time:now}]);
    onMeetupVerified&&onMeetupVerified(group);
  }

  const bubbleMine=goldTheme?{background:`linear-gradient(135deg,${C.gold},oklch(70% 0.18 55))`,color:'#1a1008'}:{background:C.accent,color:'#fff'};

  return <div style={{height:'100%',display:'flex',flexDirection:'column',animation:'slideRight 0.25s ease',position:'relative'}}>
    <StatusBar/>
    <div style={{padding:'10px 16px 12px',display:'flex',alignItems:'center',gap:11,borderBottom:`1px solid ${C.border}`}}>
      <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',padding:4,display:'flex'}}><Icon name="back" size={20} color={C.muted}/></button>
      {/* stacked avatars */}
      <button onClick={()=>setShowMembers(true)} style={{background:'none',border:'none',padding:0,cursor:'pointer',display:'flex',alignItems:'center'}}>
        {group.members.slice(0,3).map((m,i)=>(
          <div key={m.username} style={{width:30,height:30,borderRadius:'50%',background:m.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#fff',border:`2px solid ${C.bg}`,marginLeft:i===0?0:-10,zIndex:3-i}}>
            {m.display_name[0]}
          </div>
        ))}
        {group.members.length>3&&<div style={{width:30,height:30,borderRadius:'50%',background:C.surface,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:C.muted,border:`2px solid ${C.bg}`,marginLeft:-10}}>+{group.members.length-3}</div>}
      </button>
      <div style={{flex:1,minWidth:0,marginLeft:4}}>
        <p style={{color:C.text,fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{group.name}</p>
        <p style={{color:C.muted,fontSize:11,marginTop:1}}>{group.members.length} members · tap to view</p>
      </div>
      <button onClick={()=>setShowMembers(true)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,padding:'5px 9px',cursor:'pointer',color:C.muted,fontSize:11,fontWeight:700,fontFamily:'inherit'}}>Info</button>
    </div>
    <div style={{flex:1,overflow:'auto',padding:'12px 12px',display:'flex',flexDirection:'column',gap:8}}>
      <div style={{textAlign:'center',marginBottom:2}}><span style={{background:C.surface,borderRadius:20,padding:'4px 12px',color:C.muted,fontSize:11,border:`1px solid ${C.border}`}}>Today · Group chat started 🎉</span></div>
      {msgs.map(m=>{
        if(m.from==='system') return <div key={m.id} style={{textAlign:'center'}}><span style={{background:'oklch(62% 0.18 145/0.12)',border:'1px solid oklch(62% 0.18 145/0.3)',borderRadius:20,padding:'6px 14px',color:C.success,fontSize:12,fontWeight:600}}>{m.body}</span></div>;
        const mine=m.from==='me';
        const member=mine?null:memberByUser[m.from];
        const color=member?.color||C.muted;
        return <div key={m.id} style={{display:'flex',justifyContent:mine?'flex-end':'flex-start',gap:7,animation:'fadeUp 0.2s ease'}}>
          {!mine&&<div style={{width:24,height:24,borderRadius:'50%',background:color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:'#fff',flexShrink:0,alignSelf:'flex-end'}}>{member?.display_name?.[0]||'?'}</div>}
          <div style={{maxWidth:'72%'}}>
            {!mine&&<p style={{color:color,fontSize:10,fontWeight:700,marginBottom:2,marginLeft:4}}>{member?.display_name||m.from}</p>}
            <div style={{...(mine?bubbleMine:{background:C.surface,color:C.text}),padding:'9px 13px',borderRadius:mine?'17px 17px 4px 17px':'17px 17px 17px 4px',fontSize:13.5,lineHeight:1.5,border:!mine?`1px solid ${C.border}`:'none'}}>{m.body}</div>
            <p style={{color:C.muted,fontSize:10,marginTop:2,textAlign:mine?'right':'left'}}>{m.time}</p>
          </div>
        </div>;
      })}
      <div ref={bottomRef}/>
    </div>

    {!meetupDone
      ?<div style={{margin:'0 13px 8px',background:'oklch(62% 0.18 145/0.08)',border:`1px solid oklch(62% 0.18 145/0.22)`,borderRadius:13,padding:'10px 13px',display:'flex',alignItems:'center',gap:9}}>

function ChatScreen({partner,goldTheme,onBack,onMeetupVerified,onOpenSafety}){
  const [msgs,setMsgs]=useState([
    {id:1,from:'them',body:"Hey! Glad you accepted 😊",time:'2:41 PM'},
    {id:2,from:'me',body:"Same! Where are you?",time:'2:42 PM'},
    {id:3,from:'them',body:"Outside the coffee shop on Main St — green awning",time:'2:43 PM'},
    {id:4,from:'me',body:"Perfect, I'll be there in 5 min 🚶",time:'2:43 PM'},
  ]);
  const [input,setInput]=useState('');
  const [showVerify,setShowVerify]=useState(false);
  const [meetupDone,setMeetupDone]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs]);

  function send(){
    if(!input.trim()) return;
    const now=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    setMsgs(m=>[...m,{id:Date.now(),from:'me',body:input.trim(),time:now}]);
    setInput('');
    const replies=["On my way!","Sounds good 👍","See you soon!","Can't wait 🙌","😄"];
    setTimeout(()=>{
      const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      setMsgs(m=>[...m,{id:Date.now()+1,from:'them',body:replies[Math.floor(Math.random()*replies.length)],time:t}]);
    },1000+Math.random()*800);
  }

  function handleVerifyComplete(){
    setShowVerify(false);
    setMeetupDone(true);
    const now=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    setMsgs(m=>[...m,{id:Date.now(),from:'system',body:'✅ Meetup verified! +50 XP awarded to both.',time:now}]);
    if(onMeetupVerified) onMeetupVerified();
  }

  const bubbleMine=goldTheme?{background:`linear-gradient(135deg,${C.gold},oklch(70% 0.18 55))`,color:'#1a1008'}:{background:C.accent,color:'#fff'};

  return <div style={{height:'100%',display:'flex',flexDirection:'column',animation:'slideRight 0.25s ease',position:'relative'}}>
    <StatusBar/>
    <div style={{padding:'10px 18px 12px',display:'flex',alignItems:'center',gap:12,borderBottom:`1px solid ${C.border}`}}>
      <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',padding:4,display:'flex'}}><Icon name="back" size={20} color={C.muted}/></button>
      <Avatar name={partner.display_name} color={partner.color} size={36}/>
      <div style={{flex:1}}>
        <p style={{color:C.text,fontWeight:700,fontSize:15}}>{partner.display_name}</p>
        <div style={{display:'flex',gap:4,alignItems:'center'}}><div style={{width:6,height:6,borderRadius:'50%',background:C.success}}/><p style={{color:C.muted,fontSize:11}}>Active now · {fmtDist(partner.distance_m||450)}</p></div>
      </div>
      <div style={{background:C.accentG,borderRadius:9,padding:'3px 9px'}}><span style={{color:C.accent,fontSize:11,fontWeight:700}}>Lv {partner.level}</span></div>
      <button onClick={onOpenSafety} style={{background:`${C.success}18`,border:`1px solid ${C.success}44`,borderRadius:9,padding:'4px 9px',cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:13}}>🛡️</span><span style={{color:C.success,fontSize:11,fontWeight:700}}>Safety</span>
      </button>
    </div>
    <div style={{flex:1,overflow:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:9}}>
      <div style={{textAlign:'center',marginBottom:4}}><span style={{background:C.surface,borderRadius:20,padding:'4px 12px',color:C.muted,fontSize:11,border:`1px solid ${C.border}`}}>Today · Meetup accepted 🎉</span></div>
      {msgs.map(m=>(
        m.from==='system'
          ?<div key={m.id} style={{textAlign:'center'}}><span style={{background:'oklch(62% 0.18 145/0.12)',border:'1px solid oklch(62% 0.18 145/0.3)',borderRadius:20,padding:'6px 14px',color:C.success,fontSize:12,fontWeight:600}}>{m.body}</span></div>
          :<div key={m.id} style={{display:'flex',justifyContent:m.from==='me'?'flex-end':'flex-start',gap:7,animation:'fadeUp 0.2s ease'}}>
            {m.from==='them'&&<Avatar name={partner.display_name} color={partner.color} size={26}/>}
            <div style={{maxWidth:'73%'}}>
              <div style={{...(m.from==='me'?bubbleMine:{background:C.surface,color:C.text}),padding:'9px 13px',borderRadius:m.from==='me'?'17px 17px 4px 17px':'17px 17px 17px 4px',fontSize:14,lineHeight:1.5,border:m.from!=='me'?`1px solid ${C.border}`:'none'}}>{m.body}</div>
              <p style={{color:C.muted,fontSize:10,marginTop:2,textAlign:m.from==='me'?'right':'left'}}>{m.time}</p>
            </div>
          </div>
      ))}
      <div ref={bottomRef}/>
    </div>

    {!meetupDone
      ?<div style={{margin:'0 13px 9px',background:'oklch(62% 0.18 145/0.08)',border:`1px solid oklch(62% 0.18 145/0.22)`,borderRadius:13,padding:'10px 13px',display:'flex',alignItems:'center',gap:9}}>
        <span style={{fontSize:16}}>📍</span>
        <p style={{color:C.muted,fontSize:12,flex:1}}>Met up? Verify with <span style={{color:C.success,fontWeight:700}}>QR + GPS</span></p>
        <button onClick={()=>setShowVerify(true)} style={{background:C.success,border:'none',borderRadius:8,padding:'5px 11px',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',flexShrink:0}}>Verify</button>
      </div>
      :<div style={{margin:'0 13px 9px',background:'oklch(62% 0.18 145/0.12)',border:`1px solid oklch(62% 0.18 145/0.3)`,borderRadius:13,padding:'10px 14px',display:'flex',alignItems:'center',gap:9}}>
        <span style={{fontSize:18}}>✅</span>
        <p style={{color:C.success,fontSize:13,fontWeight:700}}>Meetup verified! Rewards collected.</p>
      </div>
    }

    <div style={{padding:'0 13px 26px',display:'flex',gap:8,alignItems:'center'}}>
      <div style={{flex:1,background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:22,padding:'9px 15px'}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send();}} placeholder="Message..." style={{width:'100%',background:'none',border:'none',outline:'none',color:C.text,fontSize:14,fontFamily:'inherit'}}/>
      </div>
      <button onClick={send} style={{width:40,height:40,borderRadius:'50%',background:input.trim()?C.accent:C.border,border:'none',cursor:input.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.2s',flexShrink:0}}><Icon name="send" size={15} color="#fff"/></button>
    </div>

    {showVerify&&<MeetupVerifyModal partner={partner} onComplete={handleVerifyComplete} onClose={()=>setShowVerify(false)}/>}
  </div>;
}

function ExploreSwitcher({view,onChange}){
  const tabs=[{id:'map',label:'Map',icon:'map'},{id:'graph',label:'Graph',icon:'network'}];

            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <p style={{color:C.text,fontWeight:700,fontSize:13}}>{selectedPin.display_name}</p>
              <span style={{background:C.accentG,color:C.accent,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px'}}>Lv {selectedPin.level}</span>
            </div>
            <p style={{color:C.muted,fontSize:11}}>{selectedPin.distance_m}m away</p>
          </div>
          <Btn small full={false} onClick={()=>onPinSelect(selectedPin)} style={{paddingLeft:11,paddingRight:11}}>View</Btn>
        </div>
      </div>}
    </div>
    <div style={{padding:'8px 13px 0',flexShrink:0}}>
      <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:8}}>
        {filtered.map(u=>{
          const isFriend=friends.some(f=>f.username===u.username);
          return <div key={u.id} onClick={()=>setSelectedPin(selectedPin?.id===u.id?null:u)} style={{flexShrink:0,width:106,background:selectedPin?.id===u.id?C.accentL:C.surface,borderRadius:13,padding:9,border:`1.5px solid ${selectedPin?.id===u.id?C.accent:isFriend?'oklch(62% 0.18 145/0.4)':C.border}`,cursor:'pointer',transition:'all 0.15s'}}>
            <div style={{position:'relative',display:'inline-block'}}>
              <Avatar name={u.display_name} color={u.color} size={28}/>
              {isFriend&&<div style={{position:'absolute',bottom:-1,right:-1,width:9,height:9,borderRadius:'50%',background:C.success,border:`2px solid ${C.surface}`}}/>}
            </div>
            <p style={{color:C.text,fontWeight:700,fontSize:11,marginTop:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.display_name}</p>
            <p style={{color:C.muted,fontSize:10,marginTop:1}}>{fmtDist(u.distance_m)}</p>
          </div>;
        })}
      </div>
    </div>
    <InboxNotif requests={incomingRequests} onAccept={onAccept} onDecline={onDecline}/>
  </div>;
}

// ─────────────────────────────────────────────────────────────────────────────
// PEOPLE  (Friends | Nearby | Inbox)
// ─────────────────────────────────────────────────────────────────────────────
function PeopleScreen({friends,groups,incomingRequests,friendRequests,blockedUsers,onRequestUser,onAddFriend,onAcceptMeetup,onDeclineMeetup,onAcceptFriend,onDeclineFriend,onOpenChat,onOpenGroup,onCreateGroup,onViewProfile,onUnblock}){
  const [tab,setTab]=useState('friends');
  const [query,setQuery]=useState('');
  const [showCreate,setShowCreate]=useState(false);
  const results=query.trim().length>0?ALL_USERS.filter(u=>u.display_name.toLowerCase().includes(query.toLowerCase())||u.username.toLowerCase().includes(query.toLowerCase())):[];
  const tabs=[
    {id:'friends',label:'Friends'},
    {id:'groups', label:'Groups',badge:groups.length},
    {id:'nearby', label:'Nearby'},
    {id:'inbox',  label:'Inbox',badge:incomingRequests.length+friendRequests.length},
  ];

  return <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
    <StatusBar/>
    <div style={{padding:'12px 20px 0'}}><h2 style={{color:C.text,fontWeight:800,fontSize:20,letterSpacing:'-0.02em'}}>People</h2></div>

    {/* Search bar */}
    <div style={{margin:'10px 18px 0',background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:14,padding:'0 14px',height:44,display:'flex',alignItems:'center',gap:9}}>
      <Icon name="search" size={16} color={C.muted}/>
      <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search people..." style={{flex:1,background:'none',border:'none',outline:'none',color:C.text,fontSize:14,fontFamily:'inherit',fontWeight:500}}/>
      {query&&<button onClick={()=>setQuery('')} style={{background:'none',border:'none',cursor:'pointer',display:'flex'}}><Icon name="x" size={15} color={C.muted}/></button>}
    </div>

    {query.trim().length>0?<div style={{flex:1,overflow:'auto',padding:'10px 15px'}}>
      {results.length===0?<div style={{textAlign:'center',paddingTop:40}}><p style={{color:C.muted}}>No results for "{query}"</p></div>
        :results.map((u,i)=>{
          const isFriend=friends.some(f=>f.username===u.username);
          return <div key={u.id} onClick={()=>onViewProfile(u)} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 13px',background:C.surface,borderRadius:15,marginBottom:8,border:`1px solid ${C.border}`,cursor:'pointer',animation:`fadeUp 0.2s ease ${i*0.05}s both`}}>
            <Avatar name={u.display_name} color={u.color} size={44}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}><p style={{color:C.text,fontWeight:700,fontSize:14}}>{u.display_name}</p><span style={{background:C.accentG,color:C.accent,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px',flexShrink:0}}>Lv {u.level}</span>{isFriend&&<span style={{background:'oklch(62% 0.18 145/0.15)',color:C.success,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px'}}>Friend</span>}</div>
              <p style={{color:C.muted,fontSize:12,marginTop:1}}>@{u.username} · {fmtDist(u.distance_m)}</p>
            </div>
            <Icon name="arrow" size={15} color={C.muted}/>
          </div>;
        })}
    </div>:<>
      {/* Tabs */}
      <div style={{display:'flex',gap:0,margin:'8px 18px',background:C.surface,borderRadius:13,padding:4,flexShrink:0}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'7px 4px',borderRadius:10,border:'none',background:tab===t.id?C.accent:'none',color:tab===t.id?'#fff':C.muted,fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s',position:'relative'}}>
          {t.label}{t.badge>0&&<span style={{marginLeft:4,background:tab===t.id?'rgba(255,255,255,0.3)':C.error,borderRadius:99,padding:'1px 5px',fontSize:10,color:'#fff'}}>{t.badge}</span>}
        </button>)}
      </div>
      <div style={{flex:1,overflow:'auto',padding:'0 15px'}}>
        {tab==='friends'&&(friends.length===0
          ?<div style={{textAlign:'center',paddingTop:50}}><div style={{fontSize:38,marginBottom:10}}>🤝</div><p style={{color:C.text,fontWeight:700,fontSize:15,marginBottom:5}}>No friends yet</p><p style={{color:C.muted,fontSize:13}}>Tap a pin on the map or use search to add friends</p></div>
          :friends.map((f,i)=><div key={f.username} onClick={()=>onViewProfile(f)} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 13px',background:C.surface,borderRadius:15,marginBottom:8,border:`1px solid ${C.border}`,cursor:'pointer',animation:`fadeUp 0.3s ease ${i*0.06}s both`}}>
            <div style={{position:'relative'}}><Avatar name={f.display_name} color={f.color} size={44}/><div style={{position:'absolute',bottom:1,right:1,width:10,height:10,borderRadius:'50%',background:C.success,border:`2px solid ${C.surface}`}}/></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}><p style={{color:C.text,fontWeight:700,fontSize:14}}>{f.display_name}</p><span style={{background:C.accentG,color:C.accent,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px'}}>Lv {f.level}</span></div>
              <p style={{color:C.muted,fontSize:11,marginTop:2}}>@{f.username} · {fmtDist(f.distance_m||950)}</p>
            </div>
            <Btn small full={false} variant="subtle" onClick={e=>{e.stopPropagation();onOpenChat(f);}} style={{paddingLeft:9,paddingRight:9}}><Icon name="chat" size={14} color={C.accent}/></Btn>
          </div>)
        )}

        {tab==='groups'&&<>
          {/* Create Group CTA */}
          <button onClick={()=>setShowCreate(true)} disabled={friends.length<2} style={{width:'100%',background:friends.length<2?C.surface:`linear-gradient(135deg,${C.accent},oklch(62% 0.22 55))`,border:friends.length<2?`1.5px dashed ${C.border}`:'none',borderRadius:15,padding:'13px 14px',cursor:friends.length<2?'not-allowed':'pointer',display:'flex',alignItems:'center',gap:11,marginBottom:10,fontFamily:'inherit',opacity:friends.length<2?0.55:1}}>
            <div style={{width:40,height:40,borderRadius:12,background:friends.length<2?C.border:'rgba(255,255,255,0.22)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{friends.length<2?'👥':'+'}</div>
            <div style={{flex:1,textAlign:'left'}}>
              <p style={{color:friends.length<2?C.muted:'#fff',fontWeight:800,fontSize:14}}>New Group Chat</p>
              <p style={{color:friends.length<2?C.muted:'rgba(255,255,255,0.85)',fontSize:11,marginTop:1}}>{friends.length<2?'Add at least 2 friends to start a group':'Meet up with multiple friends at once'}</p>
            </div>
          </button>

          {groups.length===0
            ?<div style={{textAlign:'center',paddingTop:28}}>
              <div style={{fontSize:38,marginBottom:10}}>👥</div>
              <p style={{color:C.text,fontWeight:700,fontSize:15,marginBottom:5}}>No group chats yet</p>
              <p style={{color:C.muted,fontSize:12,padding:'0 30px',lineHeight:1.5}}>Create one above, or multi-select friends in the Graph view</p>
            </div>
            :groups.map((g,i)=>(
              <div key={g.id} onClick={()=>onOpenGroup(g)} style={{display:'flex',alignItems:'center',gap:11,padding:'11px 13px',background:C.surface,borderRadius:15,marginBottom:8,border:`1px solid ${C.border}`,cursor:'pointer',animation:`fadeUp 0.3s ease ${i*0.06}s both`}}>
                <div style={{width:44,height:44,borderRadius:13,background:C.accentL,border:`1px solid ${C.accent}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{g.emoji||'👥'}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}><p style={{color:C.text,fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.name}</p>{g.verified&&<span style={{background:'oklch(62% 0.18 145/0.15)',color:C.success,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px',flexShrink:0}}>✓ Met</span>}</div>
                  <p style={{color:C.muted,fontSize:11,marginTop:2}}>{g.members.length} members · {g.members.filter(m=>m.username!=='you').slice(0,3).map(m=>m.display_name.split(' ')[0]).join(', ')}{g.members.length>4?'…':''}</p>
                </div>
                <div style={{display:'flex',alignItems:'center',marginRight:-4}}>
                  {g.members.slice(0,3).map((m,j)=>(
                    <div key={m.username} style={{width:22,height:22,borderRadius:'50%',background:m.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:'#fff',border:`2px solid ${C.surface}`,marginLeft:j===0?0:-8}}>
                      {m.display_name[0]}
                    </div>
                  ))}
                </div>
                <Icon name="arrow" size={15} color={C.muted}/>
              </div>
            ))
          }
        </>}

        {tab==='nearby'&&ALL_USERS.map((u,i)=>{
          const isFriend=friends.some(f=>f.username===u.username);
          return <div key={u.id} onClick={()=>onViewProfile(u)} style={{display:'flex',alignItems:'center',gap:11,padding:'11px 13px',background:C.surface,borderRadius:15,marginBottom:8,border:`1px solid ${isFriend?'oklch(62% 0.18 145/0.3)':C.border}`,cursor:'pointer',animation:`fadeUp 0.3s ease ${i*0.06}s both`}}>
            <div style={{position:'relative'}}><Avatar name={u.display_name} color={u.color} size={44}/>{isFriend&&<div style={{position:'absolute',bottom:1,right:1,width:10,height:10,borderRadius:'50%',background:C.success,border:`2px solid ${C.surface}`}}/>}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}><p style={{color:C.text,fontWeight:700,fontSize:14}}>{u.display_name}</p><span style={{background:C.accentG,color:C.accent,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px'}}>Lv {u.level}</span>{isFriend&&<span style={{background:'oklch(62% 0.18 145/0.12)',color:C.success,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px'}}>Friend</span>}</div>
              <p style={{color:C.muted,fontSize:11,marginTop:2}}>{fmtDist(u.distance_m)} · {u.xp} XP</p>
            </div>
            <div style={{display:'flex',gap:6}} onClick={e=>e.stopPropagation()}>
              {!isFriend&&<Btn small full={false} variant="ghost" onClick={()=>onAddFriend(u)} style={{paddingLeft:8,paddingRight:8}}><Icon name="userplus" size={13} color={C.muted}/></Btn>}
              <Btn small full={false} variant={isFriend?'subtle':'primary'} onClick={()=>isFriend?onOpenChat(u):onRequestUser(u)} style={{paddingLeft:9,paddingRight:9}}>
                {isFriend?<Icon name="chat" size={13} color={C.accent}/>:<span>👋</span>}
              </Btn>
            </div>
          </div>;
        })}
        {tab==='inbox'&&(incomingRequests.length===0&&friendRequests.length===0
          ?<div style={{textAlign:'center',paddingTop:50}}><div style={{fontSize:34,marginBottom:8}}>📭</div><p style={{color:C.muted,fontSize:13}}>No pending requests</p></div>
          :<>
            {friendRequests.length>0&&<>
              <p style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:9,marginTop:4}}>Friend Requests</p>
              {friendRequests.map((req,i)=><div key={req.id} style={{background:C.surface,borderRadius:15,padding:'13px',marginBottom:8,border:`1.5px solid oklch(62% 0.18 145/0.28)`,animation:`fadeUp 0.3s ease ${i*0.06}s both`}}>
                <div style={{display:'flex',gap:11,alignItems:'center',marginBottom:10}}><Avatar name={req.display_name} color={req.color} size={42}/><div style={{flex:1}}><p style={{color:C.text,fontWeight:700,fontSize:14}}>{req.display_name}</p><p style={{color:C.muted,fontSize:12}}>@{req.username} · Lv {req.level}</p></div><Icon name="userplus" size={17} color={C.success}/></div>
                <div style={{display:'flex',gap:8}}><Btn variant="danger" full={false} style={{flex:1}} small onClick={()=>onDeclineFriend(req.id)}><Icon name="x" size={12} color={C.error}/>Decline</Btn><Btn full={false} style={{flex:2}} small onClick={()=>onAcceptFriend(req.id)}><Icon name="check" size={12} color="#fff"/>Accept +10 XP</Btn></div>
              </div>)}
            </>}
            {incomingRequests.length>0&&<>
              <p style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:9,marginTop:friendRequests.length>0?12:4}}>LinkUp Requests</p>
              {incomingRequests.map((req,i)=><div key={req.id} style={{background:C.surface,borderRadius:15,padding:'13px',marginBottom:8,border:`1.5px solid ${C.accent}44`,animation:`fadeUp 0.3s ease ${i*0.06}s both`}}>
                <div style={{display:'flex',gap:11,alignItems:'center',marginBottom:req.message?9:10}}><Avatar name={req.sender_name} color={req.color} size={42}/><div style={{flex:1}}><p style={{color:C.text,fontWeight:700,fontSize:14}}>{req.sender_name}</p><p style={{color:C.muted,fontSize:12}}>{req.distance_m}m away</p></div></div>
                {req.message&&<p style={{color:C.muted,fontSize:12,fontStyle:'italic',marginBottom:10}}>"{req.message}"</p>}
                <div style={{display:'flex',gap:8}}><Btn variant="danger" full={false} style={{flex:1}} small onClick={()=>onDeclineMeetup(req.id)}><Icon name="x" size={12} color={C.error}/>Decline</Btn><Btn full={false} style={{flex:2}} small onClick={()=>onAcceptMeetup(req.id)}><Icon name="check" size={12} color="#fff"/>Accept +15 XP</Btn></div>
              </div>)}
            </>}
          </>
        )}
      </div>
    </>}
    {showCreate&&<CreateGroupModal friends={friends} onCreate={(g)=>{onCreateGroup(g);setShowCreate(false);}} onClose={()=>setShowCreate(false)}/>}
  </div>;
}

// ── Create Group Modal ──────────────────────────────────────────────────────
const GROUP_EMOJIS=['👥','🎉','🍕','☕','🎮','🏃','🎨','📚','🍻','🏀','🎵','🌮'];
function CreateGroupModal({friends,preselected=[],onCreate,onClose}){
  const [name,setName]=useState('');
  const [emoji,setEmoji]=useState('👥');
  const [sel,setSel]=useState(()=>new Set(preselected.map(f=>f.username)));
  const toggle=u=>{const n=new Set(sel);n.has(u)?n.delete(u):n.add(u);setSel(n);};
  const canCreate=sel.size>=2&&name.trim().length>0;
  const selectedFriends=friends.filter(f=>sel.has(f.username));
  const autoName=selectedFriends.slice(0,3).map(f=>f.display_name.split(' ')[0]).join(', ')+(selectedFriends.length>3?` +${selectedFriends.length-3}`:'');
  return <div onClick={onClose} style={{position:'absolute',inset:0,zIndex:280,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'flex-end',animation:'fadeIn 0.2s ease'}}>
    <div onClick={e=>e.stopPropagation()} style={{width:'100%',background:C.bg,borderRadius:'22px 22px 0 0',maxHeight:'88%',display:'flex',flexDirection:'column',animation:'slideUp 0.3s cubic-bezier(.2,.8,.2,1)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px 10px',borderBottom:`1px solid ${C.border}`}}>
        <button onClick={onClose} style={{background:'none',border:'none',color:C.muted,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
        <p style={{color:C.text,fontWeight:800,fontSize:15}}>New Group</p>
        <button onClick={()=>canCreate&&onCreate({name:name.trim(),emoji,memberUsernames:[...sel]})} disabled={!canCreate} style={{background:'none',border:'none',color:canCreate?C.accent:C.muted,fontSize:14,fontWeight:800,cursor:canCreate?'pointer':'default',fontFamily:'inherit',opacity:canCreate?1:0.5}}>Create</button>
      </div>

      <div style={{flex:1,overflow:'auto',padding:'14px 16px 18px'}}>
        {/* Name + emoji */}
        <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:14}}>
          <div style={{width:56,height:56,borderRadius:16,background:C.accentL,border:`1.5px solid ${C.accent}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0}}>{emoji}</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder={sel.size>=2?autoName:'Group name'} maxLength={30} style={{flex:1,background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:13,padding:'14px 14px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none'}}/>
        </div>

        {/* Emoji picker */}
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
          {GROUP_EMOJIS.map(e=>(
            <button key={e} onClick={()=>setEmoji(e)} style={{width:36,height:36,borderRadius:10,background:emoji===e?C.accentL:C.surface,border:`1.5px solid ${emoji===e?C.accent:C.border}`,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{e}</button>
          ))}
        </div>

        {/* Member picker */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
          <p style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase'}}>Add Members</p>
          <p style={{color:sel.size>=2?C.accent:C.muted,fontSize:11,fontWeight:700}}>{sel.size} selected {sel.size<2?`· need ${2-sel.size} more`:''}</p>
        </div>
        {friends.length===0?<p style={{color:C.muted,fontSize:13,textAlign:'center',padding:'20px 0'}}>No friends to add yet</p>
        :friends.map(f=>{
          const on=sel.has(f.username);
          return <div key={f.username} onClick={()=>toggle(f.username)} style={{display:'flex',alignItems:'center',gap:11,padding:'10px 11px',background:on?C.accentL:C.surface,borderRadius:13,marginBottom:6,border:`1.5px solid ${on?C.accent:C.border}`,cursor:'pointer'}}>
            <Avatar name={f.display_name} color={f.color} size={38}/>
            <div style={{flex:1,minWidth:0}}>
              <p style={{color:C.text,fontWeight:700,fontSize:13}}>{f.display_name}</p>
              <p style={{color:C.muted,fontSize:11}}>Lv {f.level} · {fmtDist(f.distance_m||950)}</p>
            </div>
            <div style={{width:22,height:22,borderRadius:'50%',background:on?C.accent:'transparent',border:`1.5px solid ${on?C.accent:C.border}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              {on&&<Icon name="check" size={12} color="#fff"/>}
            </div>
          </div>;
        })}
      </div>
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────────────────────────
// SHOP
// ─────────────────────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
// SHOP (with Items | Quests sub-tabs)
// ─────────────────────────────────────────────────────────────────────────────
function ShopScreen({coins,owned,onBuy,quests,onClaim}){
  const [tab,setTab]=useState('items');
  const [filter,setFilter]=useState('all');
  const list=filter==='all'?MOCK_SHOP:MOCK_SHOP.filter(i=>i.category===filter);
  const questsDone=quests?quests.filter(q=>q.done).length:0;
  return <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
    <StatusBar/>
    <div style={{padding:'12px 20px 8px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <h2 style={{color:C.text,fontWeight:800,fontSize:20,letterSpacing:'-0.02em'}}>Shop</h2>
      <div style={{background:C.surface,borderRadius:20,padding:'5px 13px',border:`1px solid ${C.border}`,display:'flex',gap:6,alignItems:'center'}}><span style={{fontSize:15}}>🪙</span><span style={{color:C.text,fontWeight:700,fontSize:15}}>{coins}</span></div>
    </div>
    <div style={{display:'flex',gap:0,margin:'0 18px 10px',background:C.surface,borderRadius:13,padding:4,flexShrink:0}}>
      {[{id:'items',l:'Items'},{id:'quests',l:`Quests · ${questsDone}/${quests?.length||0}`}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'7px',borderRadius:10,border:'none',background:tab===t.id?C.accent:'none',color:tab===t.id?'#fff':C.muted,fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}}>{t.l}</button>)}
    </div>
    {tab==='items'?<>
      <div style={{display:'flex',gap:0,margin:'0 18px 10px',background:C.surface,borderRadius:11,padding:3,flexShrink:0}}>
        {[{id:'all',l:'All'},{id:'boost',l:'Boosts'},{id:'cosmetic',l:'Cosmetics'}].map(t=><button key={t.id} onClick={()=>setFilter(t.id)} style={{flex:1,padding:'6px',borderRadius:9,border:'none',background:filter===t.id?C.raised:'none',color:filter===t.id?C.text:C.muted,fontWeight:600,fontSize:11,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}}>{t.l}</button>)}
      </div>
      {coins<50&&<div style={{margin:'0 15px 10px',background:'oklch(62% 0.18 55/0.09)',border:'1px solid oklch(62% 0.18 55/0.22)',borderRadius:12,padding:'9px 13px',display:'flex',gap:8,alignItems:'center'}}><span style={{fontSize:15}}>💡</span><p style={{color:C.muted,fontSize:12}}>Complete quests & meetups to earn more 🪙 coins</p></div>}
      <div style={{flex:1,overflow:'auto',padding:'0 15px'}}>
        {list.map((item,i)=>{
          const isOwned=owned.includes(item.key);
          const canAfford=coins>=item.cost;
          return <div key={item.key} style={{background:isOwned?'oklch(62% 0.18 145/0.07)':C.surface,borderRadius:18,padding:'14px',marginBottom:9,border:`1.5px solid ${isOwned?'oklch(62% 0.18 145/0.28)':C.border}`,display:'flex',gap:12,alignItems:'center',animation:`fadeUp 0.3s ease ${i*0.07}s both`}}>
            <div style={{width:52,height:52,borderRadius:16,background:isOwned?'oklch(62% 0.18 145/0.12)':item.category==='boost'?C.accentL:'oklch(62% 0.18 295/0.12)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>{item.emoji}</div>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <p style={{color:C.text,fontWeight:700,fontSize:14}}>{item.name}</p>
                <span style={{background:item.category==='boost'?C.accentG:'oklch(62% 0.18 295/0.12)',color:item.category==='boost'?C.accent:C.purple,fontSize:9,fontWeight:700,borderRadius:4,padding:'1px 5px',textTransform:'uppercase'}}>{item.category}</span>
              </div>
              <p style={{color:C.muted,fontSize:12,marginTop:2,lineHeight:1.4}}>{item.desc}</p>
              {item.dur&&<p style={{color:C.muted,fontSize:11,marginTop:3}}>⏱ Duration: {item.dur}</p>}
            </div>
            <div style={{flexShrink:0}}>
              {isOwned
                ?<div style={{background:'oklch(62% 0.18 145/0.15)',borderRadius:10,padding:'5px 10px',textAlign:'center'}}><span style={{color:C.success,fontSize:11,fontWeight:700}}>✓ Owned</span></div>
                :<Btn small full={false} disabled={!canAfford} onClick={()=>onBuy(item)} style={{opacity:canAfford?1:0.4}}>🪙 {item.cost}</Btn>
              }
            </div>
          </div>;
        })}
      </div>
    </>:<>
      <div style={{padding:'0 20px 6px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <p style={{color:C.muted,fontSize:11}}>Resets in 14h 32m</p>
        <div style={{background:C.accentG,border:`1px solid ${C.accentL}`,borderRadius:9,padding:'3px 9px'}}><span style={{color:C.accent,fontSize:11,fontWeight:700}}>{questsDone}/{quests?.length||0}</span></div>
      </div>
      <div style={{flex:1,overflow:'auto',padding:'0 15px'}}>
        {(quests||[]).map((q,i)=>(
          <div key={q.key} style={{background:q.done?'oklch(62% 0.18 145/0.07)':C.surface,borderRadius:18,padding:'13px',marginBottom:8,border:`1.5px solid ${q.done?'oklch(62% 0.18 145/0.22)':C.border}`,animation:`fadeUp 0.3s ease ${i*0.06}s both`}}>
            <div style={{display:'flex',gap:11,alignItems:'flex-start'}}>
              <div style={{fontSize:22,flexShrink:0,paddingTop:1}}>{q.emoji}</div>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:6}}>
                  <p style={{color:q.done?C.success:C.text,fontWeight:700,fontSize:14}}>{q.title}</p>
                  <div style={{display:'flex',gap:4,flexShrink:0}}>
                    {q.xp>0&&<span style={{background:q.done?'oklch(62% 0.18 145/0.15)':C.accentG,color:q.done?C.success:C.accent,fontSize:10,fontWeight:700,borderRadius:6,padding:'2px 6px'}}>+{q.xp} XP</span>}
                    {q.coins>0&&<span style={{background:C.raised,color:C.muted,fontSize:10,fontWeight:700,borderRadius:6,padding:'2px 6px'}}>🪙{q.coins}</span>}
                  </div>
                </div>
                <p style={{color:C.muted,fontSize:12,marginTop:2,lineHeight:1.4}}>{q.desc}</p>
                <div style={{marginTop:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{color:C.muted,fontSize:11}}>{Math.min(q.progress,q.target)}/{q.target}</span>{q.done&&<span style={{color:C.success,fontSize:10,fontWeight:700}}>✓ Done</span>}</div>
                  <div style={{height:4,background:C.border,borderRadius:99}}><div style={{height:'100%',width:`${Math.min((q.progress/q.target)*100,100)}%`,background:q.done?C.success:C.accent,borderRadius:99,transition:'width 0.5s'}}/></div>
                </div>
                {q.done&&q.claimable&&<div style={{marginTop:8}}><Btn small onClick={()=>onClaim(q.key)} style={{background:C.success}}><Icon name="zap" size={12} color="#fff"/>Claim Reward</Btn></div>}
              </div>
            </div>
          </div>
        ))}
      </div>
    </>}
  </div>;
}

// QUESTS
// ─────────────────────────────────────────────────────────────────────────────
// EVENTS  (Nearby feed · create event · radius-gated)
// ─────────────────────────────────────────────────────────────────────────────
function EventsScreen({events,userEvents,ownedBoosts,onCreate,onRSVP,rsvped}){
  const [tab,setTab]=useState('nearby');      // nearby | mine
  const [filter,setFilter]=useState('all');   // all | business | person
  const [creating,setCreating]=useState(false);

  const hasMegaphone=ownedBoosts&&ownedBoosts.includes('event_radius');
  const myRadius=hasMegaphone?15:5;

  const all=[...events,...userEvents];
  const visible=all.filter(e=>e.distance_m<=(e.radius_km||5)*1000);
  const feed=filter==='all'?visible:visible.filter(e=>e.hostType===filter);
  const mine=userEvents;

  return <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
    <StatusBar/>
    <div style={{padding:'12px 20px 6px',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
      <div><h2 style={{color:C.text,fontWeight:800,fontSize:20,letterSpacing:'-0.02em'}}>Events</h2><p style={{color:C.muted,fontSize:11.5,marginTop:2}}>Within {myRadius}km of you{hasMegaphone&&<span style={{color:C.accent,fontWeight:700}}> · 📣 Megaphone active</span>}</p></div>
      <button onClick={()=>setCreating(true)} style={{background:C.accent,border:'none',borderRadius:99,padding:'8px 14px',color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit',display:'flex',gap:5,alignItems:'center'}}><span style={{fontSize:14,lineHeight:1}}>+</span>Host</button>
    </div>

    <div style={{display:'flex',gap:0,margin:'6px 18px 8px',background:C.surface,borderRadius:13,padding:4,flexShrink:0}}>
      {[{id:'nearby',l:`Nearby · ${feed.length}`},{id:'mine',l:`Hosting · ${mine.length}`}].map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'7px',borderRadius:10,border:'none',background:tab===t.id?C.accent:'none',color:tab===t.id?'#fff':C.muted,fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}}>{t.l}</button>)}
    </div>

    {tab==='nearby'&&<div style={{display:'flex',gap:6,margin:'0 18px 8px',flexShrink:0}}>
      {[{id:'all',l:'All',emoji:'🌐'},{id:'business',l:'Businesses',emoji:'🏪'},{id:'person',l:'People',emoji:'👥'}].map(f=><button key={f.id} onClick={()=>setFilter(f.id)} style={{flex:1,padding:'6px 8px',borderRadius:10,border:`1px solid ${filter===f.id?C.accent:C.border}`,background:filter===f.id?C.accentL:C.surface,color:filter===f.id?C.accent:C.muted,fontWeight:700,fontSize:11,cursor:'pointer',fontFamily:'inherit',display:'flex',gap:5,alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}><span>{f.emoji}</span>{f.l}</button>)}
    </div>}

    <div style={{flex:1,overflow:'auto',padding:'0 15px 12px'}}>
      {tab==='nearby'?(feed.length===0?<div style={{textAlign:'center',paddingTop:60}}><div style={{fontSize:38,marginBottom:10}}>📅</div><p style={{color:C.text,fontWeight:700,fontSize:15,marginBottom:5}}>No events nearby</p><p style={{color:C.muted,fontSize:12}}>Host one yourself — tap "+ Host"</p></div>
        :feed.map((ev,i)=><EventCard key={ev.id} ev={ev} rsvped={rsvped.includes(ev.id)} onRSVP={()=>onRSVP(ev)} delay={i*0.05}/>)
      ):(mine.length===0?<div style={{textAlign:'center',paddingTop:60}}><div style={{fontSize:38,marginBottom:10}}>🎪</div><p style={{color:C.text,fontWeight:700,fontSize:15,marginBottom:5}}>You haven't hosted yet</p><p style={{color:C.muted,fontSize:12,marginBottom:14,padding:'0 30px',lineHeight:1.5}}>Your events reach {myRadius}km. Grab the 📣 Megaphone in the Shop to reach 15km.</p><Btn small full={false} onClick={()=>setCreating(true)}><span>+ Host your first event</span></Btn></div>
        :mine.map((ev,i)=><EventCard key={ev.id} ev={ev} mine rsvped={false} onRSVP={()=>{}} delay={i*0.05}/>)
      )}
    </div>

    {creating&&<CreateEventModal radiusKm={myRadius} hasMegaphone={hasMegaphone} onCreate={(e)=>{onCreate(e);setCreating(false);}} onClose={()=>setCreating(false)}/>}
  </div>;
}

function EventCard({ev,rsvped,onRSVP,mine,delay=0}){
  const pctFull=ev.capacity?Math.min(100,(ev.attendees/ev.capacity)*100):0;
  return <div style={{background:C.surface,borderRadius:18,padding:'13px',marginBottom:9,border:`1.5px solid ${ev.boosted?'oklch(62% 0.18 55/0.45)':C.border}`,animation:`fadeUp 0.3s ease ${delay}s both`,position:'relative',overflow:'hidden'}}>
    {ev.boosted&&<div style={{position:'absolute',top:0,right:0,background:'linear-gradient(135deg,oklch(68% 0.2 55),oklch(62% 0.18 55))',color:'#1a1008',padding:'3px 9px',fontSize:10,fontWeight:800,borderBottomLeftRadius:10,letterSpacing:'0.03em'}}>📣 BOOSTED</div>}
    <div style={{display:'flex',gap:11,alignItems:'flex-start'}}>
      <div style={{width:52,height:52,borderRadius:14,background:`${ev.color}22`,border:`1.5px solid ${ev.color}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,flexShrink:0}}>{ev.emoji}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
          <span style={{background:ev.hostType==='business'?'oklch(62% 0.18 55/0.12)':C.accentG,color:ev.hostType==='business'?'oklch(68% 0.2 55)':C.accent,fontSize:9,fontWeight:800,borderRadius:4,padding:'1px 5px',textTransform:'uppercase',letterSpacing:'0.04em'}}>{ev.tag}</span>
          <span style={{color:C.muted,fontSize:11}}>· {fmtDist(ev.distance_m)}</span>
          {ev.verified&&<span title="Verified business" style={{color:'oklch(68% 0.15 220)',fontSize:12}}>✓</span>}
        </div>
        <p style={{color:C.text,fontWeight:700,fontSize:14,lineHeight:1.3}}>{ev.title}</p>
        <p style={{color:C.muted,fontSize:11.5,marginTop:2}}>by <span style={{color:C.text,fontWeight:600}}>{ev.host}</span> · {ev.starts}</p>
        <p style={{color:C.muted,fontSize:12,marginTop:6,lineHeight:1.45}}>{ev.desc}</p>
        <div style={{marginTop:9,display:'flex',gap:10,alignItems:'center'}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{color:C.muted,fontSize:10,fontWeight:600}}>{ev.attendees}/{ev.capacity} going</span><span style={{color:C.muted,fontSize:10}}>{ev.radius_km}km reach</span></div>
            <div style={{height:3,background:C.border,borderRadius:99}}><div style={{height:'100%',width:`${pctFull}%`,background:pctFull>85?C.error:C.accent,borderRadius:99}}/></div>
          </div>
          {!mine&&<Btn small full={false} variant={rsvped?'subtle':'primary'} onClick={onRSVP} style={{paddingLeft:12,paddingRight:12}}>{rsvped?'✓ Going':'RSVP'}</Btn>}
          {mine&&<span style={{background:C.accentG,border:`1px solid ${C.accentL}`,color:C.accent,fontSize:11,fontWeight:700,borderRadius:8,padding:'5px 10px'}}>Hosting</span>}
        </div>
      </div>
    </div>
  </div>;
}

function CreateEventModal({radiusKm,hasMegaphone,onCreate,onClose}){
  const EMOJIS=['🎉','☕','🏃','🎲','📷','🎸','🏀','🍕','🎨','🥾','🧘','🎬'];
  const [title,setTitle]=useState('');
  const [desc,setDesc]=useState('');
  const [when,setWhen]=useState('Tonight 7:00 PM');
  const [cap,setCap]=useState(12);
  const [emoji,setEmoji]=useState('🎉');
  const [tag,setTag]=useState('Meetup');
  const canSubmit=title.trim().length>2&&desc.trim().length>5;

  function submit(){
    onCreate({
      id:'user_'+Date.now(), host:'You', hostType:'person', verified:false,
      title:title.trim(), desc:desc.trim(), emoji, color:'oklch(62% 0.18 200)',
      distance_m:0, radius_km:radiusKm, starts:when, attendees:1, capacity:cap, tag, boosted:hasMegaphone,
    });
  }

  return <div style={{position:'absolute',inset:0,zIndex:200,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.65)',animation:'fadeIn 0.2s'}}/>
    <div style={{position:'relative',background:C.bg,borderRadius:'26px 26px 0 0',padding:'0 22px 30px',animation:'slideUp 0.3s ease',border:`1px solid ${C.border}`,maxHeight:'92%',display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',justifyContent:'center',padding:'10px 0 6px',flexShrink:0}}><div style={{width:36,height:4,background:C.border,borderRadius:99}}/></div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexShrink:0}}>
        <h3 style={{color:C.text,fontWeight:800,fontSize:18}}>Host an event</h3>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><Icon name="x" size={18} color={C.muted}/></button>
      </div>

      <div style={{overflow:'auto',flex:1}}>
        <div style={{background:hasMegaphone?'oklch(62% 0.18 55/0.1)':C.surface,border:`1px solid ${hasMegaphone?'oklch(62% 0.18 55/0.35)':C.border}`,borderRadius:12,padding:'10px 13px',marginBottom:13,display:'flex',gap:9,alignItems:'center'}}>
          <span style={{fontSize:19}}>{hasMegaphone?'📣':'📍'}</span>
          <div style={{flex:1}}>
            <p style={{color:C.text,fontSize:12.5,fontWeight:700}}>Reaches people within <span style={{color:C.accent}}>{radiusKm}km</span></p>
            <p style={{color:C.muted,fontSize:11,marginTop:1}}>{hasMegaphone?'Megaphone boost active — 3× default range':'Grab the 📣 Event Megaphone in the Shop to extend to 15km'}</p>
          </div>
        </div>

        <label style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase'}}>Title</label>
        <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Sunset run @ the pier" maxLength={60} style={{width:'100%',marginTop:5,marginBottom:12,background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'11px 13px',color:C.text,fontSize:14,fontFamily:'inherit',outline:'none',fontWeight:600}}/>

        <label style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase'}}>Description</label>
        <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="What's the vibe? Where do people meet?" maxLength={200} rows={3} style={{width:'100%',marginTop:5,marginBottom:12,background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'10px 13px',color:C.text,fontSize:13,fontFamily:'inherit',outline:'none',resize:'none',lineHeight:1.5}}/>

        <label style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase'}}>Pick an emoji</label>
        <div style={{display:'flex',gap:5,flexWrap:'wrap',margin:'6px 0 12px'}}>
          {EMOJIS.map(e=><button key={e} onClick={()=>setEmoji(e)} style={{width:38,height:38,borderRadius:10,border:`1.5px solid ${emoji===e?C.accent:C.border}`,background:emoji===e?C.accentL:C.surface,fontSize:18,cursor:'pointer',fontFamily:'inherit'}}>{e}</button>)}
        </div>

        <div style={{display:'flex',gap:9,marginBottom:12}}>
          <div style={{flex:1}}>
            <label style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase'}}>When</label>
            <input value={when} onChange={e=>setWhen(e.target.value)} style={{width:'100%',marginTop:5,background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'10px 12px',color:C.text,fontSize:13,fontFamily:'inherit',outline:'none',fontWeight:600}}/>
          </div>
          <div style={{width:90}}>
            <label style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase'}}>Cap</label>
            <input type="number" min="2" max="200" value={cap} onChange={e=>setCap(+e.target.value||12)} style={{width:'100%',marginTop:5,background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'10px 12px',color:C.text,fontSize:13,fontFamily:'inherit',outline:'none',fontWeight:700,textAlign:'center'}}/>
          </div>
        </div>

        <label style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase'}}>Type</label>
        <div style={{display:'flex',gap:6,marginTop:6,marginBottom:14}}>
          {['Meetup','Event','Promo'].map(t=><button key={t} onClick={()=>setTag(t)} style={{flex:1,padding:'8px',borderRadius:10,border:`1.5px solid ${tag===t?C.accent:C.border}`,background:tag===t?C.accentL:C.surface,color:tag===t?C.accent:C.muted,fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>{t}</button>)}
        </div>
      </div>

      <Btn disabled={!canSubmit} onClick={submit} style={{opacity:canSubmit?1:0.4}}>📣 Publish to {radiusKm}km radius</Btn>
    </div>
  </div>;
}

    <div style={{padding:'12px 20px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <h2 style={{color:C.text,fontWeight:800,fontSize:20,letterSpacing:'-0.02em'}}>Profile</h2>

          <div style={{height:5,background:C.border,borderRadius:99}}><div style={{height:'100%',width:`${prog.pct}%`,background:`linear-gradient(90deg,${C.accent},oklch(62% 0.22 55))`,borderRadius:99,transition:'width 0.6s'}}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7,marginBottom:12}}>

              <div style={{fontSize:28,marginBottom:5,filter:b.earned?'none':'grayscale(1)'}}>{b.e}</div>
