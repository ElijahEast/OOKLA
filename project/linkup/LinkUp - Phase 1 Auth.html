<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>LinkUp — Phase 1: Auth</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: oklch(14% 0.02 265);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  /* Phone shell */
  .phone-shell {
    width: 390px;
    height: 844px;
    background: oklch(11% 0.015 265);
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px oklch(30% 0.02 265),
      0 40px 80px oklch(0% 0 0 / 0.6);
  }
  @media (max-height: 900px) {
    .phone-shell { transform: scale(0.9); transform-origin: center center; }
  }
  @media (max-height: 800px) {
    .phone-shell { transform: scale(0.8); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Palette ──────────────────────────────────────────────────────────────────
const C = {
  bg:       'oklch(11% 0.015 265)',
  surface:  'oklch(16% 0.018 265)',
  border:   'oklch(25% 0.02 265)',
  accent:   'oklch(62% 0.22 28)',   // warm orange
  accentDim:'oklch(62% 0.22 28 / 0.15)',
  text:     'oklch(95% 0.005 265)',
  muted:    'oklch(55% 0.01 265)',
  error:    'oklch(62% 0.2 15)',
  success:  'oklch(62% 0.18 145)',
};

// ── Icons (minimal SVG) ───────────────────────────────────────────────────────
const Icon = ({ name, size = 20, color = C.muted }) => {
  const icons = {
    eye: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
    eyeOff: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>,
    mail: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>,
    user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>,
    lock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>,
    arrow: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
    map: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>,
  };
  return icons[name] || null;
};

// ── Input Field ───────────────────────────────────────────────────────────────
function Field({ label, type = 'text', value, onChange, icon, error, placeholder, suffix }) {
  const [focused, setFocused] = useState(false);
  return (
    <div style={{ marginBottom: 16 }}>
      {label && <label style={{ display:'block', fontSize:12, fontWeight:600, color:C.muted, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>{label}</label>}
      <div style={{
        display:'flex', alignItems:'center', gap:10,
        background: focused ? C.surface : 'oklch(13% 0.015 265)',
        border: `1.5px solid ${error ? C.error : focused ? C.accent : C.border}`,
        borderRadius:14, padding:'0 14px', height:52,
        transition:'all 0.2s',
        boxShadow: focused ? `0 0 0 3px ${C.accentDim}` : 'none',
      }}>
        {icon && <span style={{ flexShrink:0 }}><Icon name={icon} size={18} color={focused ? C.accent : C.muted}/></span>}
        <input
          type={type} value={value} onChange={onChange} placeholder={placeholder}
          onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
          style={{
            flex:1, background:'none', border:'none', outline:'none',
            color:C.text, fontSize:15, fontFamily:'inherit', fontWeight:500,
          }}
        />
        {suffix}
      </div>
      {error && <p style={{ color:C.error, fontSize:12, marginTop:6, fontWeight:500 }}>{error}</p>}
    </div>
  );
}

// ── Button ────────────────────────────────────────────────────────────────────
function Btn({ children, onClick, variant='primary', loading, disabled, style: sx }) {
  const [pressed, setPressed] = useState(false);
  const base = {
    width:'100%', height:54, borderRadius:16, border:'none', cursor: disabled||loading ? 'not-allowed' : 'pointer',
    fontSize:16, fontWeight:700, fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap:8,
    transition:'all 0.15s', transform: pressed ? 'scale(0.98)' : 'scale(1)',
    opacity: disabled||loading ? 0.6 : 1,
    ...sx,
  };
  const styles = {
    primary: { background: C.accent, color:'#fff', boxShadow:`0 4px 20px ${C.accent}55` },
    ghost:   { background: C.surface, color: C.text, border:`1.5px solid ${C.border}` },
  };
  return (
    <button
      onClick={disabled||loading ? undefined : onClick}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)}
      style={{ ...base, ...styles[variant] }}
    >
      {loading ? <Spinner/> : children}
    </button>
  );
}

function Spinner() {
  return (
    <div style={{ width:20, height:20, border:'2.5px solid rgba(255,255,255,0.3)', borderTopColor:'#fff', borderRadius:'50%', animation:'spin 0.7s linear infinite' }}/>
  );
}

// ── Password Strength ─────────────────────────────────────────────────────────
function PasswordStrength({ password }) {
  const checks = [
    { label:'8+ chars', ok: password.length >= 8 },
    { label:'Uppercase', ok: /[A-Z]/.test(password) },
    { label:'Number',    ok: /[0-9]/.test(password) },
  ];
  const score = checks.filter(c => c.ok).length;
  const colors = ['', C.error, 'oklch(62% 0.2 55)', C.success];
  if (!password) return null;
  return (
    <div style={{ marginTop:-8, marginBottom:16 }}>
      <div style={{ display:'flex', gap:4, marginBottom:8 }}>
        {[0,1,2].map(i => (
          <div key={i} style={{ flex:1, height:3, borderRadius:99, background: i < score ? colors[score] : C.border, transition:'all 0.3s' }}/>
        ))}
      </div>
      <div style={{ display:'flex', gap:12 }}>
        {checks.map(c => (
          <span key={c.label} style={{ fontSize:11, color: c.ok ? C.success : C.muted, display:'flex', alignItems:'center', gap:3, transition:'color 0.2s' }}>
            {c.ok ? <Icon name="check" size={11} color={C.success}/> : null}{c.label}
          </span>
        ))}
      </div>
    </div>
  );
}

// ── Status Bar ────────────────────────────────────────────────────────────────
function StatusBar() {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 28px 0', color:C.text, fontSize:13, fontWeight:600 }}>
      <span>{time}</span>
      <div style={{ display:'flex', gap:6, alignItems:'center' }}>
        <svg width="16" height="12" viewBox="0 0 16 12" fill={C.text}><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="1" width="3" height="11" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 24 12" fill={C.text}><rect x="0" y="2" width="22" height="8" rx="2" stroke={C.text} strokeWidth="1.5" fill="none"/><rect x="22" y="4" width="2" height="4" rx="1" fill={C.text}/><rect x="1.5" y="3.5" width="14" height="5" rx="1"/></svg>
      </div>
    </div>
  );
}

// ── Wordmark ──────────────────────────────────────────────────────────────────
function Wordmark({ size = 'lg' }) {
  const s = size === 'lg' ? 38 : 26;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
      <div style={{
        width:s, height:s, borderRadius: s * 0.35,
        background: C.accent,
        display:'flex', alignItems:'center', justifyContent:'center',
        boxShadow:`0 4px 16px ${C.accent}55`,
      }}>
        <Icon name="map" size={s * 0.55} color="#fff"/>
      </div>
      <span style={{ fontSize: size === 'lg' ? 28 : 20, fontWeight:800, color:C.text, letterSpacing:'-0.03em' }}>
        Link<span style={{ color:C.accent }}>Up</span>
      </span>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SCREENS
// ─────────────────────────────────────────────────────────────────────────────

// ── Splash ────────────────────────────────────────────────────────────────────
function SplashScreen({ onNavigate }) {
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', padding:'0 28px 48px' }}>
      <StatusBar/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', gap:24 }}>
        {/* Map graphic */}
        <div style={{ width:240, height:240, borderRadius:48, background:C.surface, border:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'center', position:'relative', overflow:'hidden' }}>
          {/* Grid lines */}
          {[...Array(6)].map((_,i) => (
            <div key={i} style={{ position:'absolute', left:0, right:0, height:1, background:C.border, top:`${(i+1)*33}px` }}/>
          ))}
          {[...Array(6)].map((_,i) => (
            <div key={i} style={{ position:'absolute', top:0, bottom:0, width:1, background:C.border, left:`${(i+1)*33}px` }}/>
          ))}
          {/* Pins */}
          {[{x:80,y:90,big:true},{x:140,y:140},{x:60,y:160},{x:170,y:80}].map((p,i) => (
            <div key={i} style={{ position:'absolute', left:p.x, top:p.y, transform:'translate(-50%,-50%)' }}>
              <div style={{ width: p.big?36:22, height:p.big?36:22, borderRadius:'50%', background: p.big ? C.accent : `oklch(62% 0.22 ${28+i*60} / 0.7)`, border:`2px solid ${C.bg}`, boxShadow:`0 2px 8px ${C.accent}55`, display:'flex', alignItems:'center', justifyContent:'center' }}>
                {p.big && <div style={{ width:10, height:10, borderRadius:'50%', background:'#fff' }}/>}
              </div>
            </div>
          ))}
        </div>
        <div style={{ textAlign:'center' }}>
          <Wordmark size="lg"/>
          <p style={{ color:C.muted, fontSize:15, marginTop:12, lineHeight:1.6, maxWidth:260, margin:'12px auto 0' }}>
            Meet real people nearby. Earn points. Build your world.
          </p>
        </div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        <Btn onClick={() => onNavigate('signup')}>Get Started</Btn>
        <Btn variant="ghost" onClick={() => onNavigate('login')}>
          I have an account
        </Btn>
      </div>
    </div>
  );
}

// ── Signup ────────────────────────────────────────────────────────────────────
function SignupScreen({ onNavigate }) {
  const [form, setForm] = useState({ email:'', username:'', password:'' });
  const [showPw, setShowPw] = useState(false);
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);
  const [step, setStep] = useState(1); // 1 = credentials, 2 = success

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  function validate() {
    const e = {};
    if (!form.email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) e.email = 'Enter a valid email.';
    if (form.username.length < 3) e.username = 'Username must be 3+ characters.';
    if (!/[A-Z]/.test(form.password) || !/[0-9]/.test(form.password) || form.password.length < 8) e.password = 'Password must be 8+ chars, include uppercase & number.';
    setErrors(e);
    return Object.keys(e).length === 0;
  }

  async function handleSubmit() {
    if (!validate()) return;
    setLoading(true);
    // Simulate API call
    await new Promise(r => setTimeout(r, 1400));
    setLoading(false);
    setStep(2);
  }

  if (step === 2) return <SuccessScreen username={form.username} onNavigate={onNavigate}/>;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <StatusBar/>
      <div style={{ padding:'20px 28px 0', display:'flex', alignItems:'center', gap:12 }}>
        <button onClick={() => onNavigate('splash')} style={{ background:'none', border:'none', cursor:'pointer', color:C.muted, padding:4 }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <Wordmark size="sm"/>
      </div>
      <div style={{ flex:1, overflow:'auto', padding:'28px 28px 0' }}>
        <h1 style={{ fontSize:26, fontWeight:800, color:C.text, letterSpacing:'-0.03em', marginBottom:4 }}>Create account</h1>
        <p style={{ color:C.muted, fontSize:14, marginBottom:28 }}>Start linking up with people around you.</p>

        <Field label="Email" icon="mail" type="email" value={form.email} onChange={set('email')} placeholder="you@example.com" error={errors.email}/>
        <Field label="Username" icon="user" value={form.username} onChange={set('username')} placeholder="yourhandle" error={errors.username}/>
        <Field
          label="Password" icon="lock"
          type={showPw ? 'text' : 'password'}
          value={form.password} onChange={set('password')}
          placeholder="Min 8 chars" error={errors.password}
          suffix={
            <button onClick={() => setShowPw(v => !v)} style={{ background:'none', border:'none', cursor:'pointer', padding:4, display:'flex' }}>
              <Icon name={showPw ? 'eyeOff' : 'eye'} size={18} color={C.muted}/>
            </button>
          }
        />
        <PasswordStrength password={form.password}/>

        {/* Terms */}
        <p style={{ fontSize:12, color:C.muted, textAlign:'center', marginBottom:20, lineHeight:1.6 }}>
          By continuing you agree to our{' '}
          <span style={{ color:C.accent, cursor:'pointer' }}>Terms</span> &{' '}
          <span style={{ color:C.accent, cursor:'pointer' }}>Privacy Policy</span>.
        </p>
      </div>
      <div style={{ padding:'16px 28px 40px' }}>
        <Btn onClick={handleSubmit} loading={loading}>Create Account</Btn>
        <p style={{ textAlign:'center', color:C.muted, fontSize:14, marginTop:16 }}>
          Already have an account?{' '}
          <span onClick={() => onNavigate('login')} style={{ color:C.accent, fontWeight:600, cursor:'pointer' }}>Sign in</span>
        </p>
      </div>
    </div>
  );
}

// ── Success ───────────────────────────────────────────────────────────────────
function SuccessScreen({ username, onNavigate }) {
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'0 40px', textAlign:'center' }}>
      <div style={{ width:80, height:80, borderRadius:'50%', background: C.success + '22', border:`2px solid ${C.success}`, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:24 }}>
        <Icon name="check" size={36} color={C.success}/>
      </div>
      <h2 style={{ fontSize:24, fontWeight:800, color:C.text, marginBottom:8 }}>You're in, @{username}!</h2>
      <p style={{ color:C.muted, fontSize:14, lineHeight:1.7, marginBottom:36 }}>Your account is ready. Start exploring people around you and earn your first points.</p>
      <Btn onClick={() => onNavigate('login')}>Continue to Login</Btn>
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────────────────────
function LoginScreen({ onNavigate }) {
  const [form, setForm] = useState({ identifier:'', password:'' });
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  async function handleLogin() {
    if (!form.identifier || !form.password) {
      setError('Please fill in all fields.');
      return;
    }
    setError('');
    setLoading(true);
    await new Promise(r => setTimeout(r, 1200));
    setLoading(false);
    onNavigate('home');
  }

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <StatusBar/>
      <div style={{ padding:'20px 28px 0', display:'flex', alignItems:'center', gap:12 }}>
        <button onClick={() => onNavigate('splash')} style={{ background:'none', border:'none', cursor:'pointer', padding:4 }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <Wordmark size="sm"/>
      </div>
      <div style={{ flex:1, padding:'28px 28px 0' }}>
        <h1 style={{ fontSize:26, fontWeight:800, color:C.text, letterSpacing:'-0.03em', marginBottom:4 }}>Welcome back</h1>
        <p style={{ color:C.muted, fontSize:14, marginBottom:32 }}>Sign in to continue linking up.</p>

        <Field label="Email or Username" icon="user" value={form.identifier} onChange={set('identifier')} placeholder="you@example.com or @handle"/>
        <Field
          label="Password" icon="lock"
          type={showPw ? 'text' : 'password'}
          value={form.password} onChange={set('password')}
          placeholder="Your password"
          suffix={
            <button onClick={() => setShowPw(v => !v)} style={{ background:'none', border:'none', cursor:'pointer', padding:4, display:'flex' }}>
              <Icon name={showPw ? 'eyeOff' : 'eye'} size={18} color={C.muted}/>
            </button>
          }
        />

        {error && (
          <div style={{ background:`${C.error}18`, border:`1px solid ${C.error}55`, borderRadius:12, padding:'10px 14px', marginBottom:16 }}>
            <p style={{ color:C.error, fontSize:13, fontWeight:500 }}>{error}</p>
          </div>
        )}

        <div style={{ textAlign:'right', marginBottom:24 }}>
          <span style={{ color:C.accent, fontSize:13, fontWeight:600, cursor:'pointer' }}>Forgot password?</span>
        </div>
      </div>
      <div style={{ padding:'0 28px 40px' }}>
        <Btn onClick={handleLogin} loading={loading}>Sign In <Icon name="arrow" size={16} color="#fff"/></Btn>
        <p style={{ textAlign:'center', color:C.muted, fontSize:14, marginTop:16 }}>
          Don't have an account?{' '}
          <span onClick={() => onNavigate('signup')} style={{ color:C.accent, fontWeight:600, cursor:'pointer' }}>Sign up</span>
        </p>
      </div>
    </div>
  );
}

// ── Home stub (post-login) ────────────────────────────────────────────────────
function HomeScreen({ onNavigate }) {
  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <StatusBar/>
      <div style={{ padding:'20px 24px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <Wordmark size="sm"/>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ background:C.accentDim, border:`1px solid ${C.accent}55`, borderRadius:20, padding:'4px 12px', display:'flex', alignItems:'center', gap:6 }}>
            <span style={{ fontSize:13, color:C.accent, fontWeight:700 }}>⚡ 0 XP</span>
          </div>
          <div style={{ width:36, height:36, borderRadius:'50%', background:C.surface, border:`1.5px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Icon name="user" size={18} color={C.muted}/>
          </div>
        </div>
      </div>

      <div style={{ flex:1, padding:'0 24px', overflow:'auto' }}>
        {/* Map placeholder */}
        <div style={{ background:C.surface, borderRadius:24, height:220, border:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:20, position:'relative', overflow:'hidden' }}>
          {[...Array(8)].map((_,i) => <div key={i} style={{ position:'absolute', left:0, right:0, height:1, background:C.border, top:`${(i+1)*25}px` }}/>)}
          {[...Array(8)].map((_,i) => <div key={i} style={{ position:'absolute', top:0, bottom:0, width:1, background:C.border, left:`${(i+1)*45}px` }}/>)}
          <div style={{ textAlign:'center', zIndex:1 }}>
            <div style={{ width:56, height:56, borderRadius:'50%', background:`${C.accent}22`, border:`2px solid ${C.accent}`, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 8px' }}>
              <Icon name="map" size={24} color={C.accent}/>
            </div>
            <p style={{ color:C.muted, fontSize:12 }}>Map view — Phase 2</p>
          </div>
        </div>

        {/* Nearby section */}
        <div style={{ marginBottom:20 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <h3 style={{ color:C.text, fontWeight:700, fontSize:16 }}>Nearby People</h3>
            <span style={{ color:C.accent, fontSize:13, fontWeight:600 }}>See all</span>
          </div>
          {['Alex M.', 'Jordan K.', 'Sam R.'].map((name, i) => (
            <div key={name} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 0', borderBottom:`1px solid ${C.border}` }}>
              <div style={{ width:44, height:44, borderRadius:'50%', background:`oklch(${40+i*10}% 0.08 ${120+i*80})`, flexShrink:0 }}/>
              <div style={{ flex:1 }}>
                <p style={{ color:C.text, fontWeight:600, fontSize:14 }}>{name}</p>
                <p style={{ color:C.muted, fontSize:12 }}>{[0.2,0.5,0.8][i]} km away</p>
              </div>
              <div style={{ background:C.accentDim, borderRadius:10, padding:'4px 10px' }}>
                <span style={{ color:C.accent, fontSize:12, fontWeight:600 }}>Lv {[3,7,12][i]}</span>
              </div>
            </div>
          ))}
        </div>

        <div style={{ background:`${C.accent}12`, border:`1px solid ${C.accent}33`, borderRadius:16, padding:16, display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ fontSize:28 }}>🎯</div>
          <div>
            <p style={{ color:C.text, fontWeight:700, fontSize:13 }}>Daily Quest</p>
            <p style={{ color:C.muted, fontSize:12, marginTop:2 }}>Meet someone new within 0.5km</p>
          </div>
          <div style={{ marginLeft:'auto', background:C.accent, borderRadius:10, padding:'4px 10px', flexShrink:0 }}>
            <span style={{ color:'#fff', fontSize:11, fontWeight:700 }}>+50 XP</span>
          </div>
        </div>
      </div>

      {/* Bottom nav */}
      <div style={{ display:'flex', borderTop:`1px solid ${C.border}`, background:C.bg }}>
        {[
          { icon:'map', label:'Explore' },
          { icon:'user', label:'People' },
          { icon:'check', label:'Quests' },
          { icon:'lock', label:'Shop' },
        ].map((tab, i) => (
          <button key={tab.label} style={{
            flex:1, padding:'12px 0 20px', background:'none', border:'none', cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:4,
          }}>
            <Icon name={tab.icon} size={20} color={i === 0 ? C.accent : C.muted}/>
            <span style={{ fontSize:10, color: i === 0 ? C.accent : C.muted, fontWeight:600 }}>{tab.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem('lu_screen') || 'splash');

  function navigate(s) {
    setScreen(s);
    localStorage.setItem('lu_screen', s);
  }

  const screens = { splash: SplashScreen, signup: SignupScreen, login: LoginScreen, home: HomeScreen };
  const Screen = screens[screen] || SplashScreen;

  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', background:'oklch(14% 0.02 265)' }}>
      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        * { -webkit-tap-highlight-color: transparent; }
        input::placeholder { color: oklch(40% 0.01 265); }
        ::-webkit-scrollbar { width: 0; }
      `}</style>
      <div className="phone-shell">
        <Screen onNavigate={navigate}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
