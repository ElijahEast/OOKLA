  purple:'oklch(62% 0.18 295)', gold:'oklch(75% 0.18 75)',

// ── XP level formula ──────────────────────────────────────────────────────────
function xpForLevel(l) { return Math.floor(100 * Math.pow(l, 1.5)); }
function levelFromXp(xp) { let l=1; while(xpForLevel(l+1)<=xp) l++; return l; }
function levelProgress(xp) {
  const l = levelFromXp(xp);
  const cur = l === 1 ? 0 : xpForLevel(l), next = xpForLevel(l+1);
  return { level:l, pct:Math.round((xp-cur)/(next-cur)*100), into:xp-cur, needed:next-cur };
}

// ── Shared UI atoms ───────────────────────────────────────────────────────────
function Spinner({ color='#fff', size=20 }) {
  return <div style={{ width:size, height:size, border:`2.5px solid ${color}44`, borderTopColor:color, borderRadius:'50%', animation:'spin 0.7s linear infinite' }}/>;
}

function StatusBar() {
  const t = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 28px 0', color:C.text, fontSize:13, fontWeight:600 }}>
      <span>{t}</span>
      <div style={{ display:'flex', gap:5, alignItems:'center' }}>
        <svg width="16" height="11" viewBox="0 0 16 11" fill={C.text}><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4.5" y="2" width="3" height="9" rx="1"/><rect x="9" y=".5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="11" rx="1"/></svg>
        <svg width="17" height="11" viewBox="0 0 24 11" fill={C.text}><rect x="0" y="1.5" width="21" height="8" rx="2" stroke={C.text} strokeWidth="1.5" fill="none"/><rect x="21.5" y="3.5" width="2" height="4" rx="1" fill={C.text}/><rect x="1.5" y="3" width="13" height="5" rx="1"/></svg>
      </div>
    </div>
  );
}

function Wordmark({ size='sm' }) {
  const s = size==='lg'?36:26;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
      <div style={{ width:s, height:s, borderRadius:s*0.35, background:C.accent, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 3px 12px ${C.accent}55` }}>
        <Icon name="map" size={s*0.55} color="#fff"/>
      </div>
      <span style={{ fontSize:size==='lg'?26:20, fontWeight:800, color:C.text, letterSpacing:'-0.03em' }}>Link<span style={{color:C.accent}}>Up</span></span>
    </div>
  );
}

function Btn({ children, onClick, variant='primary', loading, disabled, full=true, small, style:sx={} }) {
  const [pr, setPr] = useState(false);
  const h = small ? 40 : 54;
  const vs = {
    primary: { background:C.accent, color:'#fff', boxShadow:`0 4px 18px ${C.accent}44` },
    ghost:   { background:C.surface, color:C.text, border:`1.5px solid ${C.border}` },
    subtle:  { background:C.accentG, color:C.accent, border:`1px solid ${C.accentL}` },
    success: { background:`oklch(62% 0.18 145)`, color:'#fff' },
    danger:  { background:`oklch(62% 0.2 15/0.15)`, color:C.error, border:`1px solid oklch(62% 0.2 15/0.3)` },
  };
  return (
    <button onClick={disabled||loading?undefined:onClick}
      onMouseDown={()=>setPr(true)} onMouseUp={()=>setPr(false)} onMouseLeave={()=>setPr(false)}
      style={{ width:full?'100%':undefined, height:h, borderRadius:small?12:16, border:'none', cursor:disabled||loading?'not-allowed':'pointer', fontSize:small?13:16, fontWeight:700, fontFamily:'inherit', display:'flex', alignItems:'center', justifyContent:'center', gap:7, transition:'all 0.15s', transform:pr?'scale(0.97)':'scale(1)', opacity:disabled||loading?0.55:1, paddingLeft:small?14:undefined, paddingRight:small?14:undefined, flexShrink:0, ...vs[variant], ...sx }}>
      {loading ? <Spinner color={variant==='ghost'?C.muted:'#fff'}/> : children}
    </button>
  );
}

function Avatar({ name, color, size=44 }) {
  const initials = name?.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() || '?';
  return (
    <div style={{ width:size, height:size, borderRadius:'50%', background:color||C.raised, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:size*0.36, fontWeight:700, color:'#fff', border:`2px solid ${C.border}` }}>
      {initials}
    </div>
  );
}

function Field({ label, type='text', value, onChange, icon, error, placeholder, suffix }) {
  const [focused, setFocused] = useState(false);
  return (
    <div style={{ marginBottom:15 }}>
      {label && <label style={{ display:'block', fontSize:11, fontWeight:700, color:C.muted, letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:7 }}>{label}</label>}
      <div style={{ display:'flex', alignItems:'center', gap:10, background:focused?C.surface:'oklch(13% 0.015 265)', border:`1.5px solid ${error?C.error:focused?C.accent:C.border}`, borderRadius:14, padding:'0 14px', height:52, transition:'all 0.2s', boxShadow:focused?`0 0 0 3px ${C.accentL}`:'none' }}>
        {icon && <span style={{ flexShrink:0 }}><Icon name={icon} size={18} color={focused?C.accent:C.muted}/></span>}
        <input type={type} value={value} onChange={onChange} placeholder={placeholder} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
          style={{ flex:1, background:'none', border:'none', outline:'none', color:C.text, fontSize:15, fontFamily:'inherit', fontWeight:500 }}/>
        {suffix}
      </div>
      {error && <p style={{ color:C.error, fontSize:12, marginTop:5, fontWeight:500 }}>{error}</p>}
    </div>
  );
}

function BottomNav({ active, onTab, inboxCount=0 }) {
  const tabs = [
    { id:'map',     icon:'map',    label:'Explore' },
    { id:'people',  icon:'people', label:'People'  },
    { id:'quests',  icon:'quest',  label:'Quests'  },
    { id:'rank',    icon:'trophy', label:'Ranks'   },
    { id:'profile', icon:'user',   label:'Profile' },
  ];
  return (
    <div style={{ display:'flex', borderTop:`1px solid ${C.border}`, background:C.bg, flexShrink:0 }}>
      {tabs.map(tab => {
        const on = active===tab.id;
        return (
          <button key={tab.id} onClick={()=>onTab(tab.id)} style={{ flex:1, padding:'10px 0 18px', background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:4, position:'relative' }}>
            <Icon name={tab.icon} size={21} color={on?C.accent:C.muted}/>
            <span style={{ fontSize:10, color:on?C.accent:C.muted, fontWeight:on?700:500 }}>{tab.label}</span>
            {tab.id==='people' && inboxCount>0 && (
              <div style={{ position:'absolute', top:8, right:'50%', transform:'translateX(8px)', width:16, height:16, borderRadius:'50%', background:C.error, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <span style={{ color:'#fff', fontSize:9, fontWeight:800 }}>{inboxCount}</span>
              </div>
            )}
          </button>
        );
      })}
    </div>
  );
}

// ── XP Toast ──────────────────────────────────────────────────────────────────
function XPToast({ events }) {
  return (
    <div style={{ position:'absolute', top:80, right:16, zIndex:200, display:'flex', flexDirection:'column', gap:6, pointerEvents:'none' }}>
      {events.map(ev => (
        <div key={ev.id} style={{ background:C.accent, color:'#fff', fontWeight:800, fontSize:13, borderRadius:20, padding:'6px 14px', display:'flex', alignItems:'center', gap:6, animation:'xpFloat 2s ease forwards', boxShadow:`0 4px 14px ${C.accent}66` }}>
          <Icon name="zap" size={13} color="#fff"/> +{ev.xp} XP {ev.coins?<>· 🪙 +{ev.coins}</>:null}
        </div>
      ))}
    </div>
  );
}

// ── Level-Up Modal ────────────────────────────────────────────────────────────
function LevelUpModal({ level, onDismiss }) {
  return (
    <div style={{ position:'absolute', inset:0, zIndex:300, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.7)', animation:'fadeIn 0.2s ease' }}>
      <div style={{ background:C.surface, borderRadius:28, padding:'36px 32px', textAlign:'center', width:320, border:`1px solid ${C.border}`, animation:'pop 0.4s ease' }}>
        <div style={{ fontSize:56, marginBottom:12, animation:'pop 0.5s ease 0.1s both' }}>🎉</div>
        <div style={{ background:`linear-gradient(135deg, ${C.accent}, ${C.gold})`, WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', fontSize:32, fontWeight:800, letterSpacing:'-0.02em', marginBottom:6 }}>
          Level {level}!
        </div>
        <p style={{ color:C.muted, fontSize:14, lineHeight:1.6, marginBottom:24 }}>You've leveled up! Keep meeting people to unlock more perks.</p>
        <div style={{ display:'flex', gap:12, justifyContent:'center', marginBottom:24 }}>
          {[['🗺️','Map Boost'],['👻','Stealth']].map(([e,l])=>(
            <div key={l} style={{ background:C.raised, borderRadius:14, padding:'10px 14px', textAlign:'center' }}>
              <div style={{ fontSize:22, marginBottom:4 }}>{e}</div>
              <p style={{ color:C.muted, fontSize:11 }}>{l} unlocked</p>
            </div>
          ))}
        </div>
        <Btn onClick={onDismiss}>Awesome!</Btn>
      </div>
    </div>
  );
}

// ── Request Modal ─────────────────────────────────────────────────────────────
function RequestModal({ target, onSend, onClose }) {
  const [msg, setMsg] = useState('');
  const [loading, setLoading] = useState(false);
  const [sent, setSent] = useState(false);

  async function handleSend() {
    setLoading(true);
    await new Promise(r=>setTimeout(r,900));
    setLoading(false);
    setSent(true);
    setTimeout(()=>onSend({ xp:5, coins:0, msg }), 600);
  }

  return (
    <div style={{ position:'absolute', inset:0, zIndex:100, display:'flex', flexDirection:'column', justifyContent:'flex-end' }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.55)', animation:'fadeIn 0.2s' }}/>

        ) : (
          <div style={{ textAlign:'center', padding:'12px 0 8px' }}>
            <div style={{ width:56, height:56, borderRadius:'50%', background:`${C.success}20`, border:`2px solid ${C.success}`, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px' }}>

        )}
      </div>
    </div>
  );
}

// ── Incoming Request Notification ─────────────────────────────────────────────
function InboxNotif({ requests, onAccept, onDecline }) {
  if (!requests.length) return null;
  const req = requests[0];
  const [timer, setTimer] = useState(600); // 10 min

  useEffect(() => {
    const t = setInterval(() => setTimer(v => v > 0 ? v-1 : 0), 1000);
    return () => clearInterval(t);
  }, []);

  const mm = String(Math.floor(timer/60)).padStart(2,'0');
  const ss = String(timer%60).padStart(2,'0');
  const pct = (timer/600)*100;

  return (
    <div style={{ position:'absolute', top:16, left:16, right:16, zIndex:150, animation:'fadeUp 0.3s ease' }}>
      <div style={{ background:C.surface, borderRadius:20, padding:'16px', border:`1.5px solid ${C.accent}55`, boxShadow:`0 8px 28px rgba(0,0,0,0.5)` }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
          <div style={{ display:'flex', gap:10, alignItems:'center' }}>
            <div style={{ position:'relative' }}>
              <Avatar name={req.sender_name} color={req.color} size={44}/>
              <div style={{ position:'absolute', bottom:0, right:0, width:14, height:14, borderRadius:'50%', background:C.accent, border:`2px solid ${C.surface}`, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Icon name="send" size={8} color="#fff"/>
              </div>
            </div>
            <div>
              <p style={{ color:C.text, fontWeight:700, fontSize:14 }}>{req.sender_name}</p>
              <p style={{ color:C.muted, fontSize:12 }}>wants to LinkUp · {req.distance_m}m away</p>
            </div>
          </div>
          <span style={{ color: timer<60?C.error:C.muted, fontSize:12, fontWeight:700, fontVariantNumeric:'tabular-nums' }}>{mm}:{ss}</span>
        </div>

        {/* Timer bar */}
        <div style={{ height:3, background:C.border, borderRadius:99, marginBottom:12 }}>
          <div style={{ height:'100%', width:`${pct}%`, background: timer<60?C.error:C.accent, borderRadius:99, transition:'width 1s linear' }}/>
        </div>

        {req.message && (
          <p style={{ color:C.muted, fontSize:13, fontStyle:'italic', marginBottom:12, lineHeight:1.5 }}>"{req.message}"</p>
        )}

        <div style={{ display:'flex', gap:8 }}>
          <Btn variant="danger" full={false} style={{ flex:1 }} small onClick={()=>onDecline(req.id)}>
            <Icon name="x" size={14} color={C.error}/> Decline
          </Btn>
          <Btn full={false} style={{ flex:2 }} small onClick={()=>onAccept(req.id)}>
            <Icon name="check" size={14} color="#fff"/> Accept +15 XP
          </Btn>
        </div>
      </div>
    </div>
  );
}

  const [scope, setScope] = useState('global');
  const myRank = MOCK_LEADERBOARD.findIndex(u=>u.username===myUsername)+1 || 6;
  const myEntry = { rank:myRank, username:myUsername, display_name:'You', xp:myXp, level:levelFromXp(myXp), total_meetups:0, current_streak:1, color:C.accent };
  const list = scope==='global' ? MOCK_LEADERBOARD : [...MOCK_LEADERBOARD].sort(()=>Math.random()-0.3).slice(0,4);

  const medals = ['🥇','🥈','🥉'];

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <StatusBar/>
      <div style={{ padding:'12px 20px 0' }}>
        <h2 style={{ color:C.text, fontWeight:800, fontSize:20, letterSpacing:'-0.02em' }}>Leaderboard</h2>
      </div>

      {/* Scope toggle */}
      <div style={{ display:'flex', gap:0, margin:'12px 20px', background:C.surface, borderRadius:14, padding:4 }}>
        {[{id:'global',label:'Global'},{id:'nearby',label:'Nearby (2km)'}].map(t=>(
          <button key={t.id} onClick={()=>setScope(t.id)} style={{ flex:1, padding:'8px', borderRadius:10, border:'none', background:scope===t.id?C.accent:'none', color:scope===t.id?'#fff':C.muted, fontWeight:700, fontSize:13, cursor:'pointer', fontFamily:'inherit', transition:'all 0.2s' }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Top 3 podium */}
      <div style={{ display:'flex', justifyContent:'center', alignItems:'flex-end', gap:10, padding:'0 20px 16px' }}>
        {[1,0,2].map(idx => {
          const u = list[idx];
          if (!u) return <div key={idx} style={{ width:90 }}/>;
          const heights = [80,100,70];
          const hi = [1,0,2].indexOf(idx);
          return (
            <div key={u.username} style={{ width:90, display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
              <Avatar name={u.display_name} color={u.color} size={idx===0?48:38}/>
              <p style={{ color:C.text, fontWeight:700, fontSize:12, textAlign:'center' }}>{u.display_name.split(' ')[0]}</p>
              <div style={{ width:'100%', height:heights[hi], background:idx===0?C.accent:C.surface, border:`1px solid ${idx===0?'transparent':C.border}`, borderRadius:'8px 8px 0 0', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start', paddingTop:8 }}>
                <span style={{ fontSize:18 }}>{medals[idx]}</span>
                <p style={{ color:idx===0?'#fff':C.muted, fontSize:11, fontWeight:700, marginTop:4 }}>{u.xp} XP</p>
              </div>
            </div>
          );
        })}
      </div>

      {/* Full list */}
      <div style={{ flex:1, overflow:'auto', padding:'0 16px' }}>
        {list.map((u,i)=>(
          <div key={u.username} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 12px', background:u.username===myUsername?C.accentL:C.surface, borderRadius:14, marginBottom:7, border:`1.5px solid ${u.username===myUsername?C.accent:C.border}`, animation:`fadeUp 0.25s ease ${i*0.05}s both` }}>
            <span style={{ color: i<3?[C.gold,'oklch(70% 0.01 265)','oklch(65% 0.12 35)'][i]:C.muted, fontWeight:800, fontSize:14, width:28, textAlign:'center', flexShrink:0 }}>
              {i<3 ? medals[i] : `#${u.rank}`}
            </span>
            <Avatar name={u.display_name} color={u.color} size={38}/>
            <div style={{ flex:1, minWidth:0 }}>
              <p style={{ color:C.text, fontWeight:700, fontSize:13 }}>{u.display_name}</p>
              <div style={{ display:'flex', gap:8, marginTop:2 }}>
                <span style={{ color:C.muted, fontSize:11 }}>Lv {u.level}</span>
                <span style={{ color:C.muted, fontSize:11 }}>·</span>
                <span style={{ color:C.muted, fontSize:11 }}>🤝 {u.total_meetups}</span>
                <span style={{ color:C.muted, fontSize:11 }}>·</span>
                <span style={{ color:C.muted, fontSize:11 }}>🔥 {u.current_streak}d</span>
              </div>
            </div>
            <span style={{ color: u.username===myUsername?C.accent:C.muted, fontWeight:800, fontSize:14, flexShrink:0 }}>{u.xp}</span>
          </div>
        ))}

        {/* My entry at bottom if not in top list */}
        {!list.find(u=>u.username===myUsername) && (
          <div style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 12px', background:C.accentL, borderRadius:14, marginBottom:7, border:`1.5px solid ${C.accent}` }}>
            <span style={{ color:C.muted, fontWeight:800, fontSize:14, width:28, textAlign:'center', flexShrink:0 }}>#{myEntry.rank}</span>
            <Avatar name={myEntry.display_name} color={myEntry.color} size={38}/>
            <div style={{ flex:1 }}>
              <p style={{ color:C.text, fontWeight:700, fontSize:13 }}>You</p>
              <p style={{ color:C.muted, fontSize:11 }}>Lv {myEntry.level} · 🤝 0 · 🔥 1d</p>
            </div>
            <span style={{ color:C.accent, fontWeight:800, fontSize:14 }}>{myXp}</span>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Profile Screen ────────────────────────────────────────────────────────────
function ProfileScreen({ user, xp, quests }) {
  const prog = levelProgress(xp);
  const doneQuests = quests.filter(q=>q.done).length;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <StatusBar/>
      <div style={{ flex:1, overflow:'auto' }}>
        {/* Cover */}
        <div style={{ height:110, background:`linear-gradient(135deg, ${C.accent}99, oklch(62% 0.22 55) 60%, oklch(62% 0.18 295))`, position:'relative' }}>
          <div style={{ position:'absolute', inset:0, background:`repeating-linear-gradient(45deg, transparent, transparent 20px, oklch(100% 0 0/0.04) 20px, oklch(100% 0 0/0.04) 40px)` }}/>
          <div style={{ position:'absolute', top:12, right:16 }}>
            <button style={{ width:32, height:32, borderRadius:'50%', background:'rgba(0,0,0,0.3)', border:`1px solid rgba(255,255,255,0.2)`, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
              <Icon name="edit" size={14} color="#fff"/>
            </button>
          </div>
        </div>

        <div style={{ padding:'0 20px' }}>
          <div style={{ marginTop:-32, marginBottom:14 }}>
            <div style={{ width:66, height:66, borderRadius:'50%', background:`linear-gradient(135deg, ${C.accent}, oklch(62% 0.22 55))`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:26, fontWeight:800, color:'#fff', border:`3px solid ${C.bg}`, boxShadow:`0 4px 14px rgba(0,0,0,0.4)`, marginBottom:10 }}>
              {user?.displayName?.[0]?.toUpperCase()||'Y'}
            </div>
            <h2 style={{ color:C.text, fontWeight:800, fontSize:19 }}>{user?.displayName||'You'}</h2>
            <p style={{ color:C.muted, fontSize:13 }}>@{user?.username||'yourhandle'}</p>
            {user?.bio && <p style={{ color:C.muted, fontSize:13, marginTop:6, lineHeight:1.6 }}>{user.bio}</p>}
          </div>

          {/* Level progress */}
          <div style={{ background:C.surface, borderRadius:16, padding:'14px 16px', marginBottom:14, border:`1px solid ${C.border}` }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ background:C.accentL, borderRadius:8, padding:'3px 8px' }}>
                  <span style={{ color:C.accent, fontWeight:800, fontSize:13 }}>Level {prog.level}</span>
                </div>
                <span style={{ color:C.muted, fontSize:12 }}>{prog.into}/{prog.needed} XP</span>
              </div>
              <span style={{ color:C.muted, fontSize:12 }}>{prog.pct}%</span>
            </div>
            <div style={{ height:6, background:C.border, borderRadius:99 }}>
              <div style={{ height:'100%', width:`${prog.pct}%`, background:`linear-gradient(90deg, ${C.accent}, oklch(62% 0.22 55))`, borderRadius:99, transition:'width 0.6s' }}/>
            </div>
          </div>

          {/* Stats */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8, marginBottom:14 }}>
            {[{val:xp,label:'XP'},{val:prog.level,label:'Level'},{val:0,label:'Meetups'},{val:`${doneQuests}/${quests.length}`,label:'Quests'}].map(s=>(
              <div key={s.label} style={{ background:C.surface, borderRadius:12, padding:'10px 6px', textAlign:'center', border:`1px solid ${C.border}` }}>
                <p style={{ color:C.text, fontWeight:800, fontSize:16 }}>{s.val}</p>
                <p style={{ color:C.muted, fontSize:10, marginTop:2 }}>{s.label}</p>
              </div>
            ))}
          </div>

          {/* Badges */}
          <div style={{ marginBottom:14 }}>
            <p style={{ color:C.muted, fontSize:11, fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:9 }}>Badges</p>
            <div style={{ display:'flex', gap:8 }}>
              {[{e:'🌟',l:'New Arrival'},{e:'📍',l:'First Pin'},{e:'🗺️',l:'Explorer'}].map(b=>(
                <div key={b.l} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:13, padding:'10px 10px', textAlign:'center', flex:1 }}>
                  <div style={{ fontSize:20 }}>{b.e}</div>
                  <p style={{ color:C.muted, fontSize:10, marginTop:4 }}>{b.l}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Streak */}
          <div style={{ background:`oklch(62% 0.2 30/0.1)`, border:`1px solid oklch(62% 0.2 30/0.25)`, borderRadius:16, padding:'12px 16px', display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
            <span style={{ fontSize:28 }}>🔥</span>
            <div>
              <p style={{ color:C.text, fontWeight:700, fontSize:14 }}>1-day streak</p>
              <p style={{ color:C.muted, fontSize:12, marginTop:1 }}>Come back tomorrow to keep it going!</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP STATE (global)
// ─────────────────────────────────────────────────────────────────────────────
const INITIAL_INCOMING = [
  { id:'req-demo-1', sender_name:'Jordan K.', username:'jordan_k', color:'oklch(58% 0.16 270)', distance_m:450, message:"Hey! Want to grab coffee nearby? 🙌" },
];

function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('lu3_state')||'{}'); } catch { return {}; } })();

  const [tab,      setTab]      = useState(saved.tab   || 'map');
  const [xp,       setXp]       = useState(saved.xp    || 50);
  const [quests,   setQuests]   = useState(saved.quests || MOCK_QUESTS);
  const [user]                  = useState(saved.user  || { displayName:'You', username:'you', bio:'New to LinkUp!', interests:['Coffee meetups','Explore the city'] });

  const [xpToasts,      setXpToasts]      = useState([]);
  const [levelUpModal,  setLevelUpModal]  = useState(null);
  const [requestModal,  setRequestModal]  = useState(null);
  const [incomingReqs,  setIncomingReqs]  = useState(INITIAL_INCOMING);

  function persist(updates) {
    localStorage.setItem('lu3_state', JSON.stringify({ tab, xp, quests, user, ...updates }));
  }

  function awardXP(amount, coins=0) {
    const toastId = Date.now();
    setXpToasts(t => [...t, { id:toastId, xp:amount, coins }]);
    setTimeout(() => setXpToasts(t => t.filter(e=>e.id!==toastId)), 2000);

    setXp(prev => {
      const newXp = prev + amount;
      const prevLevel = levelFromXp(prev);
      const newLevel  = levelFromXp(newXp);
      if (newLevel > prevLevel) setTimeout(() => setLevelUpModal(newLevel), 400);
      persist({ xp: newXp });
      return newXp;
    });
  }

  function handleSendRequest(target) {
    setRequestModal(target);
  }

  function handleRequestSent({ xp: xpAmt }) {
    setTimeout(() => {
      setRequestModal(null);
      awardXP(xpAmt || 5);
      setQuests(q => q.map(qst => qst.key==='first_linkup' ? { ...qst, progress:Math.min((qst.progress||0)+1, qst.target), done:(qst.progress||0)+1>=qst.target, claimable:(qst.progress||0)+1>=qst.target&&!qst.done } : qst.key==='daily_request' ? { ...qst, progress:Math.min((qst.progress||0)+1, qst.target), done:(qst.progress||0)+1>=qst.target } : qst));
    }, 800);
  }

  function handleAccept(reqId) {
    setIncomingReqs(r => r.filter(x=>x.id!==reqId));
    awardXP(15, 2);
  }

  function handleDecline(reqId) {
    setIncomingReqs(r => r.filter(x=>x.id!==reqId));
  }

  function handleClaimQuest(key) {
    const q = quests.find(x=>x.key===key);
    if (q) {
      awardXP(q.xp, q.coins);
      setQuests(qs => qs.map(x => x.key===key ? { ...x, claimable:false } : x));
    }
  }

  function goTab(t) { setTab(t); persist({ tab:t }); }

  const tabScreens = {
    map:     <MapScreen user={user} xp={xp} onRequestUser={handleSendRequest} incomingRequests={incomingReqs} onAccept={handleAccept} onDecline={handleDecline}/>,
    people:  <PeopleScreen onRequestUser={handleSendRequest} incomingRequests={incomingReqs} onAccept={handleAccept} onDecline={handleDecline}/>,
    quests:  <QuestsScreen quests={quests} onClaim={handleClaimQuest}/>,
    rank:    <RankScreen myXp={xp} myUsername={user.username}/>,
    profile: <ProfileScreen user={user} xp={xp} quests={quests}/>,
  };

  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', background:'oklch(14% 0.02 265)' }}>
      <div className="phone">
        <div style={{ height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>
          <div style={{ flex:1, overflow:'hidden', position:'relative' }}>
            {tabScreens[tab] || tabScreens.map}
            <XPToast events={xpToasts}/>
            {levelUpModal && <LevelUpModal level={levelUpModal} onDismiss={()=>setLevelUpModal(null)}/>}
            {requestModal && <RequestModal target={requestModal} onSend={handleRequestSent} onClose={()=>setRequestModal(null)}/>}
          </div>
          <BottomNav active={tab} onTab={goTab} inboxCount={incomingReqs.length}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
