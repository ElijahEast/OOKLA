  error:'oklch(62% 0.2 15)', success:'oklch(62% 0.18 145)', gold:'oklch(75% 0.18 75)',
  purple:'oklch(62% 0.18 295)', blue:'oklch(62% 0.18 240)',
};

function xpForLevel(l){return Math.floor(100*Math.pow(l,1.5));}
function levelFromXp(xp){let l=1;while(xpForLevel(l+1)<=xp)l++;return l;}
function levelProgress(xp){
  const l=levelFromXp(xp), cur=l===1?0:xpForLevel(l), next=xpForLevel(l+1);
  return{level:l,pct:Math.round((xp-cur)/(next-cur)*100),into:xp-cur,needed:next-cur};
}
function fmtDist(m){return m<1000?`${m}m`:`${(m/1000).toFixed(1)}km`;}
function timeAgo(ms){
  const s=Math.floor((Date.now()-ms)/1000);
  if(s<60) return 'just now';
  if(s<3600) return `${Math.floor(s/60)}m ago`;
  if(s<86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function Spinner({color='#fff',size=20}){return <div style={{width:size,height:size,border:`2.5px solid ${color}44`,borderTopColor:color,borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>;}
function StatusBar(){
  const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 28px 0',color:C.text,fontSize:13,fontWeight:600}}><span>{t}</span><div style={{display:'flex',gap:5,alignItems:'center'}}><svg width="16" height="11" viewBox="0 0 16 11" fill={C.text}><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4.5" y="2" width="3" height="9" rx="1"/><rect x="9" y=".5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="11" rx="1"/></svg><svg width="17" height="11" viewBox="0 0 24 11" fill={C.text}><rect x="0" y="1.5" width="21" height="8" rx="2" stroke={C.text} strokeWidth="1.5" fill="none"/><rect x="21.5" y="3.5" width="2" height="4" rx="1" fill={C.text}/><rect x="1.5" y="3" width="13" height="5" rx="1"/></svg></div></div>;
}
function Wordmark(){return <div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:26,height:26,borderRadius:9,background:C.accent,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 3px 12px ${C.accent}55`}}><Icon name="map" size={14} color="#fff"/></div><span style={{fontSize:20,fontWeight:800,color:C.text,letterSpacing:'-0.03em'}}>Link<span style={{color:C.accent}}>Up</span></span></div>;}
function Avatar({name,color,size=44}){const i=name?.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()||'?';return <div style={{width:size,height:size,borderRadius:'50%',background:color||C.raised,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.36,fontWeight:700,color:'#fff',border:`2px solid ${C.border}`}}>{i}</div>;}
function Btn({children,onClick,variant='primary',loading,disabled,full=true,small,style:sx={}}){
  const[pr,setPr]=useState(false);
  const h=small?40:54;
  const vs={primary:{background:C.accent,color:'#fff',boxShadow:`0 4px 18px ${C.accent}44`},ghost:{background:C.surface,color:C.text,border:`1.5px solid ${C.border}`},subtle:{background:C.accentG,color:C.accent,border:`1px solid ${C.accentL}`},success:{background:'oklch(62% 0.18 145)',color:'#fff'},danger:{background:'oklch(62% 0.2 15/0.12)',color:C.error,border:`1px solid oklch(62% 0.2 15/0.25)`}};
  return <button onClick={disabled||loading?undefined:onClick} onMouseDown={()=>setPr(true)} onMouseUp={()=>setPr(false)} onMouseLeave={()=>setPr(false)} style={{width:full?'100%':undefined,height:h,borderRadius:small?12:16,border:'none',cursor:disabled||loading?'not-allowed':'pointer',fontSize:small?13:16,fontWeight:700,fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:7,transition:'all 0.15s',transform:pr?'scale(0.97)':'scale(1)',opacity:disabled||loading?0.55:1,paddingLeft:small?14:undefined,paddingRight:small?14:undefined,flexShrink:0,...vs[variant],...sx}}>{loading?<Spinner color={variant==='ghost'||variant==='danger'?C.muted:'#fff'}/>:children}</button>;
}
function XPToast({events}){return <div style={{position:'absolute',top:80,right:14,zIndex:200,display:'flex',flexDirection:'column',gap:5,pointerEvents:'none'}}>{events.map(ev=><div key={ev.id} style={{background:C.accent,color:'#fff',fontWeight:800,fontSize:12,borderRadius:20,padding:'5px 12px',display:'flex',alignItems:'center',gap:5,animation:'xpFloat 2s ease forwards',boxShadow:`0 4px 14px ${C.accent}66`}}><Icon name="zap" size={12} color="#fff"/>+{ev.xp} XP{ev.coins?<> · 🪙+{ev.coins}</>:null}</div>)}</div>;}
function LevelUpModal({level,onDismiss}){return <div style={{position:'absolute',inset:0,zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.75)',animation:'fadeIn 0.2s'}}><div style={{background:C.surface,borderRadius:28,padding:'34px 30px',textAlign:'center',width:300,border:`1px solid ${C.border}`,animation:'pop 0.4s ease'}}><div style={{fontSize:52,marginBottom:10}}>🎉</div><div style={{background:`linear-gradient(135deg,${C.accent},${C.gold})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',fontSize:28,fontWeight:800,marginBottom:6}}>Level {level}!</div><p style={{color:C.muted,fontSize:13,lineHeight:1.7,marginBottom:20}}>You've leveled up! Keep exploring and meeting people.</p><Btn onClick={onDismiss}>Awesome! 🚀</Btn></div></div>;}

// ── Bottom Nav ─────────────────────────────────────────────────────────────────
// Tabs: map | people | shop | quests | profile
function BottomNav({active,onTab,inboxCount=0}){
  const tabs=[
    {id:'map',     icon:'map',    label:'Explore'},
    {id:'people',  icon:'people', label:'People', badge:inboxCount},
    {id:'network', icon:'network',label:'Graph'},
    {id:'shop',    icon:'shop',   label:'Shop'},
    {id:'profile', icon:'user',   label:'Profile'},
  ];
  return <div style={{display:'flex',borderTop:`1px solid ${C.border}`,background:C.bg,flexShrink:0}}>
    {tabs.map(tab=>{
      const on=active===tab.id;
      // network icon is custom SVG
      const networkIcon=<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke={on?C.accent:C.muted} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="5" y2="16"/><line x1="12" y1="8" x2="19" y2="16"/></svg>;
      return <button key={tab.id} onClick={()=>onTab(tab.id)} style={{flex:1,padding:'10px 0 18px',background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4,position:'relative'}}>
        {tab.id==='network'?networkIcon:<Icon name={tab.icon} size={21} color={on?C.accent:C.muted}/>}
        <span style={{fontSize:10,color:on?C.accent:C.muted,fontWeight:on?700:500}}>{tab.label}</span>
        {tab.badge>0&&<div style={{position:'absolute',top:7,right:'50%',transform:'translateX(10px)',width:16,height:16,borderRadius:'50%',background:C.error,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'#fff',fontSize:9,fontWeight:800}}>{tab.badge}</span></div>}
      </button>;
    })}
  </div>;
}

// ── Notification Center (slide-down overlay) ──────────────────────────────────
function NotifCenter({notifs,onClose,onMarkAll}){
  return <div style={{position:'absolute',inset:0,zIndex:250,display:'flex',flexDirection:'column'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)',animation:'fadeIn 0.2s'}}/>

// ── Meetup Verification System ────────────────────────────────────────────────
function QRCode({code}){
  // Deterministic pseudo-QR drawn from the code string
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    const size=160, cell=8, cols=size/cell;
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,size,size);
    // Seed from code chars
    const seed=code.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const rand=(i)=>((seed*i*2654435761)>>>0)%100;
    ctx.fillStyle='#111';
    // Position markers (top-left, top-right, bottom-left)
    [[0,0],[cols-7,0],[0,cols-7]].forEach(([ox,oy])=>{
      ctx.fillRect(ox*cell,oy*cell,7*cell,7*cell);
      ctx.fillStyle='#fff'; ctx.fillRect((ox+1)*cell,(oy+1)*cell,5*cell,5*cell);
      ctx.fillStyle='#111'; ctx.fillRect((ox+2)*cell,(oy+2)*cell,3*cell,3*cell);
      ctx.fillStyle='#111';
    });
    // Data cells
    for(let r=0;r<cols;r++) for(let c=0;c<cols;c++){
      const inMarker=(r<8&&c<8)||(r<8&&c>=cols-8)||(r>=cols-8&&c<8);
      if(!inMarker && rand(r*cols+c+1)>45){
        ctx.fillRect(c*cell,r*cell,cell,cell);
      }
    }
  },[code]);
  return <canvas ref={ref} width={160} height={160} style={{borderRadius:12,display:'block'}}/>;
}

              <p style={{color:distM<500?C.success:C.muted,fontSize:11,marginTop:1}}>{distM<500?'✓ Within meetup range':'Move closer for best results'}</p>
            </div>
          </div>

          <Btn onClick={handleHostNext}>They entered the code →</Btn>
        </div>}

        {/* ── JOIN: ENTER CODE ── */}
        {step==='join-enter'&&<div style={{padding:'20px 24px 32px'}}>

          <div style={{display:'flex',gap:8,marginBottom:8,justifyContent:'center'}}>

            style={{width:'100%',background:C.surface,border:`1.5px solid ${codeError?C.error:C.border}`,borderRadius:14,padding:'12px 16px',color:C.text,fontSize:16,fontFamily:'inherit',fontWeight:700,letterSpacing:'0.15em',textAlign:'center',outline:'none',marginBottom:8}}
            autoFocus/>
          {codeError&&<p style={{color:C.error,fontSize:12,textAlign:'center',marginBottom:8,fontWeight:500}}>{codeError}</p>}

          {/* GPS */}
          <div style={{background:C.surface,borderRadius:14,padding:'10px 16px',display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
            <div style={{position:'relative',width:32,height:32,flexShrink:0}}>
              <div style={{position:'absolute',inset:0,borderRadius:'50%',background:`${gpsColor}22`,border:`2px solid ${gpsColor}44`,animation:'gpsRing 1.5s ease-out infinite'}}/>
              <div style={{position:'absolute',inset:4,borderRadius:'50%',background:gpsColor,opacity:0.9}}/>
            </div>
            <div>
              <p style={{color:C.text,fontWeight:600,fontSize:12}}>GPS: {fmtDist(distM)} from {partner.display_name}</p>
              <p style={{color:distM<500?C.success:C.muted,fontSize:11,marginTop:1}}>{distM<500?'✓ In range':'Move closer'}</p>
            </div>
          </div>
          <Btn onClick={handleJoinSubmit} disabled={entered.length!==6}>Verify Code</Btn>
        </div>}

        {/* ── GPS LOCK ── */}
        {step==='gps'&&<div style={{padding:'28px 24px 40px',display:'flex',flexDirection:'column',alignItems:'center',gap:0}}>
          <p style={{color:C.text,fontWeight:800,fontSize:18,marginBottom:4,textAlign:'center'}}>Verifying Location</p>
          <p style={{color:C.muted,fontSize:13,marginBottom:28,textAlign:'center'}}>Confirming you're both in the same place...</p>

          {/* GPS rings */}
          <div style={{width:130,height:130,position:'relative',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:24}}>
            {[0,1,2].map(i=>(
              <div key={i} style={{position:'absolute',inset:i*-18,borderRadius:'50%',border:`1.5px solid ${C.accent}`,opacity:(1-i*0.28)*0.6,animation:`gpsRing ${1.2+i*0.4}s ease-out ${i*0.3}s infinite`}}/>
            ))}
            <div style={{width:64,height:64,borderRadius:'50%',background:C.accentL,border:`2px solid ${C.accent}`,display:'flex',alignItems:'center',justifyContent:'center',zIndex:1}}>
              <Icon name="location" size={30} color={C.accent}/>
            </div>
          </div>

          {/* Progress bar */}
          <div style={{width:'100%',marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{color:C.muted,fontSize:12}}>GPS lock</span>
              <span style={{color:gpsOk?C.success:C.accent,fontSize:12,fontWeight:700}}>{gpsProgress}%</span>
            </div>
            <div style={{height:6,background:C.border,borderRadius:99}}>
              <div style={{height:'100%',width:`${gpsProgress}%`,background:gpsOk?C.success:`linear-gradient(90deg,${C.accent},oklch(62% 0.22 55))`,borderRadius:99,transition:'width 0.1s'}}/>
            </div>
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:7,width:'100%',marginTop:8}}>
            {[
              {label:'Code verified',done:true},
              {label:`GPS proximity (${fmtDist(distM)})`,done:gpsProgress>40},
              {label:'Location cross-check',done:gpsProgress>75},
            ].map(c=>(
              <div key={c.label} style={{display:'flex',gap:10,alignItems:'center',padding:'9px 14px',background:C.surface,borderRadius:12,border:`1px solid ${c.done?'oklch(62% 0.18 145/0.3)':C.border}`,transition:'all 0.4s'}}>
                <div style={{width:20,height:20,borderRadius:'50%',background:c.done?C.success:C.border,display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.4s',flexShrink:0}}>
                  {c.done?<Icon name="check" size={12} color="#fff"/>:<Spinner color={C.muted} size={12}/>}
                </div>
                <p style={{color:c.done?C.text:C.muted,fontSize:13,fontWeight:c.done?600:400,transition:'color 0.4s'}}>{c.label}</p>
              </div>
            ))}
          </div>
        </div>}

        {/* ── BOTH CONFIRM ── */}
        {step==='confirm'&&<div style={{padding:'24px 24px 36px',display:'flex',flexDirection:'column',alignItems:'center',gap:0}}>
          <div style={{width:68,height:68,borderRadius:'50%',background:`${C.success}18`,border:`2px solid ${C.success}`,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
            <Icon name="check" size={32} color={C.success}/>
          </div>
          <p style={{color:C.text,fontWeight:800,fontSize:19,marginBottom:6,textAlign:'center'}}>Location confirmed!</p>
          <p style={{color:C.muted,fontSize:13,lineHeight:1.7,marginBottom:24,textAlign:'center'}}>
            You're both in the same spot 📍 <br/>Tap confirm to complete this meetup and collect your rewards.
          </p>

          {/* Reward preview */}
          <div style={{background:C.surface,borderRadius:18,padding:'16px 20px',width:'100%',marginBottom:20,border:`1px solid ${C.border}`}}>
            <p style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:12}}>Your rewards</p>
            <div style={{display:'flex',justifyContent:'space-around'}}>
              {[{e:'⚡',v:'+50 XP',l:'Meetup'},{e:'🪙',v:'+5 coins',l:'Bonus'},{e:'🎯',v:'Quest',l:'Progress'}].map(r=>(
                <div key={r.l} style={{textAlign:'center'}}>
                  <div style={{fontSize:26,marginBottom:4}}>{r.e}</div>
                  <p style={{color:C.accent,fontWeight:800,fontSize:14}}>{r.v}</p>
                  <p style={{color:C.muted,fontSize:11}}>{r.l}</p>
                </div>
              ))}
            </div>
          </div>

          <Btn onClick={()=>{setConfirmed(true);setTimeout(()=>setStep('done'),400);}}>
            <Icon name="check" size={16} color="#fff"/> Confirm Meetup
          </Btn>
        </div>}

        {/* ── DONE ── */}
        {step==='done'&&<div style={{padding:'30px 24px 40px',display:'flex',flexDirection:'column',alignItems:'center',gap:0,textAlign:'center',animation:'pop 0.4s ease'}}>
          <div style={{fontSize:60,marginBottom:12}}>🎉</div>
          <h3 style={{color:C.text,fontWeight:800,fontSize:22,letterSpacing:'-0.02em',marginBottom:6}}>Meetup Verified!</h3>
          <p style={{color:C.muted,fontSize:13,lineHeight:1.7,marginBottom:20}}>You and {partner.display_name} just made it official. Rewards have been added to both profiles.</p>
          <div style={{display:'flex',gap:12,marginBottom:24}}>
            {[{e:'⚡',v:'+50 XP'},{e:'🪙',v:'+5 coins'},{e:'🤝',v:'Meetup #1'}].map(r=>(
              <div key={r.v} style={{background:C.surface,borderRadius:14,padding:'12px',flex:1,border:`1px solid ${C.border}`,animation:'countUp 0.4s ease both'}}>
                <div style={{fontSize:22,marginBottom:4}}>{r.e}</div>
                <p style={{color:C.accent,fontWeight:800,fontSize:13}}>{r.v}</p>
              </div>
            ))}
          </div>
          <Btn onClick={()=>onComplete()}>Done</Btn>
        </div>}
      </div>
    </div>
  );
}

function ChatScreen({partner,goldTheme,onBack,onMeetupVerified,onOpenSafety}){
  const [msgs,setMsgs]=useState([
    {id:1,from:'them',body:"Hey! Glad you accepted 😊",time:'2:41 PM'},
    {id:2,from:'me',body:"Same! Where are you?",time:'2:42 PM'},
    {id:3,from:'them',body:"Outside the coffee shop on Main St — green awning",time:'2:43 PM'},
    {id:4,from:'me',body:"Perfect, I'll be there in 5 min 🚶",time:'2:43 PM'},
  ]);
  const [input,setInput]=useState('');
  const [showVerify,setShowVerify]=useState(false);
  const [meetupDone,setMeetupDone]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs]);

  function send(){
    if(!input.trim()) return;
    const now=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    setMsgs(m=>[...m,{id:Date.now(),from:'me',body:input.trim(),time:now}]);
    setInput('');
    const replies=["On my way!","Sounds good 👍","See you soon!","Can't wait 🙌","😄"];
    setTimeout(()=>{
      const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      setMsgs(m=>[...m,{id:Date.now()+1,from:'them',body:replies[Math.floor(Math.random()*replies.length)],time:t}]);
    },1000+Math.random()*800);
  }

  function handleVerifyComplete(){
    setShowVerify(false);
    setMeetupDone(true);
    const now=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
    setMsgs(m=>[...m,{id:Date.now(),from:'system',body:'✅ Meetup verified! +50 XP awarded to both.',time:now}]);
    if(onMeetupVerified) onMeetupVerified();
  }

  const bubbleMine=goldTheme?{background:`linear-gradient(135deg,${C.gold},oklch(70% 0.18 55))`,color:'#1a1008'}:{background:C.accent,color:'#fff'};

  return <div style={{height:'100%',display:'flex',flexDirection:'column',animation:'slideRight 0.25s ease',position:'relative'}}>
    <StatusBar/>
    <div style={{padding:'10px 18px 12px',display:'flex',alignItems:'center',gap:12,borderBottom:`1px solid ${C.border}`}}>
      <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',padding:4,display:'flex'}}><Icon name="back" size={20} color={C.muted}/></button>
      <Avatar name={partner.display_name} color={partner.color} size={36}/>
      <div style={{flex:1}}>
        <p style={{color:C.text,fontWeight:700,fontSize:15}}>{partner.display_name}</p>
        <div style={{display:'flex',gap:4,alignItems:'center'}}><div style={{width:6,height:6,borderRadius:'50%',background:C.success}}/><p style={{color:C.muted,fontSize:11}}>Active now · {fmtDist(partner.distance_m||450)}</p></div>
      </div>
      <div style={{background:C.accentG,borderRadius:9,padding:'3px 9px'}}><span style={{color:C.accent,fontSize:11,fontWeight:700}}>Lv {partner.level}</span></div>
      <button onClick={onOpenSafety} style={{background:`${C.success}18`,border:`1px solid ${C.success}44`,borderRadius:9,padding:'4px 9px',cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:13}}>🛡️</span><span style={{color:C.success,fontSize:11,fontWeight:700}}>Safety</span>
      </button>
    </div>
    <div style={{flex:1,overflow:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:9}}>
      <div style={{textAlign:'center',marginBottom:4}}><span style={{background:C.surface,borderRadius:20,padding:'4px 12px',color:C.muted,fontSize:11,border:`1px solid ${C.border}`}}>Today · Meetup accepted 🎉</span></div>
      {msgs.map(m=>(
        m.from==='system'
          ?<div key={m.id} style={{textAlign:'center'}}><span style={{background:'oklch(62% 0.18 145/0.12)',border:'1px solid oklch(62% 0.18 145/0.3)',borderRadius:20,padding:'6px 14px',color:C.success,fontSize:12,fontWeight:600}}>{m.body}</span></div>
          :<div key={m.id} style={{display:'flex',justifyContent:m.from==='me'?'flex-end':'flex-start',gap:7,animation:'fadeUp 0.2s ease'}}>
            {m.from==='them'&&<Avatar name={partner.display_name} color={partner.color} size={26}/>}
            <div style={{maxWidth:'73%'}}>
              <div style={{...(m.from==='me'?bubbleMine:{background:C.surface,color:C.text}),padding:'9px 13px',borderRadius:m.from==='me'?'17px 17px 4px 17px':'17px 17px 17px 4px',fontSize:14,lineHeight:1.5,border:m.from!=='me'?`1px solid ${C.border}`:'none'}}>{m.body}</div>
              <p style={{color:C.muted,fontSize:10,marginTop:2,textAlign:m.from==='me'?'right':'left'}}>{m.time}</p>
            </div>
          </div>
      ))}
      <div ref={bottomRef}/>
    </div>

    {!meetupDone
      ?<div style={{margin:'0 13px 9px',background:'oklch(62% 0.18 145/0.08)',border:`1px solid oklch(62% 0.18 145/0.22)`,borderRadius:13,padding:'10px 13px',display:'flex',alignItems:'center',gap:9}}>
        <span style={{fontSize:16}}>📍</span>
        <p style={{color:C.muted,fontSize:12,flex:1}}>Met up? Verify with <span style={{color:C.success,fontWeight:700}}>QR + GPS</span></p>
        <button onClick={()=>setShowVerify(true)} style={{background:C.success,border:'none',borderRadius:8,padding:'5px 11px',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit',flexShrink:0}}>Verify</button>
      </div>
      :<div style={{margin:'0 13px 9px',background:'oklch(62% 0.18 145/0.12)',border:`1px solid oklch(62% 0.18 145/0.3)`,borderRadius:13,padding:'10px 14px',display:'flex',alignItems:'center',gap:9}}>
        <span style={{fontSize:18}}>✅</span>
        <p style={{color:C.success,fontSize:13,fontWeight:700}}>Meetup verified! Rewards collected.</p>
      </div>
    }

    <div style={{padding:'0 13px 26px',display:'flex',gap:8,alignItems:'center'}}>
      <div style={{flex:1,background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:22,padding:'9px 15px'}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send();}} placeholder="Message..." style={{width:'100%',background:'none',border:'none',outline:'none',color:C.text,fontSize:14,fontFamily:'inherit'}}/>
      </div>
      <button onClick={send} style={{width:40,height:40,borderRadius:'50%',background:input.trim()?C.accent:C.border,border:'none',cursor:input.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.2s',flexShrink:0}}><Icon name="send" size={15} color="#fff"/></button>
    </div>

    {showVerify&&<MeetupVerifyModal partner={partner} onComplete={handleVerifyComplete} onClose={()=>setShowVerify(false)}/>}
  </div>;
}

// PEOPLE  (Friends | Nearby | Inbox)

              <p style={{color:C.muted,fontSize:11,marginTop:2}}>@{f.username} · {fmtDist(f.distance_m||950)}</p>

              <div style={{display:'flex',alignItems:'center',gap:7}}><p style={{color:C.text,fontWeight:700,fontSize:14}}>{u.display_name}</p><span style={{background:C.accentG,color:C.accent,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px'}}>Lv {u.level}</span>{isFriend&&<span style={{background:'oklch(62% 0.18 145/0.12)',color:C.success,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px'}}>Friend</span>}</div>

        )}
      </div>
    </>}
  </div>;
}

          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <p style={{color:C.text,fontWeight:700,fontSize:14}}>{item.name}</p>
              <span style={{background:item.category==='boost'?C.accentG:'oklch(62% 0.18 295/0.12)',color:item.category==='boost'?C.accent:C.purple,fontSize:9,fontWeight:700,borderRadius:4,padding:'1px 5px',textTransform:'uppercase'}}>{item.category}</span>
            </div>
            <p style={{color:C.muted,fontSize:12,marginTop:2,lineHeight:1.4}}>{item.desc}</p>
            {item.dur&&<p style={{color:C.muted,fontSize:11,marginTop:3}}>⏱ Duration: {item.dur}</p>}

          <div style={{flexShrink:0}}>
            {isOwned
              ?<div style={{background:'oklch(62% 0.18 145/0.15)',borderRadius:10,padding:'5px 10px',textAlign:'center'}}><span style={{color:C.success,fontSize:11,fontWeight:700}}>✓ Owned</span></div>
              :<Btn small full={false} disabled={!canAfford} onClick={()=>onBuy(item)} style={{opacity:canAfford?1:0.4}}>🪙 {item.cost}</Btn>

        </div>;
      })}

  </div>;
}

                  {q.xp>0&&<span style={{background:q.done?'oklch(62% 0.18 145/0.15)':C.accentG,color:q.done?C.success:C.accent,fontSize:10,fontWeight:700,borderRadius:6,padding:'2px 6px'}}>+{q.xp} XP</span>}

        </div>
      ))}

  </div>;
}

            <div key={b.l} style={{background:b.earned?C.surface:'oklch(14% 0.01 265)',border:`1px solid ${b.earned?C.border:'oklch(20% 0.01 265)'}`,borderRadius:16,padding:'14px 10px',textAlign:'center',opacity:b.earned?1:0.45}}>
              <div style={{fontSize:28,marginBottom:5,filter:b.earned?'none':'grayscale(1)'}}>{b.e}</div>
              <p style={{color:b.earned?C.text:C.muted,fontWeight:700,fontSize:12}}>{b.l}</p>
              <p style={{color:C.muted,fontSize:10,marginTop:2}}>{b.desc}</p>

}

// ── Block / Report Modal ──────────────────────────────────────────────────────
function BlockReportModal({target,onBlock,onReport,onClose}){
  const [mode,setMode]=useState('menu');          // menu | report | blocked | reported
  const [category,setCategory]=useState('');
  const [desc,setDesc]=useState('');
  const [loading,setLoading]=useState(false);

  const categories=[
    {key:'spam',            label:'Spam or scam',            emoji:'🚫'},
    {key:'harassment',      label:'Harassment or bullying',  emoji:'😠'},
    {key:'fake_profile',    label:'Fake profile',            emoji:'🎭'},
    {key:'inappropriate_content',label:'Inappropriate content',emoji:'⚠️'},
    {key:'underage',        label:'Underage user',           emoji:'🔞'},
    {key:'violence',        label:'Threats or violence',     emoji:'🔴'},
    {key:'other',           label:'Other',                   emoji:'❓'},
  ];

  async function submitReport(){
    if(!category) return;
    setLoading(true);
    await new Promise(r=>setTimeout(r,900));
    setLoading(false);
    setMode('reported');
    onReport(target, category); // auto-blocks in parent handler
  }

  async function submitBlock(){
    setLoading(true);
    await new Promise(r=>setTimeout(r,600));
    setLoading(false);
    setMode('blocked');
    onBlock(target);
  }

  return <div style={{position:'absolute',inset:0,zIndex:300,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)',animation:'fadeIn 0.2s'}}/>
    <div style={{position:'relative',background:C.bg,borderRadius:'26px 26px 0 0',padding:'0 22px 38px',animation:'slideUp 0.3s ease',border:`1px solid ${C.border}`,maxHeight:'88%',display:'flex',flexDirection:'column'}}>
      <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:'12px auto 18px',flexShrink:0}}/>

      {mode==='menu'&&<>
        <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:20}}>
          <Avatar name={target.display_name} color={target.color} size={46}/>
          <div><p style={{color:C.text,fontWeight:700,fontSize:16}}>{target.display_name}</p><p style={{color:C.muted,fontSize:12}}>@{target.username}</p></div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          <button onClick={()=>setMode('report')} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:'15px 18px',cursor:'pointer',textAlign:'left',display:'flex',gap:14,alignItems:'center',fontFamily:'inherit'}}>
            <div style={{width:42,height:42,borderRadius:12,background:'oklch(62% 0.2 15/0.12)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🚨</div>
            <div><p style={{color:C.text,fontWeight:700,fontSize:14}}>Report</p><p style={{color:C.muted,fontSize:12,marginTop:1}}>Something feels wrong or unsafe</p></div>
          </button>
          <button onClick={submitBlock} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:'15px 18px',cursor:'pointer',textAlign:'left',display:'flex',gap:14,alignItems:'center',fontFamily:'inherit'}}>
            <div style={{width:42,height:42,borderRadius:12,background:'oklch(62% 0.18 270/0.12)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🚫</div>
            <div><p style={{color:C.text,fontWeight:700,fontSize:14}}>Block</p><p style={{color:C.muted,fontSize:12,marginTop:1}}>They won't be able to see you or contact you</p></div>
          </button>
          <button onClick={onClose} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:14,padding:'13px',cursor:'pointer',color:C.muted,fontWeight:600,fontSize:14,fontFamily:'inherit'}}>Cancel</button>
        </div>
      </>}

      {mode==='report'&&<div style={{flex:1,overflow:'auto'}}>
        <p style={{color:C.text,fontWeight:800,fontSize:17,marginBottom:6}}>Report {target.display_name}</p>
        <p style={{color:C.muted,fontSize:13,marginBottom:16,lineHeight:1.6}}>Select what's happening. Your report is anonymous.</p>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:14}}>
          {categories.map(cat=>(
            <button key={cat.key} onClick={()=>setCategory(cat.key)} style={{background:category===cat.key?C.accentL:C.surface,border:`1.5px solid ${category===cat.key?C.accent:C.border}`,borderRadius:13,padding:'12px 15px',cursor:'pointer',textAlign:'left',display:'flex',gap:10,alignItems:'center',fontFamily:'inherit',transition:'all 0.15s'}}>
              <span style={{fontSize:18}}>{cat.emoji}</span>
              <p style={{color:category===cat.key?C.accent:C.text,fontWeight:category===cat.key?700:500,fontSize:14}}>{cat.label}</p>
              {category===cat.key&&<div style={{marginLeft:'auto',width:18,height:18,borderRadius:'50%',background:C.accent,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="check" size={11} color="#fff"/></div>}
            </button>
          ))}
        </div>
        <div style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:13,padding:'11px 14px',marginBottom:16}}>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Add any details (optional)..." maxLength={500}
            style={{width:'100%',background:'none',border:'none',outline:'none',color:C.text,fontSize:13,fontFamily:'inherit',lineHeight:1.6,height:60}}/>
        </div>
        <div style={{display:'flex',gap:9}}>
          <Btn variant="ghost" full={false} style={{flex:1}} onClick={()=>setMode('menu')}>Back</Btn>
          <Btn full={false} style={{flex:2,background:C.error,boxShadow:'none'}} disabled={!category} loading={loading} onClick={submitReport}>Submit Report</Btn>
        </div>
      </div>}

      {mode==='blocked'&&<div style={{textAlign:'center',padding:'8px 0 10px'}}>
        <div style={{width:60,height:60,borderRadius:'50%',background:'oklch(62% 0.18 270/0.15)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',fontSize:28}}>🚫</div>
        <p style={{color:C.text,fontWeight:800,fontSize:17,marginBottom:6}}>{target.display_name} blocked</p>
        <p style={{color:C.muted,fontSize:13,lineHeight:1.6,marginBottom:20}}>They won't appear on your map or be able to contact you.</p>
        <Btn onClick={onClose}>Done</Btn>
      </div>}

      {mode==='reported'&&<div style={{textAlign:'center',padding:'8px 0 10px'}}>
        <div style={{width:60,height:60,borderRadius:'50%',background:`${C.success}18`,border:`2px solid ${C.success}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}><Icon name="check" size={28} color={C.success}/></div>
        <p style={{color:C.text,fontWeight:800,fontSize:17,marginBottom:6}}>Report submitted</p>
        <p style={{color:C.muted,fontSize:13,lineHeight:1.6,marginBottom:20}}>Thank you. Our team will review this. {target.display_name} has also been blocked for your safety.</p>
        <Btn onClick={onClose}>Done</Btn>
      </div>}
    </div>
  </div>;
}

// ── Meetup Safety Modal ───────────────────────────────────────────────────────
function MeetupSafetyModal({partner,trustedContacts,onStart,onClose}){
  const [step,setStep]=useState('setup');   // setup | active | sos
  const [timer,setTimer]=useState(30);      // minutes
  const [selectedContact,setSelectedContact]=useState(trustedContacts[0]||null);
  const [shareLocation,setShareLocation]=useState(true);
  const [countdown,setCountdown]=useState(0);
  const [sosTriggered,setSosTriggered]=useState(false);

  useEffect(()=>{
    if(step!=='active') return;
    setCountdown(timer*60);
    const t=setInterval(()=>setCountdown(v=>{if(v<=1){clearInterval(t);return 0;}return v-1;}),1000);
    return()=>clearInterval(t);
  },[step]);

  const mm=String(Math.floor(countdown/60)).padStart(2,'0');
  const ss=String(countdown%60).padStart(2,'0');
  const pct=timer>0?(countdown/(timer*60))*100:0;
  const urgency=countdown<120?C.error:countdown<300?'oklch(70% 0.2 55)':C.success;

  return <div style={{position:'absolute',inset:0,zIndex:250,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
    <div onClick={step==='setup'?onClose:undefined} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.65)',animation:'fadeIn 0.2s'}}/>
    <div style={{position:'relative',background:C.bg,borderRadius:'26px 26px 0 0',animation:'slideUp 0.3s ease',border:`1px solid ${C.border}`,maxHeight:'90%',display:'flex',flexDirection:'column'}}>
      <div style={{width:36,height:4,borderRadius:99,background:C.border,margin:'12px auto 0',flexShrink:0}}/>

      {step==='setup'&&<div style={{padding:'16px 22px 36px',overflow:'auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
          <div style={{width:40,height:40,borderRadius:12,background:`${C.success}18`,border:`1px solid ${C.success}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🛡️</div>
          <div><p style={{color:C.text,fontWeight:800,fontSize:17}}>Meetup Safety</p><p style={{color:C.muted,fontSize:12}}>Set up safety checks before meeting {partner.display_name}</p></div>
        </div>

        {/* Timer */}
        <div style={{marginBottom:16}}>
          <p style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:10}}>Check-in Timer</p>
          <div style={{display:'flex',gap:8}}>
            {[15,30,60,120].map(m=>(
              <button key={m} onClick={()=>setTimer(m)} style={{flex:1,padding:'10px 4px',borderRadius:12,border:`1.5px solid ${timer===m?C.accent:C.border}`,background:timer===m?C.accentL:'none',color:timer===m?C.accent:C.muted,fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'inherit',transition:'all 0.15s'}}>
                {m<60?`${m}m`:`${m/60}h`}
              </button>
            ))}
          </div>
          <p style={{color:C.muted,fontSize:11,marginTop:7}}>If you don't check in within {timer<60?`${timer} minutes`:`${timer/60} hour${timer>60?'s':''}`}, your trusted contact will be notified.</p>
        </div>

        {/* Trusted contact */}
        <div style={{marginBottom:16}}>
          <p style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:10}}>Alert Contact</p>
          {trustedContacts.length>0
            ?trustedContacts.map(tc=>(
              <button key={tc.username||tc.name} onClick={()=>setSelectedContact(tc)} style={{width:'100%',background:selectedContact?.username===tc.username?C.accentL:C.surface,border:`1.5px solid ${selectedContact?.username===tc.username?C.accent:C.border}`,borderRadius:13,padding:'11px 14px',cursor:'pointer',textAlign:'left',display:'flex',gap:10,alignItems:'center',fontFamily:'inherit',marginBottom:7,transition:'all 0.15s'}}>
                <Avatar name={tc.display_name||tc.name} color={tc.color||C.muted} size={36}/>
                <div style={{flex:1}}><p style={{color:C.text,fontWeight:600,fontSize:13}}>{tc.display_name||tc.name}</p><p style={{color:C.muted,fontSize:11}}>{tc.username?`@${tc.username}`:tc.phone}</p></div>
                {selectedContact?.username===tc.username&&<Icon name="check" size={16} color={C.accent}/>}
              </button>
            ))
            :<div style={{background:C.surface,borderRadius:13,padding:'14px',border:`1px solid ${C.border}`,textAlign:'center'}}>
              <p style={{color:C.muted,fontSize:13}}>No trusted contacts yet</p>
              <p style={{color:C.muted,fontSize:12,marginTop:3}}>Add them in Profile → Safety</p>
            </div>
          }
        </div>

        {/* Share location */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0',borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,marginBottom:18}}>
          <div><p style={{color:C.text,fontWeight:600,fontSize:14}}>Share live location</p><p style={{color:C.muted,fontSize:12,marginTop:2}}>With your trusted contact during the meetup</p></div>
          <div onClick={()=>setShareLocation(v=>!v)} style={{width:46,height:26,borderRadius:13,background:shareLocation?C.success:C.border,cursor:'pointer',position:'relative',transition:'background 0.2s',flexShrink:0}}>
            <div style={{position:'absolute',top:3,left:shareLocation?22:3,width:20,height:20,borderRadius:'50%',background:'#fff',transition:'left 0.2s',boxShadow:'0 1px 4px rgba(0,0,0,0.3)'}}/>
          </div>
        </div>

        <Btn onClick={()=>{setStep('active');onStart&&onStart({timer,contact:selectedContact,shareLocation});}}>
          🛡️ Start Safety Check-in
        </Btn>
        <button onClick={onClose} style={{width:'100%',marginTop:10,background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:13,fontWeight:600,fontFamily:'inherit',padding:'8px'}}>Skip for now</button>
      </div>}

      {step==='active'&&<div style={{padding:'20px 22px 36px',display:'flex',flexDirection:'column',alignItems:'center'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',marginBottom:20}}>
          <p style={{color:C.text,fontWeight:800,fontSize:17}}>🛡️ Safety Active</p>
          <div style={{background:`${C.success}18`,border:`1px solid ${C.success}44`,borderRadius:20,padding:'4px 10px'}}><span style={{color:C.success,fontSize:11,fontWeight:700}}>LIVE</span></div>
        </div>

        {/* Countdown ring */}
        <div style={{position:'relative',width:140,height:140,marginBottom:18}}>
          <svg style={{position:'absolute',inset:0,transform:'rotate(-90deg)'}} viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="60" fill="none" stroke={C.border} strokeWidth="8"/>
            <circle cx="70" cy="70" r="60" fill="none" stroke={urgency} strokeWidth="8"
              strokeDasharray={`${2*Math.PI*60}`} strokeDashoffset={`${2*Math.PI*60*(1-pct/100)}`}
              style={{transition:'stroke-dashoffset 1s linear,stroke 0.5s'}} strokeLinecap="round"/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <p style={{color:urgency,fontWeight:800,fontSize:28,fontVariantNumeric:'tabular-nums',transition:'color 0.5s'}}>{mm}:{ss}</p>
            <p style={{color:C.muted,fontSize:11}}>remaining</p>
          </div>
        </div>

        {selectedContact&&<div style={{background:C.surface,borderRadius:14,padding:'11px 14px',width:'100%',display:'flex',gap:10,alignItems:'center',marginBottom:14,border:`1px solid ${C.border}`}}>
          <Avatar name={selectedContact.display_name||selectedContact.name} color={selectedContact.color||C.muted} size={36}/>
          <div style={{flex:1}}><p style={{color:C.text,fontWeight:600,fontSize:13}}>Alerting {selectedContact.display_name||selectedContact.name}</p><p style={{color:C.muted,fontSize:11,marginTop:1}}>{shareLocation?'Sharing your live location':'Location sharing off'}</p></div>
          <div style={{width:10,height:10,borderRadius:'50%',background:C.success,flexShrink:0,boxShadow:`0 0 0 3px ${C.success}33`}}/>
        </div>}

        <div style={{display:'flex',gap:9,width:'100%',marginBottom:10}}>
          <Btn variant="success" full={false} style={{flex:2}} onClick={()=>setStep('setup')}>
            <Icon name="check" size={15} color="#fff"/> I'm Safe
          </Btn>
          <Btn variant="danger" full={false} style={{flex:1}} onClick={()=>setSosTriggered(true)}>
            🆘 SOS
          </Btn>
        </div>
        <p style={{color:C.muted,fontSize:11,textAlign:'center'}}>Tap "I'm Safe" to confirm check-in and stop the timer</p>

        {sosTriggered&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.85)',borderRadius:'26px 26px 0 0',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:28,gap:14,animation:'fadeIn 0.2s'}}>
          <div style={{fontSize:52}}>🆘</div>
          <p style={{color:'#fff',fontWeight:800,fontSize:22,textAlign:'center'}}>SOS Activated</p>
          <p style={{color:'rgba(255,255,255,0.7)',fontSize:13,textAlign:'center',lineHeight:1.7}}>{selectedContact?`${selectedContact.display_name||selectedContact.name} has been notified with your location.`:'Emergency services alerted.'} Your location is being shared every 30 seconds.</p>
          <div style={{background:'rgba(255,255,255,0.1)',borderRadius:16,padding:'14px 18px',width:'100%',textAlign:'center',border:'1px solid rgba(255,255,255,0.2)'}}>

// NETWORK GRAPH
// ─────────────────────────────────────────────────────────────────────────────
function NetworkGraph({user,friends,blockedUsers,onAddFriend,onOpenChat,onViewProfile}){
  const containerRef=useRef(null);

  // transform: {x, y, scale} — the SVG group transform
  const [tf,setTf]=useState({x:195,y:310,scale:1});
  const [selected,setSelected]=useState(null);
  // graphFriends = friends + newly added FOF
  const [graphFriends,setGraphFriends]=useState(friends);
  const [pending,setPending]=useState({}); // username → true when request sent

  // Keep graphFriends in sync when parent friends changes
  useEffect(()=>{
    setGraphFriends(prev=>{
      const merged=[...friends];
      prev.forEach(p=>{ if(!merged.find(m=>m.username===p.username)) merged.push(p); });
      return merged;
    });
  },[friends]);

  // ── Build nodes & edges from graphFriends ─────────────────────────────────
  const {nodes,edges}=buildGraph();
  function buildGraph(){
    const ns=[], es=[];
    // Center
    ns.push({id:'__me',label:user.displayName||'You',color:C.accent,level:levelFromXp(0),r:30,x:0,y:0,kind:'me'});

    const myFriends=graphFriends.filter(f=>!blockedUsers.some(b=>b.username===f.username));
    const count=myFriends.length||1;
    const R1=Math.max(110, count*28);

    myFriends.forEach((f,i)=>{
      const angle=(2*Math.PI*i/count)-(Math.PI/2);
      const x=R1*Math.cos(angle), y=R1*Math.sin(angle);
      ns.push({id:f.username,label:f.display_name,color:f.color,level:f.level,r:22,x,y,kind:'friend',data:f});
      es.push({from:'__me',to:f.username,strength:'strong'});

      // FOF
      const fofs=(SOCIAL_GRAPH[f.username]||[]).filter(ff=>
        !myFriends.some(m=>m.username===ff.username)&&
        !blockedUsers.some(b=>b.username===ff.username)
      ).slice(0,3);

      fofs.forEach((ff,j)=>{
        const spread=fofs.length===1?0:0.55;
        const fofAngle=angle+(j-(fofs.length-1)/2)*spread;
        const R2=R1+110;
        const fx=R2*Math.cos(fofAngle), fy=R2*Math.sin(fofAngle);
        if(!ns.find(n=>n.id===ff.username)){
          ns.push({id:ff.username,label:ff.display_name,color:ff.color,level:ff.level,r:18,x:fx,y:fy,kind:'fof',data:ff,parent:f.username});
        }
        if(!es.find(e=>e.from===f.username&&e.to===ff.username)){
          es.push({from:f.username,to:ff.username,strength:'weak'});
        }

        // Level 3 — if pending (just added)
        if(pending[ff.username]){
          const fofFofs=(SOCIAL_GRAPH[ff.username]||[]).filter(fff=>
            !myFriends.some(m=>m.username===fff.username)&&
            !ns.find(n=>n.id===fff.username)
          ).slice(0,2);
          fofFofs.forEach((fff,k)=>{
            const a3=fofAngle+(k===0?-0.4:0.4);
            const R3=R2+90;
            if(!ns.find(n=>n.id===fff.username)){
              ns.push({id:fff.username,label:fff.display_name,color:fff.color,level:fff.level,r:14,x:R3*Math.cos(a3),y:R3*Math.sin(a3),kind:'fof2',data:fff,parent:ff.username});
              es.push({from:ff.username,to:fff.username,strength:'vweak'});
            }
          });
        }
      });
    });
    return{nodes:ns,edges:es};
  }


  // ── Pointer pan/zoom ──────────────────────────────────────────────────────
  const pointerRef=useRef(null);
  const pinchRef=useRef(null);

  function getContainerPoint(e){
    const rect=containerRef.current?.getBoundingClientRect()||{left:0,top:0};
    return{x:e.clientX-rect.left,y:e.clientY-rect.top};
  }

  function onPointerDown(e){
    // Check if the target or any ancestor is a graph node
    let el=e.target;
    while(el&&el!==e.currentTarget){
      if(el.getAttribute&&el.getAttribute('data-node')) return; // node click - don't pan
      el=el.parentNode;
    }
    pointerRef.current={id:e.pointerId,startX:e.clientX,startY:e.clientY,tfX:tf.x,tfY:tf.y,moved:false};
  }
  function onPointerMove(e){
    if(!pointerRef.current||pointerRef.current.id!==e.pointerId) return;
    const dx=e.clientX-pointerRef.current.startX;
    const dy=e.clientY-pointerRef.current.startY;
    if(Math.abs(dx)>3||Math.abs(dy)>3) pointerRef.current.moved=true;
    setTf(t=>({...t,x:pointerRef.current.tfX+dx,y:pointerRef.current.tfY+dy}));
  }
  function onPointerUp(e){
    if(pointerRef.current?.id===e.pointerId) pointerRef.current=null;
  }

  // Pinch-to-zoom
  const touchesRef=useRef({});
  function onTouchStart(e){
    [...e.changedTouches].forEach(t=>{ touchesRef.current[t.identifier]={x:t.clientX,y:t.clientY}; });
    if(Object.keys(touchesRef.current).length===2){
      const pts=Object.values(touchesRef.current);
      pinchRef.current={dist:Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y),scale:tf.scale,tfX:tf.x,tfY:tf.y,
        mx:(pts[0].x+pts[1].x)/2-(containerRef.current?.getBoundingClientRect().left||0),
        my:(pts[0].y+pts[1].y)/2-(containerRef.current?.getBoundingClientRect().top||0)};
    }
  }
  function onTouchMove(e){
    e.preventDefault();
    [...e.changedTouches].forEach(t=>{ touchesRef.current[t.identifier]={x:t.clientX,y:t.clientY}; });
    const pts=Object.values(touchesRef.current);
    if(pts.length===2&&pinchRef.current){
      const newDist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
      const ratio=newDist/pinchRef.current.dist;
      const ns=Math.min(3,Math.max(0.3,pinchRef.current.scale*ratio));
      const {mx,my}=pinchRef.current;
      setTf({
        scale:ns,
        x:mx-(mx-pinchRef.current.tfX)*(ns/pinchRef.current.scale),
        y:my-(my-pinchRef.current.tfY)*(ns/pinchRef.current.scale),
      });
    }
  }
  function onTouchEnd(e){
    [...e.changedTouches].forEach(t=>{ delete touchesRef.current[t.identifier]; });
    if(Object.keys(touchesRef.current).length<2) pinchRef.current=null;
  }

  // Mouse-wheel zoom — zooms toward cursor position
  function onWheel(e){
    e.preventDefault();
    const rect=containerRef.current?.getBoundingClientRect()||{left:0,top:0};
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const delta=e.deltaY>0?-0.12:0.12;
    setTf(t=>{
      const ns=Math.min(3,Math.max(0.3,t.scale+delta));
      const ratio=ns/t.scale;
      return{scale:ns,x:mx-(mx-t.x)*ratio,y:my-(my-t.y)*ratio};
    });
  }

  // Button zoom — toward/away from current view center
  function zoomBtn(dir){
    const W=containerRef.current?.clientWidth||390;
    const H=containerRef.current?.clientHeight||500;
    const mx=W/2,my=H/2;
    setTf(t=>{
      const ns=Math.min(3,Math.max(0.3,t.scale+dir*0.25));
      const ratio=ns/t.scale;
      return{scale:ns,x:mx-(mx-t.x)*ratio,y:my-(my-t.y)*ratio};
    });
  }

  // Add friend handler
  function handleAdd(nodeData){
    setPending(p=>({...p,[nodeData.username]:true}));
    setSelected(null);
    // Add to graphFriends after short delay (simulates request accepted)
    setTimeout(()=>{
      setGraphFriends(prev=>[...prev,{...nodeData,distance_m:600}]);
      onAddFriend&&onAddFriend(nodeData);
    },800);
  }

  const selNode=selected?nodes.find(n=>n.id===selected):null;

  return <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
    <StatusBar/>
    <div style={{padding:'10px 18px 5px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
      <div>
        <h2 style={{color:C.text,fontWeight:800,fontSize:18,letterSpacing:'-0.02em'}}>Social Graph</h2>
        <p style={{color:C.muted,fontSize:11,marginTop:1}}>Tap nodes · Pinch/scroll to zoom · Drag to pan</p>
      </div>
      <div style={{display:'flex',gap:5}}>
        <button onClick={()=>zoomBtn(1)} style={{width:32,height:32,borderRadius:9,background:C.surface,border:`1px solid ${C.border}`,cursor:'pointer',color:C.text,fontSize:19,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
        <button onClick={()=>zoomBtn(-1)} style={{width:32,height:32,borderRadius:9,background:C.surface,border:`1px solid ${C.border}`,cursor:'pointer',color:C.text,fontSize:19,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
        <button onClick={()=>setTf({x:195,y:310,scale:1})} style={{width:32,height:32,borderRadius:9,background:C.surface,border:`1px solid ${C.border}`,cursor:'pointer',color:C.muted,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>⌂</button>
      </div>
    </div>

    {/* Legend */}
    <div style={{display:'flex',gap:14,padding:'0 18px 6px',flexShrink:0}}>
      {[{c:C.accent,l:'You'},{c:'oklch(58% 0.16 270)',l:'Friends'},{c:`${C.muted}88`,l:'Connect'},{c:`${C.muted}44`,l:'Explore'}].map((item,i)=>(
        <div key={i} style={{display:'flex',gap:4,alignItems:'center'}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:item.c}}/>
          <span style={{color:C.muted,fontSize:10,fontWeight:600}}>{item.l}</span>
        </div>
      ))}
    </div>

    {/* Canvas */}
    <div ref={containerRef} style={{flex:1,overflow:'hidden',position:'relative',cursor:pointerRef.current?'grabbing':'grab',touchAction:'none'}}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}
      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      onWheel={onWheel}>

      <svg width="100%" height="100%" style={{position:'absolute',inset:0,overflow:'visible'}}>
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g transform={`translate(${tf.x},${tf.y}) scale(${tf.scale})`}>
          {/* Edges */}
          {edges.map((e,i)=>{
            const f=nodes.find(n=>n.id===e.from),t=nodes.find(n=>n.id===e.to);
            if(!f||!t) return null;
            const sw=e.strength==='strong'?2:1;
            const op=e.strength==='strong'?0.5:e.strength==='weak'?0.25:0.12;
            const sc=e.strength==='strong'?C.accent:C.muted;
            const sd=e.strength==='weak'?'6 4':e.strength==='vweak'?'3 5':undefined;
            return <line key={i} x1={f.x} y1={f.y} x2={t.x} y2={t.y} stroke={sc} strokeWidth={sw} strokeDasharray={sd} opacity={op}/>;
          })}
          {/* Nodes */}
          {nodes.map(n=>{
            const isSel=selected===n.id;
            const isFriendNode=n.kind==='friend';
            const isPend=pending[n.id];
            return <g key={n.id} data-node="1" onClick={e=>{e.stopPropagation();if(pointerRef.current?.moved) return;setSelected(isSel?null:n.id);}} style={{cursor:'pointer',pointerEvents:'auto'}}>
              {/* Pulse for FOF */}
              {(n.kind==='fof'||n.kind==='fof2')&&!isPend&&
                <circle cx={n.x} cy={n.y} r={n.r+8} fill="none" stroke={C.accent} strokeWidth="1" opacity="0.15"
                  style={{animation:`ping 2s ease-in-out infinite`}}/>}
              {/* Selection ring */}
              {isSel&&<circle cx={n.x} cy={n.y} r={n.r+6} fill="none" stroke={C.accent} strokeWidth="1.5" opacity="0.7"/>}
              {/* Circle */}
              <circle cx={n.x} cy={n.y} r={n.r}
                fill={n.kind==='me'?C.accent:isFriendNode?n.color:isPend?`${n.color}cc`:`${n.color}66`}
                stroke={isSel?C.accent:n.kind==='me'?'rgba(255,255,255,0.25)':isFriendNode?n.color:isPend?n.color:C.border}
                strokeWidth={n.kind==='me'?2.5:isFriendNode||isPend?2:1}
                filter={n.kind==='me'?'url(#glow)':undefined}/>
              {/* Friend check badge */}
              {(isFriendNode||isPend)&&<>
                <circle cx={n.x+n.r*0.68} cy={n.y-n.r*0.68} r={7} fill={C.success} stroke={C.bg} strokeWidth="1.5"/>
                <text x={n.x+n.r*0.68} y={n.y-n.r*0.68+4.5} textAnchor="middle" fontSize="9" fill="#fff" style={{pointerEvents:'none'}}>✓</text>
              </>}
              {/* Pending ring */}
              {isPend&&!isFriendNode&&<circle cx={n.x} cy={n.y} r={n.r+4} fill="none" stroke={C.accent} strokeWidth="1.5" strokeDasharray="4 3" opacity="0.6"/>}
              {/* Initials */}
              <text x={n.x} y={n.y+n.r*0.35} textAnchor="middle"
                fontSize={n.kind==='me'?15:n.r>20?12:n.r>16?10:9}
                fontWeight="800" fill="#fff" style={{pointerEvents:'none',userSelect:'none'}}>
                {n.kind==='me'?(user.displayName?.[0]?.toUpperCase()||'Y'):n.label.split(' ').map(w=>w[0]).join('').slice(0,2)}
              </text>
              {/* Name */}
              <text x={n.x} y={n.y+n.r+14} textAnchor="middle"
                fontSize={n.kind==='me'?12:n.kind==='friend'?11:10}
                fontWeight={n.kind==='me'?'800':'600'}
                fill={n.kind==='me'?C.accent:isFriendNode?C.text:`${C.muted}`}
                style={{pointerEvents:'none',userSelect:'none'}}>
                {n.kind==='me'?'You':n.label.split(' ')[0]}
              </text>
              {/* Level */}
              {(n.kind==='friend'||isPend)&&<>
                <rect x={n.x-15} y={n.y+n.r+17} width={30} height={14} rx={7} fill={C.accentL}/>
                <text x={n.x} y={n.y+n.r+27} textAnchor="middle" fontSize="8" fontWeight="700" fill={C.accent} style={{pointerEvents:'none',userSelect:'none'}}>Lv {n.level}</text>
              </>}
            </g>;
          })}
        </g>
      </svg>

      {/* Tap-away removed — popup has its own close button */}

      {/* Node popup */}
      {selNode&&selNode.kind!=='me'&&(
        <div style={{position:'absolute',bottom:10,left:10,right:10,background:`oklch(16% 0.018 265 / 0.96)`,backdropFilter:'blur(16px)',borderRadius:20,padding:'13px 15px',border:`1px solid ${C.border}`,animation:'fadeUp 0.2s ease',zIndex:10}} onClick={e=>e.stopPropagation()}>
          <div style={{display:'flex',gap:11,alignItems:'center',marginBottom:10}}>
            <div style={{width:42,height:42,borderRadius:'50%',background:selNode.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#fff',flexShrink:0}}>
              {selNode.label.split(' ').map(w=>w[0]).join('').slice(0,2)}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                <p style={{color:C.text,fontWeight:800,fontSize:14}}>{selNode.label}</p>
                <span style={{background:C.accentG,color:C.accent,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 6px'}}>Lv {selNode.level}</span>
                {(selNode.kind==='friend'||pending[selNode.id])&&<span style={{background:'oklch(62% 0.18 145/0.15)',color:C.success,fontSize:10,fontWeight:700,borderRadius:5,padding:'1px 5px'}}>Friend</span>}
              </div>
              <p style={{color:C.muted,fontSize:11,marginTop:1}}>@{selNode.id}</p>
              {selNode.data?.bio&&<p style={{color:C.muted,fontSize:11,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{selNode.data.bio}</p>}
            </div>
            <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',cursor:'pointer',padding:4,flexShrink:0}}><Icon name="x" size={15} color={C.muted}/></button>
          </div>

          {(selNode.kind==='fof'||selNode.kind==='fof2')&&!pending[selNode.id]
            ?<>
              <div style={{display:'flex',gap:8}}>
                <Btn small full={false} style={{flex:2}} onClick={()=>handleAdd(selNode.data)}>
                  <Icon name="userplus" size={13} color="#fff"/> Add Friend
                </Btn>
                <Btn small full={false} variant="ghost" style={{flex:1}} onClick={()=>{setSelected(null);onViewProfile&&onViewProfile(selNode.data);}}>View</Btn>
              </div>
              <p style={{color:C.muted,fontSize:10,textAlign:'center',marginTop:7}}>
                Friend of <strong style={{color:C.text}}>{nodes.find(n=>n.id===selNode.parent)?.label||'a friend'}</strong> · Adding expands their network
              </p>
            </>
            :<div style={{display:'flex',gap:8}}>
              {pending[selNode.id]&&!selNode.kind==='friend'&&<p style={{color:C.success,fontSize:12,textAlign:'center',flex:1}}>✓ Request sent — expanding…</p>}
              {(selNode.kind==='friend')&&<>
                <Btn small full={false} style={{flex:2}} variant="subtle" onClick={()=>{setSelected(null);onOpenChat&&onOpenChat(selNode.data);}}>
                  <Icon name="chat" size={13} color={C.accent}/> Chat
                </Btn>
                <Btn small full={false} variant="ghost" style={{flex:1}} onClick={()=>{setSelected(null);onViewProfile&&onViewProfile(selNode.data);}}>Profile</Btn>
              </>}
            </div>
          }
        </div>
      )}

      {/* Empty state */}
      {nodes.length<=1&&<div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,padding:32,textAlign:'center',pointerEvents:'none'}}>
        <div style={{fontSize:44,opacity:0.25}}>🕸️</div>
        <p style={{color:C.muted,fontSize:14,fontWeight:700}}>Your network is empty</p>
        <p style={{color:C.muted,fontSize:12,lineHeight:1.6}}>Add friends from the map or People tab to see your social graph here</p>
      </div>}
    </div>
  </div>;
}

// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const load=()=>{try{const s=JSON.parse(localStorage.getItem('lu5_state')||'{}');if(s._v!=='5.1'){localStorage.removeItem('lu5_state');return{};}return s;}catch{return{}}};
  const saved=load();
  const user=saved.user||{displayName:'You',username:'you',bio:'New to LinkUp!',interests:['Coffee meetups','Explore the city']};

  const [tab,      setTab]      = useState(saved.tab    ||'map');
  const [xp,       setXp]       = useState(saved.xp     ||50);
  const [coins,    setCoins]    = useState(saved.coins  ||20);
  const [quests,   setQuests]   = useState(saved.quests ||MOCK_QUESTS);
  const [friends,  setFriends]  = useState(saved.friends||[
    {id:2,username:'jordan_k',display_name:'Jordan K.',level:12,xp:890,bio:'Skater & photographer.',color:'oklch(58% 0.16 270)',distance_m:450,total_meetups:18,current_streak:6},
  ]);
  const [owned,    setOwned]    = useState(saved.owned  ||[]);
  const [goldTheme,setGoldTheme]= useState(saved.goldTheme||false);
  const [notifs,   setNotifs]   = useState(NOTIF_TEMPLATES);

  // ── Safety state ───────────────────────────────────────────────────────────
  const [blockedUsers,    setBlockedUsers]    = useState([]);
  const [trustedContacts, setTrustedContacts] = useState([]);
  const [locationPrecision,setLocationPrecision]=useState('approximate');
  const [blockReportTarget,setBlockReportTarget]=useState(null);
  const [safetyHubOpen,   setSafetyHubOpen]   = useState(false);
  const [meetupSafetyFor, setMeetupSafetyFor] = useState(null);

  const [xpToasts,     setXpToasts]     = useState([]);
  const [levelUpModal, setLevelUpModal] = useState(null);
  const [requestModal, setRequestModal] = useState(null);
  const [pinSheet,     setPinSheet]     = useState(null);
  const [chatWith,     setChatWith]     = useState(null);
  const [viewingUser,  setViewingUser]  = useState(null);
  const [notifOpen,    setNotifOpen]    = useState(false);
  const [incomingReqs, setIncomingReqs] = useState([
    {id:'req-1',sender_name:'Alex M.',username:'alex_m',color:'oklch(58% 0.16 190)',distance_m:180,message:"Hey! Want to grab coffee? ☕"},
  ]);
  const [friendReqs,   setFriendReqs]   = useState([
    {id:'fr-1',display_name:'Jordan K.',username:'jordan_k',level:12,color:'oklch(58% 0.16 270)'},
  ]);

  const unreadNotifs=notifs.filter(n=>!n.read).length;
  const inboxCount=incomingReqs.length+friendReqs.length;

  function persist(updates){localStorage.setItem('lu5_state',JSON.stringify({_v:'5.1',tab,xp,coins,quests,friends,owned,goldTheme,user,...updates}));}

  function awardXP(amount,awardCoins=0){
    const xpAmt=Math.max(0,amount), coinAmt=Math.max(0,awardCoins);
    if(xpAmt===0&&coinAmt===0) return;
    const id=Date.now();
    setXpToasts(t=>[...t,{id,xp:xpAmt,coins:coinAmt}]);
    setTimeout(()=>setXpToasts(t=>t.filter(e=>e.id!==id)),2200);
    setXp(prev=>{
      const n=Math.max(0,prev+xpAmt);
      if(levelFromXp(n)>levelFromXp(prev)) setTimeout(()=>setLevelUpModal(levelFromXp(n)),400);
      persist({xp:n}); return n;
    });
    if(coinAmt>0) setCoins(prev=>{const n=Math.max(0,prev+coinAmt);persist({coins:n});return n;});
  }

  function handleSendRequest(target){setRequestModal(target);}
  function handleRequestSent(){setTimeout(()=>{setRequestModal(null);awardXP(5);setQuests(q=>q.map(qst=>qst.key==='first_linkup'?{...qst,progress:Math.min((qst.progress||0)+1,qst.target),done:(qst.progress||0)+1>=qst.target,claimable:(qst.progress||0)+1>=qst.target&&!qst.done}:qst));},700);}

  function handleAcceptMeetup(id){setIncomingReqs(r=>r.filter(x=>x.id!==id));awardXP(15,2);}
  function handleDeclineMeetup(id){setIncomingReqs(r=>r.filter(x=>x.id!==id));}

  function handleAddFriend(target){
    setTimeout(()=>{
      setFriends(prev=>{if(prev.some(f=>f.username===target.username))return prev;const u=[...prev,{...target,distance_m:target.distance_m||950}];persist({friends:u});return u;});
      awardXP(10);
    },700);
  }
  function handleAcceptFriend(id){
    const req=friendReqs.find(r=>r.id===id);
    if(req){setFriends(prev=>{if(prev.some(f=>f.username===req.username))return prev;const u=[...prev,{...req,distance_m:450}];persist({friends:u});return u;});awardXP(10);}
    setFriendReqs(r=>r.filter(x=>x.id!==id));
  }
  function handleDeclineFriend(id){setFriendReqs(r=>r.filter(x=>x.id!==id));}

  function handleBuy(item){
    if(coins<item.cost) return;
    setCoins(prev=>{const n=Math.max(0,prev-item.cost);persist({coins:n});return n;});
    setOwned(prev=>{const u=[...prev,item.key];persist({owned:u});return u;});
    if(item.key==='chat_theme'){setGoldTheme(true);persist({goldTheme:true});}
    // Add purchase notification
    setNotifs(n=>[{id:`n-buy-${Date.now()}`,type:'shop',icon:'🛍️',title:`Purchased: ${item.name}`,body:`🪙 −${item.cost} coins`,ts:Date.now(),read:false},...n]);
  }

  function handleClaimQuest(key){const q=quests.find(x=>x.key===key);if(q){awardXP(q.xp,q.coins);setQuests(qs=>qs.map(x=>x.key===key?{...x,claimable:false}:x));}}

  function markAllRead(){setNotifs(n=>n.map(x=>({...x,read:true})));}
  function openChat(person){setPinSheet(null);setViewingUser(null);setChatWith(person);}
  function viewProfile(u){setPinSheet(null);setViewingUser(u);}
  function goTab(t){setTab(t);persist({tab:t});setChatWith(null);setViewingUser(null);setNotifOpen(false);}

  // ── Safety handlers ────────────────────────────────────────────────────────
  function handleBlock(target){
    setBlockedUsers(prev=>[...prev.filter(u=>u.username!==target.username),target]);
    setFriends(prev=>prev.filter(f=>f.username!==target.username));
    setBlockReportTarget(null);
  }
  function handleReport(target,category){
    handleBlock(target); // auto-block on report
  }
  function handleAddTrusted(contact){
    setTrustedContacts(prev=>[...prev.filter(c=>c.username!==contact.username),contact]);
  }
  function handleRemoveTrusted(contact){
    setTrustedContacts(prev=>prev.filter(c=>c.username!==contact.username));
  }
  function handleUnblock(user){
    setBlockedUsers(prev=>prev.filter(u=>u.username!==user.username));
  }

  if(chatWith){
    return <Wrap>
      <ChatScreen partner={chatWith} goldTheme={goldTheme}
        onBack={()=>setChatWith(null)}
        onMeetupVerified={()=>awardXP(50,5)}
        onOpenSafety={()=>setMeetupSafetyFor(chatWith)}/>
      <XPToast events={xpToasts}/>
      {meetupSafetyFor&&<MeetupSafetyModal partner={meetupSafetyFor} trustedContacts={trustedContacts} onStart={()=>{}} onClose={()=>setMeetupSafetyFor(null)}/>}
    </Wrap>;
  }

  const screens={
    map:     <MapScreen user={user} xp={xp} friends={friends} blockedUsers={blockedUsers} onPinSelect={p=>{setPinSheet(p);}} incomingRequests={incomingReqs} onAccept={handleAcceptMeetup} onDecline={handleDeclineMeetup} unreadNotifs={unreadNotifs} onOpenNotifs={()=>setNotifOpen(true)}/>,
    people:  <PeopleScreen friends={friends} incomingRequests={incomingReqs} friendRequests={friendReqs} onRequestUser={handleSendRequest} onAddFriend={handleAddFriend} onAcceptMeetup={handleAcceptMeetup} onDeclineMeetup={handleDeclineMeetup} onAcceptFriend={handleAcceptFriend} onDeclineFriend={handleDeclineFriend} onOpenChat={openChat} onViewProfile={viewProfile}/>,
    network: <NetworkGraph user={user} friends={friends} blockedUsers={blockedUsers} onAddFriend={handleAddFriend} onOpenChat={openChat} onViewProfile={viewProfile}/>,
    shop:    <ShopScreen coins={coins} owned={owned} onBuy={handleBuy}/>,
    quests:  <QuestsScreen quests={quests} onClaim={handleClaimQuest}/>,
    profile: <ProfileScreen user={user} xp={xp} coins={coins} quests={quests} friends={friends} onOpenSafety={()=>setSafetyHubOpen(true)}/>,
  };

  return <Wrap>
    <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {screens[tab]||screens.map}
        <XPToast events={xpToasts}/>
        {levelUpModal&&<LevelUpModal level={levelUpModal} onDismiss={()=>setLevelUpModal(null)}/>}
        {requestModal&&<RequestModal target={requestModal} onSend={handleRequestSent} onClose={()=>setRequestModal(null)}/>}
        {pinSheet&&<PinSheet pin={pinSheet} isFriend={friends.some(f=>f.username===pinSheet.username)} onClose={()=>setPinSheet(null)} onSendRequest={t=>{setPinSheet(null);setRequestModal(t);}} onAddFriend={t=>{setPinSheet(null);handleAddFriend(t);}} onOpenChat={openChat} onViewProfile={viewProfile} onBlockReport={u=>setBlockReportTarget(u)}/>}
        {viewingUser&&<UserProfilePage user={viewingUser} isFriend={friends.some(f=>f.username===viewingUser.username)} isBlocked={blockedUsers.some(b=>b.username===viewingUser.username)} onBack={()=>setViewingUser(null)} onAddFriend={handleAddFriend} onSendRequest={t=>{setViewingUser(null);setRequestModal(t);}} onOpenChat={openChat} onBlockReport={u=>setBlockReportTarget(u)} onUnblock={u=>{handleUnblock(u);setViewingUser(null);}}/>}
        {notifOpen&&<NotifCenter notifs={notifs} onClose={()=>setNotifOpen(false)} onMarkAll={markAllRead}/>}
      </div>
      {safetyHubOpen&&<SafetyHubScreen friends={friends} blockedUsers={blockedUsers} trustedContacts={trustedContacts} locationPrecision={locationPrecision} onBack={()=>setSafetyHubOpen(false)} onSetPrecision={setLocationPrecision} onAddTrusted={handleAddTrusted} onRemoveTrusted={handleRemoveTrusted} onUnblock={handleUnblock}/>}
      {blockReportTarget&&<BlockReportModal target={blockReportTarget} onBlock={handleBlock} onReport={handleReport} onClose={()=>setBlockReportTarget(null)}/>}
      <BottomNav active={tab} onTab={goTab} inboxCount={inboxCount}/>
    </div>
  </Wrap>;
}

function Wrap({children}){return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'oklch(14% 0.02 265)'}}><div className="phone">{children}</div></div>;}

// Patch missing size prop in Avatar inline use
const _OrigAvatar = Avatar;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
