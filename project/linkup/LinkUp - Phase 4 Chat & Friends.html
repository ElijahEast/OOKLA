<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  body{font-family:'Plus Jakarta Sans',sans-serif;background:oklch(14% 0.02 265);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .phone{width:390px;height:844px;background:oklch(11% 0.015 265);border-radius:48px;overflow:hidden;position:relative;box-shadow:0 0 0 1px oklch(30% 0.02 265),0 40px 80px oklch(0% 0 0/0.6)}
  @media(max-height:900px){.phone{transform:scale(0.88);transform-origin:center}}
  @media(max-height:780px){.phone{transform:scale(0.76)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes ping{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.55);opacity:0}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
  @keyframes pop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
  @keyframes xpFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-44px)}}
  *{-webkit-tap-highlight-color:transparent}
  input::placeholder,textarea::placeholder{color:oklch(38% 0.01 265)}
  ::-webkit-scrollbar{width:0}
  textarea{resize:none}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useReducer } = React;

// ── Tokens ────────────────────────────────────────────────────────────────────
const C = {
  bg:'oklch(11% 0.015 265)', surface:'oklch(16% 0.018 265)', raised:'oklch(20% 0.02 265)',

  blue:'oklch(62% 0.18 240)', purple:'oklch(62% 0.18 295)',

// ── XP helpers ────────────────────────────────────────────────────────────────
function xpForLevel(l){ return Math.floor(100*Math.pow(l,1.5)); }
function levelFromXp(xp){ let l=1; while(xpForLevel(l+1)<=xp) l++; return l; }
function levelProgress(xp){
  const l=levelFromXp(xp);
  const cur=l===1?0:xpForLevel(l), next=xpForLevel(l+1);
  return { level:l, pct:Math.round((xp-cur)/(next-cur)*100), into:xp-cur, needed:next-cur };
}

// ── Shared atoms ──────────────────────────────────────────────────────────────
function Spinner({color='#fff',size=20}){ return <div style={{width:size,height:size,border:`2.5px solid ${color}44`,borderTopColor:color,borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/>; }

function StatusBar(){
  const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 28px 0',color:C.text,fontSize:13,fontWeight:600}}><span>{t}</span><div style={{display:'flex',gap:5,alignItems:'center'}}><svg width="16" height="11" viewBox="0 0 16 11" fill={C.text}><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4.5" y="2" width="3" height="9" rx="1"/><rect x="9" y=".5" width="3" height="10.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="11" rx="1"/></svg><svg width="17" height="11" viewBox="0 0 24 11" fill={C.text}><rect x="0" y="1.5" width="21" height="8" rx="2" stroke={C.text} strokeWidth="1.5" fill="none"/><rect x="21.5" y="3.5" width="2" height="4" rx="1" fill={C.text}/><rect x="1.5" y="3" width="13" height="5" rx="1"/></svg></div></div>;
}

function Wordmark({size='sm'}){
  const s=size==='lg'?36:26;
  return <div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:s,height:s,borderRadius:s*0.35,background:C.accent,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 3px 12px ${C.accent}55`}}><Icon name="map" size={s*0.55} color="#fff"/></div><span style={{fontSize:size==='lg'?26:20,fontWeight:800,color:C.text,letterSpacing:'-0.03em'}}>Link<span style={{color:C.accent}}>Up</span></span></div>;
}

function Avatar({name,color,size=44}){
  const i=name?.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()||'?';
  return <div style={{width:size,height:size,borderRadius:'50%',background:color||C.raised,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.36,fontWeight:700,color:'#fff',border:`2px solid ${C.border}`}}>{i}</div>;
}

function Btn({children,onClick,variant='primary',loading,disabled,full=true,small,style:sx={}}){
  const [pr,setPr]=useState(false);
  const h=small?40:54;
  const vs={primary:{background:C.accent,color:'#fff',boxShadow:`0 4px 18px ${C.accent}44`},ghost:{background:C.surface,color:C.text,border:`1.5px solid ${C.border}`},subtle:{background:C.accentG,color:C.accent,border:`1px solid ${C.accentL}`},success:{background:'oklch(62% 0.18 145)',color:'#fff'},danger:{background:'oklch(62% 0.2 15/0.12)',color:C.error,border:`1px solid oklch(62% 0.2 15/0.25)`}};
  return <button onClick={disabled||loading?undefined:onClick} onMouseDown={()=>setPr(true)} onMouseUp={()=>setPr(false)} onMouseLeave={()=>setPr(false)} style={{width:full?'100%':undefined,height:h,borderRadius:small?12:16,border:'none',cursor:disabled||loading?'not-allowed':'pointer',fontSize:small?13:16,fontWeight:700,fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:7,transition:'all 0.15s',transform:pr?'scale(0.97)':'scale(1)',opacity:disabled||loading?0.55:1,paddingLeft:small?14:undefined,paddingRight:small?14:undefined,flexShrink:0,...vs[variant],...sx}}>{loading?<Spinner color={variant==='ghost'||variant==='danger'?C.muted:'#fff'}/>:children}</button>;
}

function TabBar({tabs,active,onChange}){
  return <div style={{display:'flex',gap:0,margin:'10px 18px',background:C.surface,borderRadius:14,padding:4,flexShrink:0}}>
    {tabs.map(t=><button key={t.id} onClick={()=>onChange(t.id)} style={{flex:1,padding:'7px 4px',borderRadius:10,border:'none',background:active===t.id?C.accent:'none',color:active===t.id?'#fff':C.muted,fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s',position:'relative'}}>
      {t.label}
      {t.badge>0&&<span style={{position:'absolute',top:3,right:6,width:14,height:14,borderRadius:'50%',background:active===t.id?'rgba(255,255,255,0.3)':C.error,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:'#fff'}}>{t.badge}</span>}
    </button>)}
  </div>;
}

function BottomNav({active,onTab,inboxCount=0,chatCount=0}){
  const tabs=[
    {id:'map',icon:'map',label:'Explore'},
    {id:'people',icon:'people',label:'People',badge:inboxCount},
    {id:'quests',icon:'quest',label:'Quests'},
    {id:'rank',icon:'trophy',label:'Ranks'},
    {id:'profile',icon:'user',label:'Profile'},
  ];
  return <div style={{display:'flex',borderTop:`1px solid ${C.border}`,background:C.bg,flexShrink:0}}>
    {tabs.map(tab=>{
      const on=active===tab.id;
      return <button key={tab.id} onClick={()=>onTab(tab.id)} style={{flex:1,padding:'10px 0 18px',background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4,position:'relative'}}>
        <Icon name={tab.icon} size={21} color={on?C.accent:C.muted}/>
        <span style={{fontSize:10,color:on?C.accent:C.muted,fontWeight:on?700:500}}>{tab.label}</span>
        {tab.badge>0&&<div style={{position:'absolute',top:7,right:'50%',transform:'translateX(10px)',width:16,height:16,borderRadius:'50%',background:C.error,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'#fff',fontSize:9,fontWeight:800}}>{tab.badge}</span></div>}
      </button>;
    })}
  </div>;
}

// ── XP Toast ──────────────────────────────────────────────────────────────────
function XPToast({events}){
  return <div style={{position:'absolute',top:80,right:14,zIndex:200,display:'flex',flexDirection:'column',gap:5,pointerEvents:'none'}}>
    {events.map(ev=><div key={ev.id} style={{background:C.accent,color:'#fff',fontWeight:800,fontSize:12,borderRadius:20,padding:'5px 12px',display:'flex',alignItems:'center',gap:5,animation:'xpFloat 2s ease forwards',boxShadow:`0 4px 14px ${C.accent}66`}}><Icon name="zap" size={12} color="#fff"/>+{ev.xp} XP{ev.coins?<> · 🪙+{ev.coins}</>:null}</div>)}
  </div>;
}

// ── Level-Up Modal ────────────────────────────────────────────────────────────
function LevelUpModal({level,onDismiss}){
  return <div style={{position:'absolute',inset:0,zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.75)',animation:'fadeIn 0.2s'}}>
    <div style={{background:C.surface,borderRadius:28,padding:'36px 32px',textAlign:'center',width:310,border:`1px solid ${C.border}`,animation:'pop 0.4s ease'}}>
      <div style={{fontSize:54,marginBottom:10}}>🎉</div>
      <div style={{background:`linear-gradient(135deg,${C.accent},${C.gold})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',fontSize:30,fontWeight:800,letterSpacing:'-0.02em',marginBottom:6}}>Level {level}!</div>
      <p style={{color:C.muted,fontSize:13,lineHeight:1.7,marginBottom:22}}>You've leveled up! Keep meeting people to unlock more perks.</p>
      <Btn onClick={onDismiss}>Awesome! 🚀</Btn>
    </div>
  </div>;
}

// ── Incoming Meetup Notif ─────────────────────────────────────────────────────
function InboxNotif({requests,onAccept,onDecline}){
  if(!requests.length) return null;
  const req=requests[0];
  const [timer,setTimer]=useState(600);
  useEffect(()=>{const t=setInterval(()=>setTimer(v=>v>0?v-1:0),1000);return()=>clearInterval(t);},[]);
  const mm=String(Math.floor(timer/60)).padStart(2,'0'), ss=String(timer%60).padStart(2,'0');
  return <div style={{position:'absolute',top:14,left:14,right:14,zIndex:150,animation:'fadeUp 0.3s ease'}}>
    <div style={{background:C.surface,borderRadius:20,padding:'14px',border:`1.5px solid ${C.accent}55`,boxShadow:`0 8px 28px rgba(0,0,0,0.5)`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <Avatar name={req.sender_name} color={req.color} size={40}/>
          <div><p style={{color:C.text,fontWeight:700,fontSize:13}}>{req.sender_name}</p><p style={{color:C.muted,fontSize:11}}>wants to LinkUp · {req.distance_m}m</p></div>
        </div>
        <span style={{color:timer<60?C.error:C.muted,fontSize:12,fontWeight:700}}>{mm}:{ss}</span>
      </div>
      <div style={{height:3,background:C.border,borderRadius:99,marginBottom:10}}><div style={{height:'100%',width:`${(timer/600)*100}%`,background:timer<60?C.error:C.accent,borderRadius:99,transition:'width 1s linear'}}/></div>
      {req.message&&<p style={{color:C.muted,fontSize:12,fontStyle:'italic',marginBottom:10}}>"{req.message}"</p>}
      <div style={{display:'flex',gap:8}}>
        <Btn variant="danger" full={false} style={{flex:1}} small onClick={()=>onDecline(req.id)}><Icon name="x" size={13} color={C.error}/> Decline</Btn>

function ChatScreen({convPartner,myName,goldTheme,onBack}){
  const [msgs,setMsgs]=useState([
    {id:1,from:'them',body:"Hey! Glad you accepted 😊",time:'2:41 PM'},
    {id:2,from:'me',body:"Same! Where are you right now?",time:'2:42 PM'},
    {id:3,from:'them',body:"Outside the coffee shop on Main St — the one with the green awning",time:'2:43 PM'},

    const now=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});

      const replies=["On my way!","Sounds good 👍","See you soon!","Can't wait 🙌"];

      const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      setMsgs(m=>[...m,{id:Date.now()+1,from:'them',body:r,time:t}]);

  }

  const bubbleMine = goldTheme
    ? {background:`linear-gradient(135deg,${C.gold},oklch(70% 0.18 55))`,color:'#1a1008'}

  return <div style={{height:'100%',display:'flex',flexDirection:'column',animation:'slideRight 0.25s ease'}}>
    <StatusBar/>
    <div style={{padding:'10px 18px 12px',display:'flex',alignItems:'center',gap:12,borderBottom:`1px solid ${C.border}`}}>

      <Avatar name={convPartner.display_name} color={convPartner.color} size={38}/>
      <div style={{flex:1}}>
        <p style={{color:C.text,fontWeight:700,fontSize:15}}>{convPartner.display_name}</p>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:C.success}}/>
          <p style={{color:C.muted,fontSize:11}}>Active now · {convPartner.distance_m<1000?`${convPartner.distance_m}m`:`${(convPartner.distance_m/1000).toFixed(1)}km`}</p>
        </div>
      </div>
      <div style={{background:C.accentG,borderRadius:10,padding:'4px 10px'}}><span style={{color:C.accent,fontSize:11,fontWeight:700}}>Lv {convPartner.level}</span></div>
    </div>

    {/* Messages */}
    <div style={{flex:1,overflow:'auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
      <div style={{textAlign:'center',margin:'4px 0 8px'}}>
        <span style={{background:C.surface,borderRadius:20,padding:'4px 12px',color:C.muted,fontSize:11,border:`1px solid ${C.border}`}}>Today · Meetup accepted 🎉</span>
      </div>
      {msgs.map(m=>(
        <div key={m.id} style={{display:'flex',justifyContent:m.from==='me'?'flex-end':'flex-start',animation:'fadeUp 0.2s ease'}}>
          {m.from==='them'&&<Avatar name={convPartner.display_name} color={convPartner.color} size={28} style={{marginRight:8,flexShrink:0}}/>}
          <div style={{maxWidth:'72%'}}>
            <div style={{...(m.from==='me'?bubbleMine:{background:C.surface,color:C.text}),padding:'10px 14px',borderRadius:m.from==='me'?'18px 18px 4px 18px':'18px 18px 18px 4px',fontSize:14,lineHeight:1.5,border:m.from!=='me'?`1px solid ${C.border}`:'none'}}>
              {m.body}
            </div>
            <p style={{color:C.muted,fontSize:10,marginTop:3,textAlign:m.from==='me'?'right':'left'}}>{m.time}</p>
          </div>
        </div>

      <div ref={bottomRef}/>
    </div>

    {/* Meetup complete prompt */}
    <div style={{margin:'0 14px 10px',background:'oklch(62% 0.18 145/0.08)',border:`1px solid oklch(62% 0.18 145/0.25)`,borderRadius:14,padding:'10px 14px',display:'flex',alignItems:'center',gap:10}}>
      <span style={{fontSize:18}}>📍</span>

      <button style={{background:'oklch(62% 0.18 145)',border:'none',borderRadius:8,padding:'5px 10px',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>✓ Done</button>
    </div>

    {/* Input */}
    <div style={{padding:'0 14px 28px',display:'flex',gap:9,alignItems:'flex-end'}}>

  const [xp,     setXp]     = useState(saved.xp     || 50);
  const [coins,  setCoins]  = useState(saved.coins  || 20);
  const [quests, setQuests] = useState(saved.quests || MOCK_QUESTS);
  const [friends,setFriends]= useState(saved.friends|| []);
  const [owned,  setOwned]  = useState(saved.owned  || []);
  const [goldTheme,setGoldTheme]=useState(saved.goldTheme||false);

  const user = saved.user || { displayName:'You', username:'you', bio:'New to LinkUp!', interests:['Coffee meetups','Explore the city'] };

  const [xpToasts,    setXpToasts]    = useState([]);
  const [levelUpModal,setLevelUpModal]= useState(null);
  const [requestModal,setRequestModal]= useState(null);
  const [pinSheet,    setPinSheet]    = useState(null);
  const [chatWith,    setChatWith]    = useState(null);
  const [incomingReqs,setIncomingReqs]= useState([
    { id:'req-1', sender_name:'Alex M.', username:'alex_m', color:'oklch(58% 0.16 190)', distance_m:180, message:"Hey! Want to grab coffee? ☕" },
  ]);
  const [friendReqs,  setFriendReqs]  = useState(MOCK_FRIEND_REQUESTS);

  function persist(updates){
    localStorage.setItem('lu4_state', JSON.stringify({ tab, xp, coins, quests, friends, owned, goldTheme, user, ...updates }));
  }

  function awardXP(amount, awardCoins=0){
    // Never allow negative XP
    const safeAmount = Math.max(0, amount);
    const safeCoins  = Math.max(0, awardCoins);
    if(safeAmount===0 && safeCoins===0) return;
    const id=Date.now();
    setXpToasts(t=>[...t,{id,xp:safeAmount,coins:safeCoins}]);
    setTimeout(()=>setXpToasts(t=>t.filter(e=>e.id!==id)),2200);
    setXp(prev=>{
      const newXp=Math.max(0, prev+safeAmount);
      if(levelFromXp(newXp)>levelFromXp(prev)) setTimeout(()=>setLevelUpModal(levelFromXp(newXp)),400);
      persist({xp:newXp});
      return newXp;
    });
    if(safeCoins>0){
      setCoins(prev=>{ const n=Math.max(0,prev+safeCoins); persist({coins:n}); return n; });
    }
  }

  function spendCoins(amount){
    // Never go below 0
    setCoins(prev=>{ const n=Math.max(0,prev-amount); persist({coins:n}); return n; });
  }

  // ── Meetup request handlers ────────────────────────────────────────────────
  function handleSendRequest(target){ setRequestModal(target); }
  function handleRequestSent(){
    setTimeout(()=>{ setRequestModal(null); awardXP(5); setQuests(q=>q.map(qst=>qst.key==='first_linkup'?{...qst,progress:Math.min((qst.progress||0)+1,qst.target),done:(qst.progress||0)+1>=qst.target,claimable:(qst.progress||0)+1>=qst.target&&!qst.done}:qst)); },700);
  }
  function handleAcceptMeetup(id){ setIncomingReqs(r=>r.filter(x=>x.id!==id)); awardXP(15,2); }
  function handleDeclineMeetup(id){ setIncomingReqs(r=>r.filter(x=>x.id!==id)); }

  // ── Friend handlers ────────────────────────────────────────────────────────
  function handleAddFriend(target){
    // Optimistically show as pending; in real app this posts to API
    // For demo, auto-accept after delay
    setTimeout(()=>{
      setFriends(prev=>{
        if(prev.some(f=>f.username===target.username)) return prev;
        const updated=[...prev,{...target,distance_m:target.distance_m||950}];
        persist({friends:updated});
        return updated;
      });
      awardXP(10);
    },800);
  }
  function handleAcceptFriend(id){
    const req=friendReqs.find(r=>r.id===id);
    if(req){ setFriends(prev=>{ if(prev.some(f=>f.username===req.username)) return prev; const u=[...prev,{...req,distance_m:450}]; persist({friends:u}); return u; }); awardXP(10); }
    setFriendReqs(r=>r.filter(x=>x.id!==id));
  }
  function handleDeclineFriend(id){ setFriendReqs(r=>r.filter(x=>x.id!==id)); }

  // ── Pin sheet ──────────────────────────────────────────────────────────────
  function handlePinSelect(pin){ setPinSheet(pin); }
  function handlePinSendRequest(target){ setPinSheet(null); setRequestModal(target); }
  function handlePinAddFriend(target){ setPinSheet(null); handleAddFriend(target); }

  // ── Chat ───────────────────────────────────────────────────────────────────
  function openChat(person){ setPinSheet(null); setChatWith(person); setTab('people'); }

  // ── Shop ───────────────────────────────────────────────────────────────────
  function handleBuy(item){
    if(coins<item.cost) return;
    spendCoins(item.cost);
    setOwned(prev=>{ const u=[...prev,item.key]; persist({owned:u}); return u; });
    if(item.key==='chat_theme'){ setGoldTheme(true); persist({goldTheme:true}); }
    awardXP(0, 0); // no XP for buying
  }

  // ── Quest claim ────────────────────────────────────────────────────────────
  function handleClaimQuest(key){
    const q=quests.find(x=>x.key===key);
    if(q){ awardXP(q.xp, q.coins); setQuests(qs=>qs.map(x=>x.key===key?{...x,claimable:false}:x)); }
  }

  function goTab(t){ setTab(t); persist({tab:t}); setChatWith(null); }

  const inboxCount = incomingReqs.length + friendReqs.length;

  // Chat is a full-screen overlay
  if(chatWith){
    return <Wrap>
      <ChatScreen convPartner={chatWith} myName={user.displayName} goldTheme={goldTheme} onBack={()=>setChatWith(null)}/>
      <XPToast events={xpToasts}/>
    </Wrap>;
  }

  const screens={
    map:     <MapScreen user={user} xp={xp} friends={friends} onPinSelect={handlePinSelect} incomingRequests={incomingReqs} onAccept={handleAcceptMeetup} onDecline={handleDeclineMeetup}/>,
    people:  <PeopleScreen friends={friends} incomingRequests={incomingReqs} friendRequests={friendReqs} onRequestUser={handleSendRequest} onAddFriend={handleAddFriend} onAcceptMeetup={handleAcceptMeetup} onDeclineMeetup={handleDeclineMeetup} onAcceptFriend={handleAcceptFriend} onDeclineFriend={handleDeclineFriend} onOpenChat={openChat}/>,
    quests:  <QuestsScreen quests={quests} onClaim={handleClaimQuest}/>,
    rank:    <RankScreen myXp={xp} myUsername={user.username}/>,
    profile: <ProfileScreen user={user} xp={xp} quests={quests} friends={friends}/>,
    shop:    <ShopScreen coins={coins} owned={owned} onBuy={handleBuy}/>,
  };

  return <Wrap>
    <div style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {screens[tab]||screens.map}
        <XPToast events={xpToasts}/>
        {levelUpModal&&<LevelUpModal level={levelUpModal} onDismiss={()=>setLevelUpModal(null)}/>}
        {requestModal&&<RequestModal target={requestModal} onSend={handleRequestSent} onClose={()=>setRequestModal(null)}/>}
        {pinSheet&&<PinSheet pin={pinSheet} friends={friends} onClose={()=>setPinSheet(null)} onSendRequest={handlePinSendRequest} onAddFriend={handlePinAddFriend} onOpenChat={openChat}/>}
      </div>
      <BottomNav active={tab} onTab={t=>{ if(t==='profile'&&tab==='profile') goTab('shop'); else goTab(t); }} inboxCount={inboxCount}/>
    </div>
  </Wrap>;
}

function Wrap({children}){
  return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'oklch(14% 0.02 265)'}}><div className="phone">{children}</div></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
